        // ── Focus mode (Ember variant) ──
        // Full-screen single-task overlay with 50-min timer + queue.
        // Toggled by ⌘⇧F. Works in every skin — Ember / Atlas render the
        // title in serif via CSS skin-gating. State persists only while overlay open.
        const FOCUS_TOTAL_SEC = 50 * 60;
        let focusTaskId = null;
        let focusTimerSec = FOCUS_TOTAL_SEC;
        let focusTimerInterval = null;
        let focusPaused = false;
        function buildFocusOverlay() {
            if (document.getElementById('prismFocusOverlay')) return;
            const ov = document.createElement('div');
            ov.id = 'prismFocusOverlay';
            ov.className = 'prism-focus-overlay';
            ov.innerHTML = `
                <div class="prism-focus-topbar">
                    <div class="prism-focus-brand">Focus session</div>
                    <button class="prism-focus-exit" id="focusExitBtn" title="Exit focus (Esc / ⌘⇧F)">Exit <kbd style="margin-left:6px;font-family:var(--pr-mono);background:var(--pr-surface-2);padding:1px 5px;border-radius:4px;">Esc</kbd></button>
                </div>
                <div class="prism-focus-body">
                    <div class="prism-focus-eyebrow">
                        <span class="pr-focus-dot" id="focusFlowDot" style="background:var(--pr-accent)"></span>
                        <span id="focusFlowName">—</span>
                        <span style="opacity:0.5;">·</span>
                        <span id="focusDueLabel">no due date</span>
                    </div>
                    <h1 class="prism-focus-title" id="focusTitle">Nothing selected</h1>
                    <div class="prism-focus-blocker" id="focusBlocker">Blocker — this task is Stuck</div>
                    <div class="prism-focus-meta" id="focusMeta"></div>
                    <div class="prism-focus-notes" id="focusNotes"></div>
                    <div class="prism-focus-timer" id="focusTimer">50:00</div>
                    <div class="prism-focus-timer-label" id="focusTimerLabel">running · click to pause</div>
                    <div class="prism-focus-actions">
                        <button class="pr-focus-btn primary" id="focusDoneBtn" title="Mark task done + next">Done <kbd>⌘⏎</kbd></button>
                        <button class="pr-focus-btn" id="focusSkipBtn" title="Skip to next task">Skip <kbd>→</kbd></button>
                        <button class="pr-focus-btn danger" id="focusStuckBtn" title="Mark as stuck">Stuck <kbd>S</kbd></button>
                        <button class="pr-focus-btn" id="focusPauseBtn" title="Pause / resume timer">Pause <kbd>Space</kbd></button>
                    </div>
                </div>
                <div class="prism-focus-queue">
                    <div class="prism-focus-queue-title">Up next</div>
                    <div id="focusQueue"></div>
                </div>
            `;
            document.body.appendChild(ov);
            document.getElementById('focusExitBtn').addEventListener('click', exitFocusMode);
            document.getElementById('focusDoneBtn').addEventListener('click', () => focusMarkStatus('Done'));
            document.getElementById('focusSkipBtn').addEventListener('click', focusNextTask);
            document.getElementById('focusStuckBtn').addEventListener('click', () => focusMarkStatus('Stuck'));
            document.getElementById('focusPauseBtn').addEventListener('click', toggleFocusPause);
            // Clicking the timer also toggles pause
            document.getElementById('focusTimer').addEventListener('click', toggleFocusPause);
        }
        function focusCandidateTasks() {
            // Undone tasks sorted by due date (earliest first, no date last)
            const all = (appData.groups || []).flatMap(g => (g.tasks || []).map(t => ({...t, groupName: g.title, groupColor: g.color, groupId: g.id})));
            return all
                .filter(t => t.status !== 'Done')
                .sort((a, b) => {
                    const ad = a.dueDate || '9999-12-31';
                    const bd = b.dueDate || '9999-12-31';
                    return ad.localeCompare(bd);
                });
        }
        function enterFocusMode(startTaskId) {
            buildFocusOverlay();
            const ov = document.getElementById('prismFocusOverlay');
            if (!ov) return;
            const candidates = focusCandidateTasks();
            if (candidates.length === 0) {
                alert('No open tasks — add one first.');
                return;
            }
            focusTaskId = startTaskId && candidates.find(t => t.id === startTaskId) ? startTaskId : candidates[0].id;
            focusTimerSec = FOCUS_TOTAL_SEC;
            focusPaused = false;
            ov.classList.add('visible');
            document.body.style.overflow = 'hidden';
            renderFocusBody();
            startFocusTimer();
            logActivity('FOCUS', `Started ${candidates.find(t => t.id === focusTaskId).name}`);
        }
        function exitFocusMode() {
            const ov = document.getElementById('prismFocusOverlay');
            if (!ov || !ov.classList.contains('visible')) return;
            ov.classList.remove('visible');
            document.body.style.overflow = '';
            stopFocusTimer();
            focusTaskId = null;
        }
        function startFocusTimer() {
            stopFocusTimer();
            focusTimerInterval = setInterval(() => {
                if (focusPaused) return;
                focusTimerSec--;
                updateFocusTimerDisplay();
                if (focusTimerSec <= 0) {
                    stopFocusTimer();
                    logActivity('FOCUS', '50-minute session complete');
                    // Gentle completion — keep overlay open; user can hit Done/Next
                    const tl = document.getElementById('focusTimerLabel');
                    if (tl) tl.textContent = 'session complete — take a break';
                    focusPaused = true;
                    try { new Audio().play(); } catch(e) {}
                }
            }, 1000);
        }
        function stopFocusTimer() {
            if (focusTimerInterval) { clearInterval(focusTimerInterval); focusTimerInterval = null; }
        }
        function toggleFocusPause() {
            focusPaused = !focusPaused;
            const timer = document.getElementById('focusTimer');
            const label = document.getElementById('focusTimerLabel');
            const btn = document.getElementById('focusPauseBtn');
            if (timer) timer.classList.toggle('paused', focusPaused);
            if (label) label.textContent = focusPaused ? 'paused · click to resume' : 'running · click to pause';
            if (btn) btn.firstChild.nodeValue = focusPaused ? 'Resume ' : 'Pause ';
        }
        function updateFocusTimerDisplay() {
            const t = document.getElementById('focusTimer');
            if (!t) return;
            const s = Math.max(0, focusTimerSec);
            const mm = String(Math.floor(s / 60)).padStart(2, '0');
            const ss = String(s % 60).padStart(2, '0');
            t.textContent = `${mm}:${ss}`;
        }
        function focusFindTask(id) {
            for (const g of (appData.groups || [])) {
                const t = (g.tasks || []).find(tt => tt.id === id);
                if (t) return { task: t, group: g };
            }
            return null;
        }
        function renderFocusBody() {
            const found = focusFindTask(focusTaskId);
            if (!found) { exitFocusMode(); return; }
            const { task, group } = found;
            const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            document.getElementById('focusTitle').textContent = task.name || 'Untitled';
            document.getElementById('focusFlowName').textContent = group.title;
            document.getElementById('focusFlowDot').style.background = group.color || '#999';
            const dueLabel = task.dueDate ? prismRelativeDay(task.dueDate) : 'no due date';
            document.getElementById('focusDueLabel').textContent = dueLabel;
            // Blocker callout
            document.getElementById('focusBlocker').classList.toggle('visible', task.status === 'Stuck');
            // Meta
            const meta = [];
            const prioHtml = prismPrioHtml(task.priority);
            if (prioHtml) meta.push(`<span class="meta-item">${prioHtml}<span style="margin-left:6px;">${esc(task.priority)} priority</span></span>`);
            if (task.status && task.status !== 'Done') meta.push(`<span class="meta-item"><span class="meta-dot" style="background:${STATUS_COLORS[task.status] || 'var(--pr-muted)'}"></span>${esc(task.status)}</span>`);
            if (task.progress) meta.push(`<span class="meta-item">${task.progress}% done</span>`);
            document.getElementById('focusMeta').innerHTML = meta.join('');
            // Notes preview
            const notesText = (task.notes || '').replace(/<[^>]+>/g, '').trim();
            document.getElementById('focusNotes').textContent = notesText ? notesText.slice(0, 400) : '';
            // Timer
            updateFocusTimerDisplay();
            // Queue: next undone tasks, highlight current
            const candidates = focusCandidateTasks();
            const runningIdx = candidates.findIndex(t => t.id === focusTaskId);
            const q = candidates.slice(0, 8);
            const queueEl = document.getElementById('focusQueue');
            queueEl.innerHTML = q.map(t => {
                const running = t.id === focusTaskId;
                const icon = running ? '▶' : (t.status === 'Stuck' ? '✕' : (t.status === 'Done' ? '✓' : '○'));
                const iconCls = running ? 'running' : (t.status === 'Stuck' ? 'stuck' : (t.status === 'Done' ? 'done' : ''));
                const rowCls = t.status === 'Done' ? 'done' : '';
                const due = t.dueDate ? prismRelativeDay(t.dueDate) : '';
                return `<div class="prism-focus-q-row ${rowCls}" data-tid="${esc(t.id)}">
                    <span class="prism-focus-q-icon ${iconCls}">${icon}</span>
                    <span class="prism-focus-q-name">${esc(t.name)}</span>
                    <span class="prism-focus-q-sub">${due || t.groupName}</span>
                </div>`;
            }).join('');
            queueEl.querySelectorAll('.prism-focus-q-row').forEach(r => {
                r.addEventListener('click', () => {
                    focusTaskId = r.dataset.tid;
                    focusTimerSec = FOCUS_TOTAL_SEC;
                    if (focusPaused) toggleFocusPause();
                    renderFocusBody();
                });
            });
        }
        function focusMarkStatus(newStatus) {
            const found = focusFindTask(focusTaskId);
            if (!found) return;
            logActivity(newStatus === 'Done' ? 'DONE' : 'STUCK', `${found.task.name} → ${newStatus}`);
            found.task.status = newStatus;
            debouncedSync();
            renderApp();
            focusNextTask();
        }
        function focusNextTask() {
            const candidates = focusCandidateTasks();
            if (candidates.length === 0) { exitFocusMode(); return; }
            const idx = candidates.findIndex(t => t.id === focusTaskId);
            const next = candidates[(idx + 1) % candidates.length];
            // If we wrapped back to same task and it's the last open one, just exit.
            if (next.id === focusTaskId && candidates.length === 1) {
                exitFocusMode();
                return;
            }
            focusTaskId = next.id;
            focusTimerSec = FOCUS_TOTAL_SEC;
            renderFocusBody();
        }

        // ── Skin switcher ──
        // Applies body.skin-{name} class, cascades matching legacy CSS custom props
        // (--bg / --card-bg / --text / etc.) and toggles body.dark so that the rest of
        // Flowdesk's legacy UI (Kanban cards, notes editor, scrollbars, etc.) adopts
        // the chosen palette — not just the new Prism shell.
        const PRISM_SKIN_MAP = {
            prism:   { bg:'#EEF0F5', sidebar:'#F4F5F9', text:'#1B1D2B', textDim:'#6B6F82', border:'#E2E4EC', accent:'#4A5CC9', editor:'#FFFFFF', card:'#FFFFFF', cardHover:'#F4F5F9', toolbar:'#F4F5F9', codeBlock:'#F4F5F9', isDark:false },
            atlas:   { bg:'#F4EFE7', sidebar:'#F0EADF', text:'#2C2419', textDim:'#7A6F5F', border:'#E3DBCB', accent:'#B24A2D', editor:'#FBF7EF', card:'#FBF7EF', cardHover:'#F0EADF', toolbar:'#F0EADF', codeBlock:'#F0EADF', isDark:false },
            mission: { bg:'#141516', sidebar:'#1B1D1F', text:'#E8E6E1', textDim:'#8A8680', border:'#2B2E31', accent:'#E89A3C', editor:'#1B1D1F', card:'#222527', cardHover:'#2B2E31', toolbar:'#1B1D1F', codeBlock:'#0F1011', isDark:true  },
            horizon: { bg:'#F0EDE6', sidebar:'#E8E4DA', text:'#23302A', textDim:'#6B7A72', border:'#D8D3C7', accent:'#7B9880', editor:'#FAF8F3', card:'#FAF8F3', cardHover:'#E8E4DA', toolbar:'#E8E4DA', codeBlock:'#E8E4DA', isDark:false },
            ember:   { bg:'#0F1512', sidebar:'#141B17', text:'#E8E4DA', textDim:'#7E8A82', border:'#233028', accent:'#5FB39A', editor:'#141B17', card:'#1A221D', cardHover:'#233028', toolbar:'#141B17', codeBlock:'#0B100D', isDark:true  },
        };
        function setPrismSkin(name, opts) {
            const skins = Object.keys(PRISM_SKIN_MAP);
            if (!skins.includes(name)) name = 'prism';
            skins.forEach(s => document.body.classList.remove('skin-' + s));
            document.body.classList.add('skin-' + name);

            // Cascade to legacy CSS vars so Kanban/Table/Notes/editor pick up the palette
            const t = PRISM_SKIN_MAP[name];
            const root = document.documentElement;
            root.style.setProperty('--bg', t.bg);
            root.style.setProperty('--sidebar-bg', t.sidebar);
            root.style.setProperty('--text', t.text);
            root.style.setProperty('--text-dim', t.textDim);
            root.style.setProperty('--border', t.border);
            root.style.setProperty('--accent', t.accent);
            root.style.setProperty('--editor-bg', t.editor);
            root.style.setProperty('--card-bg', t.card);
            root.style.setProperty('--card-hover', t.cardHover);
            root.style.setProperty('--toolbar-bg', t.toolbar);
            root.style.setProperty('--code-bg', t.codeBlock);
            document.body.classList.toggle('dark', t.isDark);
            document.body.classList.toggle('dark-mode', t.isDark);

            if (opts && opts.persist) {
                try { localStorage.setItem('flowdesk_skin', name); } catch (e) {}
            }
            const label = document.getElementById('prismSkinBtnLabel');
            if (label) label.textContent = name.charAt(0).toUpperCase() + name.slice(1);
            document.querySelectorAll('.prism-skin-option').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.skin === name);
            });
        }

        // Keep Prism sync dot in sync with legacy indicator (helper — called from updateSyncIndicator)

        // ── Vim-style g-then-X navigation (Mission variant) ──
        // Press "g" then one of: h (home) / f (flows) / b (board) / t (timeline)
        // / c (calendar) / n (notes). Two-stroke with 1.2s timeout.
        let gPressedAt = 0;
        let gHintEl = null;
        function showGHint(msg) {
            if (!gHintEl) {
                gHintEl = document.createElement('div');
                gHintEl.className = 'prism-gmode-hint';
                document.body.appendChild(gHintEl);
            }
            gHintEl.textContent = msg || 'g — h home · f flows · b board · t timeline · c calendar · n notes';
            gHintEl.classList.add('visible');
        }
        function hideGHint() {
            if (gHintEl) gHintEl.classList.remove('visible');
        }
        document.addEventListener('keydown', (e) => {
            // Only fire when Prism shell is active
            if (!document.body.classList.contains('prism-theme')) return;
            const tag = (e.target && e.target.tagName) || '';
            const isEditable = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' ||
                               (e.target && e.target.isContentEditable);

            // Global ⌘K / Ctrl+K → focus top search (only when NOT in editor — notes editor owns ⌘K for link)
            if ((e.metaKey || e.ctrlKey) && e.key === 'k' && !e.shiftKey && !isEditable) {
                const searchBox = document.getElementById('prismSearchBox');
                if (searchBox) {
                    e.preventDefault();
                    searchBox.focus();
                    searchBox.select();
                    return;
                }
            }
            // Global ⌘N / Ctrl+N → new task (only when not typing)
            if ((e.metaKey || e.ctrlKey) && e.key === 'n' && !e.shiftKey && !isEditable) {
                e.preventDefault();
                addNewTask();
                return;
            }
            // Global ⌘/ / Ctrl+/ → quick sync
            if ((e.metaKey || e.ctrlKey) && e.key === '/' && !isEditable) {
                e.preventDefault();
                syncData('quick');
                return;
            }
            // Global ⌘⇧T / Ctrl+Shift+T → cycle skin
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'T' || e.key === 't')) {
                e.preventDefault();
                const order = ['prism','atlas','mission','horizon','ember'];
                const current = (document.body.className.match(/skin-(\w+)/) || [])[1] || 'prism';
                const next = order[(order.indexOf(current) + 1) % order.length];
                setPrismSkin(next, { persist: true });
                return;
            }
            // Global ⌘⇧F / Ctrl+Shift+F → toggle Focus mode (Ember variant)
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'F' || e.key === 'f')) {
                e.preventDefault();
                const ovFocus = document.getElementById('prismFocusOverlay');
                if (ovFocus && ovFocus.classList.contains('visible')) {
                    exitFocusMode();
                } else {
                    enterFocusMode();
                }
                return;
            }
            // Focus-mode-only shortcuts (only when the focus overlay is visible)
            const ovFocusActive = document.getElementById('prismFocusOverlay');
            const focusOpen = ovFocusActive && ovFocusActive.classList.contains('visible');
            if (focusOpen && !isEditable) {
                // Esc → exit
                if (e.key === 'Escape') { e.preventDefault(); exitFocusMode(); return; }
                // Space → pause/resume
                if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); toggleFocusPause(); return; }
                // → / n → next task (skip)
                if (e.key === 'ArrowRight' || e.key === 'n') { e.preventDefault(); focusNextTask(); return; }
                // s → stuck
                if (e.key === 's' || e.key === 'S') { e.preventDefault(); focusMarkStatus('Stuck'); return; }
                // ⌘⏎ → done
                if ((e.metaKey || e.ctrlKey) && (e.key === 'Enter' || e.key === 'Return')) {
                    e.preventDefault();
                    focusMarkStatus('Done');
                    return;
                }
            }

            if (isEditable) return;
            if (e.metaKey || e.ctrlKey || e.altKey) return;

            const now = Date.now();
            const withinWindow = (now - gPressedAt) < 1200;

            // First stroke: 'g'
            if (e.key === 'g' && !withinWindow) {
                gPressedAt = now;
                showGHint();
                e.preventDefault();
                return;
            }

            // Second stroke within window
            if (withinWindow) {
                const map = { h: 'dashboard', f: 'table', b: 'kanban', t: 'timeline', c: 'calendar', n: 'notes' };
                const dest = map[e.key.toLowerCase()];
                gPressedAt = 0;
                hideGHint();
                if (dest) {
                    e.preventDefault();
                    switchView(dest);
                    syncPrismNavActive(dest);
                } else if (e.key === 'Escape') {
                    // cancel silently
                }
                return;
            }

            // Escape hides hint if somehow stuck
            if (e.key === 'Escape' && gHintEl && gHintEl.classList.contains('visible')) {
                gPressedAt = 0;
                hideGHint();
            }
        });
        // Auto-timeout for g prefix
        setInterval(() => {
            if (gPressedAt && Date.now() - gPressedAt > 1200) {
                gPressedAt = 0;
                hideGHint();
            }
        }, 400);

        async function syncData(mode = 'quick') {
            const isFull = mode === 'full';
            updateSyncIndicator('syncing');
            try {
                // Push local data first, then pull
                const localTaskCount = appData.groups.flatMap(g => g.tasks).length;
                if (localTaskCount > 0 || calendarData.events.length > 0 || notesData.notes.length > 0) {
                    await pushSync(isFull);
                }

                // Quick uses getTasksLight (no note content), Full uses getTasks
                const endpoint = isFull ? 'getTasks' : 'getTasksLight';
                const response = await fetch(getAuthUrl(endpoint));
                const data = await response.json();
                if (data.error && data.code === 401) { doLogout(); return; }

                if (data.groups) {
                    // Normalize tasks — ensure progress defaults to 0
                    data.groups.forEach(g => {
                        (g.tasks || []).forEach(t => {
                            if (t.progress === undefined || t.progress === null || isNaN(t.progress)) t.progress = 0;
                            if (!t.subtasks) t.subtasks = [];
                        });
                    });
                    appData.groups = data.groups;
                    appData.members = data.members || [];
                    saveLocalData();
                    renderApp();
                }
                // Sync events — normalize field names from cloud
                function parseTimeField(t) {
                    if (!t) return '';
                    t = String(t);
                    // Already "HH:MM" format — most common after Code.gs fmtTime fix
                    if (/^\d{2}:\d{2}$/.test(t)) return t;
                    // Handle ISO format like "1899-12-30T09:00:00.000Z" from old Google Sheets data
                    // Must convert to local time, not extract UTC hours
                    if (t.includes('T')) {
                        try {
                            const d = new Date(t);
                            if (!isNaN(d)) return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
                        } catch(e) {}
                        const match = t.match(/T(\d{2}):(\d{2})/);
                        if (match) return match[1] + ':' + match[2];
                    }
                    return t;
                }
                if (data.events) {
                    console.log('[SYNC PULL] Events from server:', data.events.map(e => e.id + ' ' + e.title + ' ' + (e.startTime||e.start_time) + '-' + (e.endTime||e.end_time)));
                    const serverEvents = data.events.map(ev => ({
                        id: String(ev.id || Date.now()),
                        title: ev.title || '',
                        event_date: ev.event_date || ev.date || '',
                        start_time: parseTimeField(ev.start_time || ev.startTime) || '09:00',
                        end_time: parseTimeField(ev.end_time || ev.endTime) || '10:00',
                        color: ev.color || '#0073ea',
                        all_day: ev.all_day || ev.allDay || false,
                        description: ev.description || ''
                    }));
                    // Merge: server wins for shared IDs, but keep local-only events
                    const serverIds = new Set(serverEvents.map(e => String(e.id)));
                    const localOnly = calendarData.events.filter(e => !serverIds.has(String(e.id)));
                    calendarData.events = [...serverEvents, ...localOnly];
                    saveCalendarData();
                    const view = document.querySelector('.view-tab.active');
                    if (view && view.dataset.view === 'calendar') renderCalendar();
                }
                // Sync notes
                if (data.notes) {
                    const localNoteMap = {};
                    notesData.notes.forEach(n => { localNoteMap[String(n.id)] = n; });

                    const serverNotes = data.notes.map(n => {
                        const nid = n.id || ('note_' + Date.now() + '_' + Math.random().toString(36).substr(2,5));
                        const localNote = localNoteMap[String(nid)];
                        // Quick sync: server has no content → keep local content
                        const content = (n.content !== undefined && n.content !== '') ? n.content : (localNote ? localNote.content : '');
                        return {
                            id: nid,
                            title: n.title || 'Untitled',
                            content: content,
                            pinned: n.pinned || false,
                            folder: n.folder || '',
                            tags: Array.isArray(n.tags) ? n.tags : [],
                            font: n.font || 'sans',
                            icon: n.icon || '',
                            cover: n.cover || '',
                            coverType: n.coverType || '',
                            sort_order: n.sort_order || n.sortOrder || 0,
                            created_at: n.createdAt || n.created_at || new Date().toISOString(),
                            updated_at: n.updatedAt || n.updated_at || new Date().toISOString()
                        };
                    });
                    // Merge: server wins for shared IDs, but keep local-only notes
                    const serverNoteIds = new Set(serverNotes.map(n => String(n.id)));
                    const localOnlyNotes = notesData.notes.filter(n => !serverNoteIds.has(String(n.id)));
                    notesData.notes = [...serverNotes, ...localOnlyNotes];
                    saveNotesData();
                    const view = document.querySelector('.view-tab.active');
                    if (view && view.dataset.view === 'notes') renderNotes();
                }
                updateSyncIndicator('synced');
            } catch (e) {
                console.error('Sync failed:', e);
                updateSyncIndicator('error');
                setTimeout(() => updateSyncIndicator('synced'), 3000);
            }
        }

        function updateSyncIndicator(state) {
            document.getElementById('syncIndicator').className = 'sync-indicator ' + state;
            if (typeof updatePrismSyncDot === 'function') updatePrismSyncDot(state);
        }

        function debouncedSync() {
            saveLocalData();
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => { pushSync(false); }, 2000);
        }

        async function pushSync(includeNotes = false) {
            try {
                console.log('[SYNC PUSH] Starting push...');
                const pushData = {
                    action: 'syncAll',
                    key: FLOWDESK_API_KEY || localStorage.getItem('flowdesk_api_key') || '',
                    groups: appData.groups,
                    members: appData.members,
                    events: calendarData.events.map(ev => ({
                        id: ev.id, title: ev.title, date: ev.event_date || ev.date || '',
                        startTime: ev.start_time || '', endTime: ev.end_time || '',
                        color: ev.color || '#0073ea', allDay: ev.all_day || false,
                        description: ev.description || ''
                    })),
                    deletedEventIds: deletedEventIds,
                    notes: includeNotes ? notesData.notes.map(n => ({
                        id: n.id, title: n.title, content: n.content || '',
                        pinned: n.pinned || false,
                        folder: n.folder || '', tags: n.tags || [], font: n.font || 'sans',
                        icon: n.icon || '', cover: n.cover || '', coverType: n.coverType || '',
                        sortOrder: n.sort_order || 0,
                        createdAt: n.created_at || '', updatedAt: n.updated_at || ''
                    })) : notesData.notes.map(n => ({
                        id: n.id, title: n.title,
                        pinned: n.pinned || false,
                        folder: n.folder || '', tags: n.tags || [], font: n.font || 'sans',
                        icon: n.icon || '', cover: n.cover || '', coverType: n.coverType || '',
                        sortOrder: n.sort_order || 0,
                        createdAt: n.created_at || '', updatedAt: n.updated_at || ''
                    }))
                };
                // Use POST — content stored in Google Drive (no size limit)
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(pushData),
                    redirect: 'follow'
                });
                const result = await resp.json();
                console.log('[SYNC PUSH] Events sent:', pushData.events.map(e => e.id + ' ' + e.title + ' ' + e.startTime + '-' + e.endTime));
                console.log('[SYNC PUSH] Server response:', JSON.stringify(result).substring(0, 200));
                if (result.error) console.error('Push sync error:', result.error);
                else clearDeletedEventIds();  // Push succeeded, clear pending deletes
            } catch (e) { console.error('Push sync failed:', e); }
        }

        function saveLocalData() { localStorage.setItem('flowdesk_data', JSON.stringify(appData)); }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr + 'T00:00:00');
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return months[date.getMonth()] + ' ' + date.getDate();
        }

        function isOverdue(dueDate, status) {
            if (!dueDate || status === 'Done') return false;
            const due = new Date(dueDate + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return due < today;
        }

        function getDaysUntilDue(dueDate) {
            if (!dueDate) return null;
            const due = new Date(dueDate + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return Math.ceil((due - today) / (1000 * 60 * 60 * 24));
        }

        function addNewTask() {
            if (appData.groups.length === 0) {
                alert('Please create a group first');
                return;
            }
            const group = appData.groups[0];
            const newTask = {
                id: 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                name: 'New Task',
                status: 'Not Started',
                priority: 'Medium',
                dueDate: '',
                timelineStart: '',
                timelineEnd: '',
                notes: '',
                progress: 0,
                subtasks: [],
                labels: [],
                comments: []
            };
            group.tasks.push(newTask);
            logActivity('ADD', `${newTask.name} → ${group.title}`);
            debouncedSync();
            renderApp();
        }

        function expandAll() { appData.groups.forEach(g => g.collapsed = false); renderApp(); }
        function collapseAll() { appData.groups.forEach(g => g.collapsed = true); renderApp(); }

        function exportJSON() {
            const json = JSON.stringify(appData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'flowdesk_' + new Date().getTime() + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        appData = JSON.parse(ev.target.result);
                        saveLocalData();
                        renderApp();
                    } catch (err) { alert('Failed to import JSON'); }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        function resetData() {
            if (!confirm('Are you sure? This will delete all data.')) return;
            appData = { groups: [], members: [] };
            localStorage.removeItem('flowdesk_data');
            debouncedSync();
            renderApp();
        }

        function filterTasks() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('.group-table tbody tr').forEach(row => {
                const taskName = row.querySelector('.task-name')?.textContent || '';
                row.style.display = taskName.toLowerCase().includes(query) ? '' : 'none';
            });
        }

        function switchView(view) {
            // 'timeline' is a Prism-only view — legacy .view-tab has no tab for it, so be defensive
            document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
            const legacyTab = document.querySelector(`.view-tab[data-view="${view}"]`);
            if (legacyTab) legacyTab.classList.add('active');
            ['dashboardView', 'tableView', 'kanbanView', 'timelineView', 'calendarView', 'notesView'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.toggle('hidden', id !== view + 'View');
            });
            // Fade-in animation for the active view
            const container = document.getElementById(view + 'View');
            if (container) {
                container.style.animation = 'none';
                container.offsetHeight; // trigger reflow
                container.style.animation = 'viewFadeIn 0.2s ease';
            }
            if (view === 'dashboard') renderDashboard();
            else if (view === 'calendar') renderCalendar();
            else if (view === 'notes') renderNotes();
            else if (view === 'timeline') renderTimeline();
            else renderApp();
        }

        function renderApp() {
            updateSummary();
            // Prism 'timeline' view has no legacy .view-tab; detect it via the visible view container
            const activeTab = document.querySelector('.view-tab.active');
            let view = activeTab ? activeTab.dataset.view : null;
            if (!view) {
                const visible = ['dashboard','table','kanban','timeline','calendar','notes']
                    .find(v => {
                        const el = document.getElementById(v + 'View');
                        return el && !el.classList.contains('hidden');
                    });
                view = visible || 'dashboard';
            }
            if (view === 'dashboard') renderDashboard();
            else if (view === 'kanban') renderKanban();
            else if (view === 'timeline') renderTimeline();
            else if (view === 'calendar') renderCalendar();
            else if (view === 'notes') renderNotes();
            else renderTable();
            // Prism: keep sidebar flows list in sync with data
            if (typeof renderPrismSidebar === 'function') renderPrismSidebar();
        }

        function renderTable() {
            const container = document.getElementById('tableView');
            container.innerHTML = '';

            // Filter breadcrumb (Prism only): if selectedFlowId is set, show a dismissible chip
            const isPrism = document.body.classList.contains('prism-theme');
            const activeGroup = selectedFlowId
                ? appData.groups.find(g => g.id === selectedFlowId)
                : null;

            // Prism editorial masthead + KPI strip (Iter 7) — honors selectedFlowId
            if (isPrism) {
                const todayStr = new Date().toISOString().slice(0, 10);
                const scopeGroups = activeGroup ? [activeGroup] : (appData.groups || []);
                const allTasks = scopeGroups.flatMap(g => g.tasks || []);
                const flowCount = scopeGroups.length;
                const total = allTasks.length;
                const working = allTasks.filter(t => t.status === 'Working on it').length;
                const stuck = allTasks.filter(t => t.status === 'Stuck').length;
                const overdue = allTasks.filter(t => t.dueDate && t.dueDate < todayStr && t.status !== 'Done').length;
                const done = allTasks.filter(t => t.status === 'Done').length;
                const pct = total > 0 ? Math.round(done / total * 100) : 0;
                const mhWrap = document.createElement('div');
                mhWrap.innerHTML = renderPrismViewMasthead({
                    title: activeGroup ? activeGroup.title : 'All Flows',
                    tagline: activeGroup
                        ? `Focused on ${activeGroup.title} · ${total} task${total === 1 ? '' : 's'}`
                        : `${flowCount} flow${flowCount === 1 ? '' : 's'} · ${total} task${total === 1 ? '' : 's'}`,
                    kpis: [
                        { label: 'Flows',    value: flowCount, icon: '◈', color: 'var(--pr-ink)' },
                        { label: 'Tasks',    value: total,     icon: '∑', color: 'var(--pr-ink)' },
                        { label: 'Working',  value: working,   icon: '⚡', color: 'var(--pr-accent)' },
                        { label: 'Stuck',    value: stuck,     icon: '⚠', color: 'var(--pr-red)' },
                        { label: 'Overdue',  value: overdue,   icon: '⏱', color: 'var(--pr-amber)' },
                        { label: 'Progress', value: pct + '%', icon: '◐', color: 'var(--pr-green)' }
                    ]
                });
                while (mhWrap.firstChild) container.appendChild(mhWrap.firstChild);
            }

            if (isPrism && activeGroup) {
                const bc = document.createElement('div');
                bc.className = 'prism-flow-breadcrumb';
                bc.innerHTML = `
                    <button type="button" class="pr-bc-clear" title="Show all flows">
                        <span class="pr-bc-dot" style="background:${activeGroup.color || '#999'}"></span>
                        <span class="pr-bc-label">Flows <span class="pr-bc-sep">›</span> <strong>${(activeGroup.title || '').replace(/</g,'&lt;')}</strong></span>
                        <span class="pr-bc-x" aria-label="Clear filter">✕</span>
                    </button>
                    <span class="pr-bc-hint">showing 1 flow · click to show all</span>
                `;
                bc.querySelector('.pr-bc-clear').addEventListener('click', () => {
                    selectedFlowId = null;
                    renderTable();
                    if (typeof renderPrismSidebar === 'function') renderPrismSidebar();
                });
                container.appendChild(bc);
            } else if (isPrism && !activeGroup && selectedFlowId) {
                // Stale id — clear it silently
                selectedFlowId = null;
            }

            const visibleGroups = activeGroup
                ? [activeGroup]
                : appData.groups;

            visibleGroups.forEach(group => {
                const groupCard = document.createElement('div');
                groupCard.className = 'group-card';

                const header = document.createElement('div');
                header.className = 'group-header';

                const colorBar = document.createElement('div');
                colorBar.className = 'group-color-bar';
                colorBar.style.backgroundColor = group.color || '#0073ea';

                const collapseArrow = document.createElement('div');
                collapseArrow.className = 'collapse-arrow' + (group.collapsed ? ' collapsed' : '');
                collapseArrow.textContent = '▼';
                collapseArrow.addEventListener('click', () => { group.collapsed = !group.collapsed; renderTable(); });

                const title = document.createElement('div');
                title.className = 'group-title';
                title.textContent = group.title;
                title.addEventListener('dblclick', () => {
                    const input = document.createElement('input');
                    input.className = 'group-title-input';
                    input.type = 'text';
                    input.value = group.title;
                    title.replaceWith(input);
                    input.focus();
                    input.select();
                    input.addEventListener('blur', () => { group.title = input.value; debouncedSync(); renderTable(); });
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') input.blur();
                        if (e.key === 'Escape') renderTable();
                    });
                });

                const count = document.createElement('div');
                count.className = 'group-count';
                count.textContent = group.tasks.length;

                const actions = document.createElement('div');
                actions.className = 'group-actions';

                const colorBtn = document.createElement('button');
                colorBtn.className = 'color-picker-btn';
                colorBtn.style.backgroundColor = group.color || '#0073ea';
                colorBtn.addEventListener('click', () => openColorPickerPopup(group));

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '×';
                deleteBtn.addEventListener('click', () => {
                    if (confirm('Delete this group?')) {
                        appData.groups = appData.groups.filter(g => g.id !== group.id);
                        debouncedSync();
                        renderTable();
                    }
                });

                actions.appendChild(colorBtn);
                actions.appendChild(deleteBtn);
                header.appendChild(colorBar);
                header.appendChild(collapseArrow);
                header.appendChild(title);
                header.appendChild(count);
                header.appendChild(actions);
                groupCard.appendChild(header);

                if (!group.collapsed) {
                    const table = document.createElement('table');
                    table.className = 'group-table';

                    const thead = document.createElement('thead');
                    const tr = document.createElement('tr');
                    ['', 'Task Name', 'Status', 'Priority', 'Due Date', 'Notes', 'Progress', 'Labels', '💬', ''].forEach(h => {
                        const th = document.createElement('th');
                        th.textContent = h;
                        tr.appendChild(th);
                    });
                    thead.appendChild(tr);
                    table.appendChild(thead);

                    const tbody = document.createElement('tbody');
                    group.tasks.forEach(task => {
                        tbody.appendChild(createTableTaskRow(task, group));

                        if (task.subtasks && task.subtasks.length > 0 && task.expanded) {
                            const subtasksRow = document.createElement('tr');
                            subtasksRow.className = 'subtasks-row';
                            const subtasksCell = document.createElement('td');
                            subtasksCell.colSpan = 11;

                            const subtasksContainer = document.createElement('div');
                            subtasksContainer.className = 'subtasks-container';

                            task.subtasks.forEach(subtask => {
                                const subtaskDiv = document.createElement('div');
                                subtaskDiv.className = 'subtask';
                                const checkbox = document.createElement('input');
                                checkbox.type = 'checkbox';
                                checkbox.checked = subtask.done;
                                checkbox.addEventListener('change', () => {
                                    subtask.done = checkbox.checked;
                                    updateTaskProgress(task);
                                    debouncedSync();
                                    renderTable();
                                });
                                const text = document.createElement('div');
                                text.className = 'subtask-text' + (subtask.done ? ' done' : '');
                                text.textContent = subtask.text;
                                subtaskDiv.appendChild(checkbox);
                                subtaskDiv.appendChild(text);
                                subtasksContainer.appendChild(subtaskDiv);
                            });

                            const addDiv = document.createElement('div');
                            addDiv.className = 'subtask-add';
                            const input = document.createElement('input');
                            input.type = 'text';
                            input.placeholder = 'Add subtask...';
                            const btn = document.createElement('button');
                            btn.textContent = 'Add';
                            btn.addEventListener('click', () => {
                                if (input.value.trim()) {
                                    task.subtasks.push({ id: 'subtask_' + Date.now(), text: input.value, done: false });
                                    updateTaskProgress(task);
                                    debouncedSync();
                                    renderTable();
                                }
                            });
                            addDiv.appendChild(input);
                            addDiv.appendChild(btn);
                            subtasksContainer.appendChild(addDiv);
                            subtasksCell.appendChild(subtasksContainer);
                            subtasksRow.appendChild(subtasksCell);
                            tbody.appendChild(subtasksRow);
                        }
                    });
                    table.appendChild(tbody);
                    groupCard.appendChild(table);

                    const addTaskBtn = document.createElement('button');
                    addTaskBtn.className = 'add-task-btn';
                    addTaskBtn.textContent = '+ Add task';
                    addTaskBtn.addEventListener('click', () => {
                        group.tasks.push({
                            id: 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                            name: 'New Task',
                            status: 'Not Started',
                            priority: 'Medium',
                            dueDate: '',
                            timelineStart: '',
                            timelineEnd: '',
                            notes: '',
                            progress: 0,
                            subtasks: [],
                            labels: [],
                            comments: []
                        });
                        debouncedSync();
                        renderTable();
                    });
                    groupCard.appendChild(addTaskBtn);
                }

                container.appendChild(groupCard);
            });

            if (appData.groups.length === 0) {
                const emptyState = document.createElement('div');
                emptyState.style.padding = '40px 24px';
                emptyState.style.textAlign = 'center';
                emptyState.style.color = '#999';
                emptyState.innerHTML = '<p>No groups yet. <button class="btn btn-primary" onclick="createNewGroup()">Create Group</button></p>';
                container.appendChild(emptyState);
            } else if (!activeGroup) {
                // Hide "Add Group" while a single flow is focused — creating a new flow
                // from inside a filtered view is surprising UX
                const addGroupBtn = document.createElement('button');
                addGroupBtn.className = 'btn btn-primary';
                addGroupBtn.textContent = '+ Add Group';
                addGroupBtn.style.marginTop = '24px';
                addGroupBtn.addEventListener('click', createNewGroup);
                container.appendChild(addGroupBtn);
            }
        }

        function createNewGroup() {
            const g = {
                id: 'group_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                title: 'New Group',
                color: GROUP_COLORS[appData.groups.length % GROUP_COLORS.length],
                collapsed: false,
                tasks: []
            };
            appData.groups.push(g);
            logActivity('FLOW', `Created flow ${g.title}`);
            debouncedSync();
            renderTable();
        }

        function createTableTaskRow(task, group) {
            const tr = document.createElement('tr');
            if (isOverdue(task.dueDate, task.status)) tr.classList.add('overdue');
            tr.draggable = true;
            tr.addEventListener('dragstart', (e) => {
                currentDraggingTask = task;
                currentDraggingFromGroup = group;
                tr.classList.add('dragging');
            });
            tr.addEventListener('dragend', () => tr.classList.remove('dragging'));
            tr.addEventListener('dragover', (e) => e.preventDefault());
            tr.addEventListener('drop', (e) => {
                e.preventDefault();
                if (currentDraggingTask && currentDraggingTask.id !== task.id) {
                    const idx = currentDraggingFromGroup.tasks.indexOf(currentDraggingTask);
                    if (idx >= 0) {
                        currentDraggingFromGroup.tasks.splice(idx, 1);
                        group.tasks.push(currentDraggingTask);
                        debouncedSync();
                        renderTable();
                    }
                }
            });

            const checkboxCell = document.createElement('td');
            checkboxCell.className = 'checkbox-cell';
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = task.status === 'Done';
            checkbox.addEventListener('change', () => {
                const next = checkbox.checked ? 'Done' : 'Not Started';
                logActivity(next === 'Done' ? 'DONE' : 'MOVED', `${task.name} → ${next}`);
                task.status = next;
                debouncedSync();
                renderApp();
            });
            checkboxCell.appendChild(checkbox);
            tr.appendChild(checkboxCell);

            const nameCell = document.createElement('td');
            const nameContainer = document.createElement('div');
            nameContainer.className = 'task-name-cell';
            nameContainer.draggable = false;

            const expandArrow = document.createElement('div');
            expandArrow.className = 'expand-arrow' + (task.expanded ? ' expanded' : '');
            if (task.subtasks && task.subtasks.length > 0) {
                expandArrow.textContent = '▶';
                expandArrow.addEventListener('click', (e) => {
                    e.stopPropagation();
                    task.expanded = !task.expanded;
                    renderTable();
                });
            }

            const name = document.createElement('div');
            name.className = 'task-name';
            name.textContent = task.name;
            name.addEventListener('dblclick', () => {
                const input = document.createElement('input');
                input.className = 'task-name-input';
                input.type = 'text';
                input.value = task.name;
                name.replaceWith(input);
                input.focus();
                input.select();
                input.addEventListener('blur', () => { task.name = input.value; debouncedSync(); renderTable(); });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') input.blur();
                    if (e.key === 'Escape') renderTable();
                });
            });

            const progressVisual = document.createElement('div');
            progressVisual.className = 'progress-visual';
            progressVisual.style.display = (task.progress || 0) > 0 ? 'block' : 'none';
            const progressFill = document.createElement('div');
            progressFill.className = 'progress-visual-fill';
            progressFill.style.width = (task.progress || 0) + '%';
            progressVisual.appendChild(progressFill);

            nameContainer.appendChild(expandArrow);
            nameContainer.appendChild(name);
            nameContainer.appendChild(progressVisual);
            nameCell.appendChild(nameContainer);
            tr.appendChild(nameCell);

            const statusCell = document.createElement('td');
            const statusBadge = document.createElement('div');
            statusBadge.className = 'status-badge status-' + task.status.toLowerCase().replace(/\s+/g, '-');
            statusBadge.textContent = task.status;
            statusBadge.addEventListener('click', () => openStatusPickerPopup(task));
            statusCell.appendChild(statusBadge);
            tr.appendChild(statusCell);

            const priorityCell = document.createElement('td');
            const priorityBadge = document.createElement('div');
            priorityBadge.className = 'priority-badge priority-' + task.priority.toLowerCase();
            priorityBadge.textContent = task.priority;
            priorityBadge.addEventListener('click', () => openPriorityPickerPopup(task));
            priorityCell.appendChild(priorityBadge);
            tr.appendChild(priorityCell);

            const dateCell = document.createElement('td');
            const dateContainer = document.createElement('div');
            dateContainer.style.display = 'flex';
            dateContainer.style.alignItems = 'center';
            const dateText = document.createElement('div');
            dateText.style.cursor = 'pointer';
            dateText.textContent = task.dueDate ? formatDate(task.dueDate) : '—';
            if (isOverdue(task.dueDate, task.status)) {
                dateText.style.color = '#e2445c';
                dateText.style.fontWeight = '600';
            }
            dateText.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'date';
                input.value = task.dueDate;
                input.addEventListener('change', () => { task.dueDate = input.value; debouncedSync(); renderApp(); });
                input.addEventListener('blur', () => renderTable());
                dateText.replaceWith(input);
                input.focus();
            });
            dateContainer.appendChild(dateText);

            const days = getDaysUntilDue(task.dueDate);
            if (days !== null) {
                const countdown = document.createElement('span');
                countdown.className = 'due-countdown';
                if (days < 0) {
                    countdown.classList.add('overdue');
                    countdown.textContent = Math.abs(days) + 'd overdue';
                } else if (days <= 3) {
                    countdown.classList.add('upcoming');
                    countdown.textContent = days + 'd left';
                } else {
                    countdown.classList.add('far');
                    countdown.textContent = days + 'd left';
                }
                dateContainer.appendChild(countdown);
            }
            dateCell.appendChild(dateContainer);
            tr.appendChild(dateCell);

            const notesCell = document.createElement('td');
            notesCell.className = 'notes-cell';
            notesCell.textContent = task.notes;
            notesCell.title = task.notes;
            notesCell.addEventListener('click', () => {
                const textarea = document.createElement('textarea');
                textarea.className = 'notes-input';
                textarea.value = task.notes;
                notesCell.replaceWith(textarea);
                textarea.focus();
                textarea.addEventListener('blur', () => { task.notes = textarea.value; debouncedSync(); renderTable(); });
                textarea.addEventListener('keydown', (e) => { if (e.key === 'Escape') renderTable(); });
            });
            tr.appendChild(notesCell);

            const progressCell = document.createElement('td');
            const progressContainer = document.createElement('div');
            progressContainer.className = 'progress-cell';
            const slider = document.createElement('input');
            slider.type = 'range';
            slider.className = 'progress-slider';
            slider.min = 0;
            slider.max = 100;
            slider.value = task.progress || 0;
            slider.addEventListener('mousedown', (e) => { tr.draggable = false; e.stopPropagation(); });
            slider.addEventListener('mouseup', () => { tr.draggable = true; });
            slider.addEventListener('change', () => { task.progress = parseInt(slider.value); debouncedSync(); renderApp(); });
            slider.addEventListener('input', () => { progressText.textContent = slider.value + '%'; });
            const progressText = document.createElement('div');
            progressText.className = 'progress-text';
            progressText.textContent = (task.progress || 0) + '%';
            progressContainer.appendChild(slider);
            progressContainer.appendChild(progressText);
            progressCell.appendChild(progressContainer);
            tr.appendChild(progressCell);

            const labelsCell = document.createElement('td');
            const labelsContainer = document.createElement('div');
            labelsContainer.className = 'task-labels';
            if (!task.labels) task.labels = [];
            task.labels.forEach((label, idx) => {
                const labelEl = document.createElement('div');
                labelEl.className = 'task-label';
                labelEl.textContent = label.text;
                labelEl.style.backgroundColor = label.color;
                labelEl.title = label.text;

                    task.labels.splice(idx, 1);

            const commentsCell = document.createElement('td');

        // ── Timeline (Horizon 14-day Gantt ribbon) ──
        // Renders a sticky-header ribbon of 14 days (today -3 through today +10) with
        // one row per flow. Tasks with a dueDate within range appear as status-colored
        // pills at their dueDate column. Overdue tasks get a red outline. Overlapping
        // tasks in the same flow/day stack to a second tier.
        function renderTimeline() {
            const container = document.getElementById('timelineView');
            if (!container) return;
            container.innerHTML = '';

            const DAYS = 14, OFFSET_BEFORE = 3;
            const today = new Date(); today.setHours(0,0,0,0);
            const start = new Date(today); start.setDate(start.getDate() - OFFSET_BEFORE);
            const days = [];
            for (let i = 0; i < DAYS; i++) {
                const d = new Date(start); d.setDate(start.getDate() + i);
                days.push(d);
            }
            const isWeekend = (d) => d.getDay() === 0 || d.getDay() === 6;
            const sameDay   = (a, b) => a.getTime() === b.getTime();
            const dowShort  = (d) => ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
            const parseDue  = (s) => {
                if (!s) return null;
                const p = String(s).substring(0, 10).split('-').map(Number);
                if (p.length < 3 || p.some(isNaN)) return null;
                return new Date(p[0], p[1]-1, p[2]);
            };
            const statusColor = (st) => {
                const k = (st || '').toLowerCase();
                if (k.includes('done'))   return 'var(--pr-green)';
                if (k.includes('work'))   return 'var(--pr-accent)';
                if (k.includes('stuck'))  return 'var(--pr-red)';
                if (k.includes('review') || k.includes('wait')) return 'var(--pr-amber)';
                if (k.includes('hold'))   return 'var(--pr-muted)';
                return '#4A7FC9'; // fallback blueish
            };

            const esc = (s) => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            const range0 = days[0].getTime();
            const range1 = days[DAYS-1].getTime();

            const shell = document.createElement('div');
            shell.className = 'pr-timeline';

            // ── Header
            const header = document.createElement('div');
            header.className = 'pr-timeline-header';
            const headerDaysHtml = days.map(d => {
                const cls = ['pr-timeline-day-head'];
                if (isWeekend(d)) cls.push('weekend');
                if (sameDay(d, today)) cls.push('today');
                return `<div class="${cls.join(' ')}">
                    <div class="pr-timeline-day-dow">${dowShort(d)}</div>
                    <div class="pr-timeline-day-num">${d.getDate()}</div>
                </div>`;
            }).join('');
            header.innerHTML = `
                <div class="pr-timeline-header-corner">
                    <div class="pr-timeline-title">Timeline</div>
                    <div class="pr-timeline-sub">${DAYS} days · today ±${OFFSET_BEFORE}/${DAYS-OFFSET_BEFORE-1}</div>
                </div>
                <div class="pr-timeline-header-days">${headerDaysHtml}</div>
            `;
            shell.appendChild(header);

            // ── Rows
            const rowsWrap = document.createElement('div');
            rowsWrap.className = 'pr-timeline-rows';
            // Honor sidebar flow filter
            const _allGroups = (appData && appData.groups) ? appData.groups : [];
            const _activeGroup = selectedFlowId ? _allGroups.find(g => g.id === selectedFlowId) : null;
            if (selectedFlowId && !_activeGroup) selectedFlowId = null;
            const groups = _activeGroup ? [_activeGroup] : _allGroups;
            if (groups.length === 0) {
                rowsWrap.innerHTML = `<div class="pr-timeline-empty">No flows yet. Add a flow to see tasks on the timeline.</div>`;
            } else {
                groups.forEach(group => {
                    const row = document.createElement('div');
                    row.className = 'pr-timeline-row';

                    const label = document.createElement('div');
                    label.className = 'pr-timeline-row-label';
                    const groupCount = (group.tasks || []).length;
                    label.innerHTML = `
                        <span class="pr-timeline-dot" style="background:${esc(group.color || '#999')}"></span>
                        <span class="pr-timeline-row-name">${esc(group.title || 'Untitled')}</span>
                        <span class="pr-timeline-row-count">${groupCount}</span>
                    `;
                    row.appendChild(label);

                    const track = document.createElement('div');
                    track.className = 'pr-timeline-row-track';
                    // 14 background cells
                    days.forEach(d => {
                        const cell = document.createElement('div');
                        cell.className = 'pr-timeline-cell-bg';
                        if (isWeekend(d)) cell.classList.add('weekend');
                        if (sameDay(d, today)) cell.classList.add('today');
                        track.appendChild(cell);
                    });

                    // Collect in-range tasks; track collisions per column for stacking
                    const used = new Array(DAYS).fill(0); // 0=empty, 1=first tier taken
                    let anyStacked = false;
                    (group.tasks || []).forEach(task => {
                        const due = parseDue(task.dueDate);
                        if (!due) return;
                        const t = due.getTime();
                        if (t < range0 || t > range1) return;
                        const dayIdx = Math.round((t - range0) / 86400000);
                        if (dayIdx < 0 || dayIdx >= DAYS) return;
                        const stacked = used[dayIdx] >= 1 ? 1 : 0;
                        if (stacked) anyStacked = true;
                        used[dayIdx]++;

                        const bar = document.createElement('div');
                        bar.className = 'pr-timeline-bar';
                        if (stacked) bar.dataset.stacked = '1';
                        const overdueTask = (typeof isOverdue === 'function') && isOverdue(task.dueDate, task.status);
                        if (overdueTask) bar.classList.add('overdue');
                        bar.style.setProperty('--bar-idx', dayIdx);
                        bar.style.backgroundColor = statusColor(task.status);
                        const taskLabel = task.name || task.title || 'Untitled';
                        bar.title = `${taskLabel} · ${task.status || 'Not Started'} · due ${task.dueDate}${overdueTask ? ' · OVERDUE' : ''}`;
                        bar.innerHTML = `<span class="pr-timeline-bar-title">${esc(taskLabel)}</span>`;
                        bar.addEventListener('click', () => {
                            switchView('table');
                            if (typeof syncPrismNavActive === 'function') syncPrismNavActive('table');
                            setTimeout(() => {
                                const card = document.querySelector(`.group-card[data-gid="${group.id}"], .group-card[id="group-${group.id}"]`);
                                if (card && card.scrollIntoView) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }, 60);
                        });
                        track.appendChild(bar);
                    });
                    if (anyStacked) row.dataset.stacked = '1';

                    row.appendChild(track);
                    rowsWrap.appendChild(row);
                });
            }
            shell.appendChild(rowsWrap);

            // Legend
            const legend = document.createElement('div');
            legend.className = 'pr-timeline-legend';
            legend.innerHTML = `
                <span><span class="pr-legend-chip" style="background:var(--pr-accent)"></span>Working</span>
                <span><span class="pr-legend-chip" style="background:var(--pr-amber)"></span>Waiting / Review</span>
                <span><span class="pr-legend-chip" style="background:var(--pr-red)"></span>Stuck</span>
                <span><span class="pr-legend-chip" style="background:var(--pr-green)"></span>Done</span>
                <span><span class="pr-legend-chip" style="background:var(--pr-muted)"></span>On hold</span>
                <span style="margin-left:auto;color:var(--pr-muted);">Click a bar → Flows view</span>
            `;
            shell.appendChild(legend);

            container.appendChild(shell);
        }

        function renderKanban() {
            const container = document.getElementById('kanbanView');
            container.innerHTML = '';

            const statuses = ['Not Started', 'Working on it', 'Waiting for review', 'On Hold', 'Stuck', 'Done'];
            // Honor sidebar flow filter
            const _allGroups = appData.groups || [];
            const _activeGroup = selectedFlowId ? _allGroups.find(g => g.id === selectedFlowId) : null;
            if (selectedFlowId && !_activeGroup) selectedFlowId = null;
            const _kanbanGroups = _activeGroup ? [_activeGroup] : _allGroups;
            const allTasks = _kanbanGroups.flatMap(g => (g.tasks || []).map(t => ({ ...t, groupId: g.id })));

            // Prism editorial masthead + KPI strip (Iter 7)
            // Kanban container is display:flex row, so the masthead+kpis must be
            // full-width blocks ABOVE the columns. We wrap the columns in their
            // own flex row inside the container.
            const isPrism = document.body.classList.contains('prism-theme');
            let columnsHost = container;
            if (isPrism) {
                const todayStr = new Date().toISOString().slice(0, 10);
                const working = allTasks.filter(t => t.status === 'Working on it').length;
                const stuck = allTasks.filter(t => t.status === 'Stuck').length;
                const done = allTasks.filter(t => t.status === 'Done').length;
                const overdue = allTasks.filter(t => t.dueDate && t.dueDate < todayStr && t.status !== 'Done').length;
                const total = allTasks.length;
                const pct = total > 0 ? Math.round(done / total * 100) : 0;
                const mhWrap = document.createElement('div');
                mhWrap.style.width = '100%';
                mhWrap.innerHTML = renderPrismViewMasthead({
                    title: _activeGroup ? _activeGroup.title : 'Board',
                    tagline: _activeGroup
                        ? `Board · focused on ${_activeGroup.title} · ${total} card${total === 1 ? '' : 's'}`
                        : `${total} card${total === 1 ? '' : 's'} across ${statuses.length} columns`,
                    kpis: [
                        { label: 'Total',    value: total,     icon: '∑', color: 'var(--pr-ink)' },
                        { label: 'Working',  value: working,   icon: '⚡', color: 'var(--pr-accent)' },
                        { label: 'Stuck',    value: stuck,     icon: '⚠', color: 'var(--pr-red)' },
                        { label: 'Overdue',  value: overdue,   icon: '⏱', color: 'var(--pr-amber)' },
                        { label: 'Done',     value: done,      icon: '✓', color: 'var(--pr-green)' },
                        { label: 'Progress', value: pct + '%', icon: '◐', color: 'var(--pr-green)' }
                    ]
                });
                while (mhWrap.firstChild) container.appendChild(mhWrap.firstChild);
                columnsHost = document.createElement('div');
                columnsHost.className = 'prism-kanban-columns';
                columnsHost.style.display = 'flex';
                columnsHost.style.gap = '16px';
                columnsHost.style.overflowX = 'auto';
                columnsHost.style.paddingBottom = '8px';
                container.appendChild(columnsHost);
            }

            statuses.forEach(status => {
                const column = document.createElement('div');
                column.className = 'kanban-column';

                const title = document.createElement('div');
                title.className = 'kanban-column-title';
                title.textContent = status;
                column.appendChild(title);

                const tasks = allTasks.filter(t => t.status === status);
                tasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'kanban-card';
                    card.draggable = true;

                    const cardTitle = document.createElement('div');
                    cardTitle.className = 'kanban-card-title';
                    cardTitle.textContent = task.name;
                    card.appendChild(cardTitle);

                    if (task.dueDate) {
                        const cardDate = document.createElement('div');
                        cardDate.className = 'kanban-card-date';
                        cardDate.textContent = formatDate(task.dueDate);
                        card.appendChild(cardDate);
                    }

                    if ((task.progress || 0) > 0) {
                        const progress = document.createElement('div');
                        progress.className = 'kanban-card-progress';
                        const fill = document.createElement('div');
                        fill.className = 'kanban-card-progress-fill';
                        fill.style.width = (task.progress || 0) + '%';
                        progress.appendChild(fill);
                        card.appendChild(progress);
                    }

                    const meta = document.createElement('div');
                    meta.className = 'kanban-card-meta';
                    const priorityDot = document.createElement('div');
                    priorityDot.className = 'kanban-card-priority';
                    priorityDot.style.backgroundColor = PRIORITY_COLORS[task.priority];
                    meta.appendChild(priorityDot);
                    card.appendChild(meta);

                    card.addEventListener('dragstart', (e) => {
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('taskId', task.id);
                        e.dataTransfer.setData('fromStatus', status);
                    });

                    column.appendChild(card);
                });

                column.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });

                column.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const taskId = e.dataTransfer.getData('taskId');
                    const fromStatus = e.dataTransfer.getData('fromStatus');
                    const task = allTasks.find(t => t.id === taskId);
                    if (task && fromStatus !== status) {
                        logActivity(status === 'Done' ? 'DONE' : (status === 'Stuck' ? 'STUCK' : 'MOVED'), `${task.name} → ${status}`);
                        task.status = status;
                        debouncedSync();
                        renderKanban();
                    }
                });

                columnsHost.appendChild(column);
            });
        }
