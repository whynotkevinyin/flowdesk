        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // ── Image drag-and-drop support ──
        function initNoteImageDrop() {
            const editor = document.getElementById('noteContentEditable');
            if (!editor) return;

            editor.addEventListener('dragover', e => {
                e.preventDefault();
                editor.classList.add('drag-over');
            });
            editor.addEventListener('dragleave', e => {
                editor.classList.remove('drag-over');
            });
            editor.addEventListener('drop', e => {
                e.preventDefault();
                editor.classList.remove('drag-over');
                const files = e.dataTransfer.files;
                for (const file of files) {
                    if (file.type.startsWith('image/')) {
                        insertImageFile(file);
                    }
                }
            });
            // Paste handler for clipboard images
            editor.addEventListener('paste', e => {
                const items = e.clipboardData.items;
                for (const item of items) {
                    if (item.type.startsWith('image/')) {
                        e.preventDefault();
                        const file = item.getAsFile();
                        insertImageFile(file);
                        return;
                    }
                }
            });
        }

        function insertImageFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.execCommand('insertHTML', false,
                    '<img src="' + e.target.result + '" class="note-image" style="max-width:100%;border-radius:6px;margin:8px 0;" alt="' + escapeHtml(file.name) + '">');
                if (typeof debouncedUpdateNoteContent === 'function') debouncedUpdateNoteContent();
            };
            reader.readAsDataURL(file);
        }

        // ── Link insertion ──
        function noteInsertLink() {
            const selection = window.getSelection();
            const selectedText = selection.toString() || '';
            const url = prompt('URL:', 'https://');
            if (!url) return;
            const text = selectedText || prompt('Link text:', url) || url;

            const editor = document.getElementById('noteContentEditable');
            if (editor) editor.focus();

            if (selectedText) {
                document.execCommand('createLink', false, url);
            } else {
                document.execCommand('insertHTML', false, '<a href="' + escapeHtml(url) + '" target="_blank" class="note-link">' + escapeHtml(text) + '</a>');
            }
        }

        // ── Markdown preview toggle ──
        let markdownPreviewActive = false;

        function toggleMarkdownPreview() {
            const editor = document.getElementById('noteContentEditable');
            const previewEl = document.getElementById('noteMarkdownPreview');
            if (!editor || !previewEl) return;

            markdownPreviewActive = !markdownPreviewActive;

            if (markdownPreviewActive) {
                editor.style.display = 'none';
                previewEl.style.display = 'block';
                previewEl.innerHTML = renderMarkdownPreview(editor.innerHTML);
            } else {
                editor.style.display = 'block';
                previewEl.style.display = 'none';
            }

            document.querySelector('.note-preview-btn')?.classList.toggle('active', markdownPreviewActive);
        }

        function renderMarkdownPreview(html) {
            return '<div class="markdown-preview-content">' + html + '</div>';
        }

        function buildNoteItem(n, idx) {
            const isActive = n.id === currentNoteId;
            const active = isActive ? ' active' : '';
            const ariaCurrent = isActive ? ' aria-current="true"' : '';
            const rawDate = n.updated_at || n.updatedAt || n.created_at || n.createdAt || '';
            const relDate = noteRelativeDate(rawDate);
            const safeId = typeof n.id === 'string' ? `'${n.id}'` : n.id;
            const preview = noteStripHtml(n.content).substring(0, 60);
            const safeTitle = escapeHtml(n.title || 'Untitled');
            const safeFolder = n.folder ? escapeHtml(n.folder) : '';
            const folderTag = n.folder && currentNoteFolder === null ? `<span class="note-item-folder">📁 ${safeFolder}</span>` : '';
            const pinStar = n.pinned ? '<span class="note-item-pin">&#9733;</span>' : '';
            let itemTags = '';
            if (n.tags && n.tags.length > 0) {
                itemTags = n.tags.slice(0, 3).map(t => { const c = getTagColor(t); return `<span style="display:inline-block;padding:1px 5px;border-radius:6px;font-size:9px;background:${c.bg};color:${c.fg};">${escapeHtml(t)}</span>`; }).join('') + (n.tags.length > 3 ? `<span style="font-size:9px;color:#91918E;">+${n.tags.length-3}</span>` : '');
            }
            return `<div class="note-item${active}" onclick="selectNote(${safeId})" tabindex="0"${ariaCurrent}
                draggable="true" data-note-idx="${idx}" role="option" aria-label="${safeTitle}"
                ondragstart="noteDragStart(event,${idx})" ondragover="noteDragOver(event)" ondragleave="noteDragLeave(event)" ondrop="noteDrop(event,${idx})"
                onkeydown="if(event.key==='Enter')selectNote(${safeId})">
                <span class="note-item-handle">⠿</span>
                <div class="note-item-title">${pinStar}${n.icon ? '<span style="margin-right:4px;">'+n.icon+'</span>' : ''}${safeTitle}</div>
                <div class="note-item-preview">${escapeHtml(preview || 'Empty note')}</div>
                <div class="note-item-bottom">${folderTag}${itemTags}<span class="note-item-date">${relDate}</span></div>
            </div>`;
        }

        function selectNoteFolder(folder) {
            currentNoteFolder = folder;
            renderNotes();
        }

        function newNoteFolder() {
            const name = prompt('Folder name:');
            if (name && name.trim()) {
                currentNoteFolder = name.trim();
                renderNotes();
            }
        }

        function folderContextMenu(e, folderName) {
            e.preventDefault();
            const action = prompt(`Folder "${folderName}":\nType "rename" to rename or "delete" to delete folder:`);
            if (!action) return;
            if (action.toLowerCase().startsWith('rename')) {
                const newName = prompt('New folder name:', folderName);
                if (newName && newName.trim() && newName.trim() !== folderName) {
                    notesData.notes.forEach(n => { if (n.folder === folderName) n.folder = newName.trim(); });
                    if (currentNoteFolder === folderName) currentNoteFolder = newName.trim();
                    saveNotesData(); renderNotes();
                }
            } else if (action.toLowerCase().startsWith('delete')) {
                if (confirm(`Move all notes in "${folderName}" to unfiled?`)) {
                    notesData.notes.forEach(n => { if (n.folder === folderName) n.folder = ''; });
                    if (currentNoteFolder === folderName) currentNoteFolder = null;
                    saveNotesData(); renderNotes();
                }
            }
        }

        function moveNoteToFolder(noteId, folder) {
            if (folder === '__new__') {
                const name = prompt('New folder name:');
                if (name && name.trim()) {
                    const note = notesData.notes.find(n => n.id === noteId);
                    if (note) { note.folder = name.trim(); note.updated_at = new Date().toISOString(); }
                } else {
                    renderNotes(); return;
                }
            } else {
                const note = notesData.notes.find(n => n.id === noteId);
                if (note) { note.folder = folder; note.updated_at = new Date().toISOString(); }
            }
            saveNotesData(); renderNotes();
        }

        function toggleNotePin(noteId) {
            const note = notesData.notes.find(n => n.id === noteId);
            if (!note) return;
            note.pinned = !note.pinned;
            note.updated_at = new Date().toISOString();
            // Animate pin button
            const pinBtn = document.querySelector('.note-pin-btn');
            if (pinBtn) {
                pinBtn.style.animation = 'pinBounce 0.3s ease';
                setTimeout(() => { pinBtn.style.animation = ''; }, 300);
            }
            saveNotesData(); renderNotes();
        }

        // Drag & drop reorder
        function noteDragStart(e, idx) {
            noteDragSrcIndex = idx;
            e.dataTransfer.effectAllowed = 'move';
            e.target.style.opacity = '0.5';
        }
        function noteDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.currentTarget.classList.add('drag-over');
        }
        function noteDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }
        function noteDrop(e, targetIdx) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (noteDragSrcIndex === null || noteDragSrcIndex === targetIdx) return;
            const filtered = getFilteredNotes();
            const srcNote = filtered[noteDragSrcIndex];
            const targetNote = filtered[targetIdx];
            if (!srcNote || !targetNote) return;
            const srcMainIdx = notesData.notes.findIndex(n => n.id === srcNote.id);
            const targetMainIdx = notesData.notes.findIndex(n => n.id === targetNote.id);
            if (srcMainIdx < 0 || targetMainIdx < 0) return;
            notesData.notes.splice(srcMainIdx, 1);
            const newTargetIdx = notesData.notes.findIndex(n => n.id === targetNote.id);
            notesData.notes.splice(newTargetIdx >= 0 ? newTargetIdx : targetMainIdx, 0, srcNote);
            notesData.notes.forEach((n, i) => n.sort_order = i);
            noteDragSrcIndex = null;
            saveNotesData(); renderNotes();
        }

        function addNote() {
            const note = {
                id: Date.now(),
                title: '',
                content: '',
                pinned: false,
                folder: currentNoteFolder || '',
                tags: [],
                font: 'sans',
                icon: '',
                cover: '',
                coverType: '',
                sort_order: 0,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };
            notesData.notes.unshift(note);
            notesData.notes.forEach((n, i) => n.sort_order = i);
            currentNoteId = note.id;
            saveNotesData();
            renderNotes();
            // Focus the title input
            setTimeout(() => {
                const ti = document.querySelector('.note-title-input');
                if (ti) ti.focus();
            }, 50);
        }

        function saveNotesData() {
            try {
                localStorage.setItem('flowdesk_notes', JSON.stringify(notesData.notes));
            } catch (e) {
                if (e.name === 'QuotaExceededError' || e.code === 22) {
                    showNotesToast('Storage is full. Please delete some notes to free up space.', 5000);
                } else {
                    showNotesToast('Failed to save notes. Please try again.', 3000);
                }
            }
        }

        function selectNote(noteId) {
            currentNoteId = noteId;
            markdownPreviewActive = false;
            renderNotes();
            setTimeout(() => { highlightAllCode(); initNoteImageDrop(); }, 50);
        }

        function deleteNote(noteId) {
            if (!confirm('Delete this note?')) return;
            notesData.notes = notesData.notes.filter(n => n.id !== noteId);
            if (currentNoteId === noteId) currentNoteId = null;
            saveNotesData();
            renderNotes();
        }

        function updateNoteTitle(noteId, title) {
            const note = notesData.notes.find(n => n.id === noteId);
            if (!note) return;
            note.title = title;
            note.updated_at = new Date().toISOString();
            saveNotesData();
            // Update sidebar item title and breadcrumb inline
            const items = document.querySelectorAll('.note-item');
            items.forEach(item => {
                if (item.classList.contains('active')) {
                    const titleEl = item.querySelector('.note-item-title');
                    if (titleEl) titleEl.innerHTML = (note.pinned ? '<span class="note-item-pin">&#9733;</span>' : '') + (title || 'Untitled');
                }
            });
            const bc = document.querySelector('.note-breadcrumb');
            if (bc) bc.innerHTML = (note.folder ? '📁 ' + note.folder + ' <span>/</span> ' : '') + (title || 'Untitled');
        }

        let _wordCountTimer = null;
        function updateNoteContent(noteId) {
            const note = notesData.notes.find(n => n.id === noteId);
            if (!note) return;
            const el = document.getElementById('noteContentEditable');
            if (el) {
                note.content = el.innerHTML;
                note.updated_at = new Date().toISOString();
                saveNotesData();
                // Lazy word count update (500ms debounce)
                clearTimeout(_wordCountTimer);
                _wordCountTimer = setTimeout(() => {
                    const wc = noteWordCount(note.content);
                    const meta = document.querySelector('.note-meta');
                    if (meta) {
                        const spans = meta.querySelectorAll('span');
                        if (spans[0]) spans[0].textContent = wc.words + ' words';
                        if (spans[1]) spans[1].textContent = wc.chars + ' characters';
                        if (spans[2]) spans[2].textContent = wc.readTime;
                    }
                }, 500);
                // Update sidebar preview
                const items = document.querySelectorAll('.note-item');
                items.forEach(item => {
                    if (item.classList.contains('active')) {
                        const prev = item.querySelector('.note-item-preview');
                        if (prev) prev.textContent = noteStripHtml(note.content).substring(0, 60) || 'Empty note';
                    }
                });
            }
        }

        function filterNotes(query) {
            query = query.toLowerCase();
            const items = document.querySelectorAll('.note-item');
            let visibleCount = 0;
            // Build a map of note content for full-text search
            const noteContentMap = {};
            notesData.notes.forEach(n => {
                noteContentMap[n.id] = noteStripHtml(n.content).toLowerCase();
            });
            items.forEach(item => {
                const title = (item.querySelector('.note-item-title').textContent || '').toLowerCase();
                const preview = (item.querySelector('.note-item-preview').textContent || '').toLowerCase();
                // Find associated note for full content search
                const onclickAttr = item.getAttribute('onclick') || '';
                const idMatch = onclickAttr.match(/selectNote\((\d+|'[^']*')\)/);
                let noteContent = '';
                if (idMatch) {
                    const nid = idMatch[1].replace(/'/g, '');
                    const numId = Number(nid);
                    noteContent = noteContentMap[numId] || noteContentMap[nid] || '';
                }
                const visible = !query || title.includes(query) || preview.includes(query) || noteContent.includes(query);
                item.style.display = visible ? '' : 'none';
                if (visible) {
                    visibleCount++;
                    // Highlight matching text in preview
                    const previewEl = item.querySelector('.note-item-preview');
                    if (previewEl && query) {
                        const origText = previewEl.textContent;
                        const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
                        previewEl.innerHTML = origText.replace(regex, '<mark style="background:#FEF7E0;padding:0 1px;border-radius:2px;">$1</mark>');
                    } else if (previewEl && !query) {
                        previewEl.innerHTML = escapeHtml(previewEl.textContent);
                    }
                }
            });
            // Show/hide empty search message
            let emptyMsg = document.querySelector('.notes-empty-search');
            if (visibleCount === 0 && query) {
                if (!emptyMsg) {
                    emptyMsg = document.createElement('div');
                    emptyMsg.className = 'notes-empty-search';
                    const notesList = document.getElementById('notesList');
                    if (notesList) notesList.appendChild(emptyMsg);

                emptyMsg.textContent = `No notes matching "${query}"`;

            } else if (emptyMsg) {
                emptyMsg.style.display = 'none';

            // Update search results count
            const countEl = document.getElementById('notesSearchCount');
            if (countEl) {
                if (query) {
                    countEl.textContent = visibleCount + ' result' + (visibleCount !== 1 ? 's' : '') + ' for "' + query + '"';

        // ── Mention / internal link ──
        let mentionPopup = null, mentionIndex = 0, mentionFiltered = [];
        function showMentionPopup() {
            closeMentionPopup();
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return;
            const range = sel.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            const editorEl = document.getElementById('noteContentEditable');
            if (!editorEl) return;
            const editorRect = editorEl.getBoundingClientRect();
            mentionPopup = document.createElement('div');

            mentionPopup.style.left = (rect.left - editorRect.left) + 'px';
            mentionFiltered = notesData.notes.filter(n => n.id !== currentNoteId).map(n => ({ id: n.id, title: n.title || 'Untitled', icon: n.icon || '📝' }));
            mentionIndex = 0;
            renderMentionItems('');
            editorEl.style.position = 'relative';
            editorEl.appendChild(mentionPopup);
        }
        function renderMentionItems(query) {
            if (!mentionPopup) return;
            const q = query.toLowerCase();
            mentionFiltered = notesData.notes.filter(n => n.id !== currentNoteId && (n.title || 'Untitled').toLowerCase().includes(q)).map(n => ({ id: n.id, title: n.title || 'Untitled', icon: n.icon || '📝' }));
            mentionPopup.innerHTML = '';
            if (mentionFiltered.length === 0) {
                mentionPopup.innerHTML = '<div class="mention-item" style="color:#91918E;">No matching notes</div>';
                return;
            }
            mentionFiltered.forEach((n, i) => {
                const item = document.createElement('div');
                item.className = 'mention-item' + (i === mentionIndex ? ' active' : '');
                item.innerHTML = `<span>${n.icon}</span><span>${escapeHtml(n.title)}</span>`;
                item.onclick = () => insertMention(n);
                item.onmouseenter = () => { mentionIndex = i; updateMentionHighlight(); };
                mentionPopup.appendChild(item);
            });
        }
        function updateMentionHighlight() {
            if (!mentionPopup) return;
            mentionPopup.querySelectorAll('.mention-item').forEach((el, i) => el.classList.toggle('active', i === mentionIndex));
        }
        function insertMention(noteRef) {
            const sel = window.getSelection();
            if (sel && sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const node = range.startContainer;
                if (node.nodeType === 3) {
                    const text = node.textContent;
                    const atPos = text.lastIndexOf('@');
                    if (atPos >= 0) {
                        node.textContent = text.substring(0, atPos) + text.substring(range.startOffset);
                        const newRange = document.createRange();
                        newRange.setStart(node, Math.min(atPos, node.textContent.length));
                        newRange.collapse(true);
                        sel.removeAllRanges();
                        sel.addRange(newRange);
                    }
                }
            }
            const mentionHtml = `<a class="note-mention" data-note-id="${noteRef.id}" onclick="selectNote(${noteRef.id})" contenteditable="false">${noteRef.icon} ${escapeHtml(noteRef.title)}</a>&nbsp;`;
            document.execCommand('insertHTML', false, mentionHtml);
            closeMentionPopup();
        }
        function closeMentionPopup() {
            if (mentionPopup && mentionPopup.parentNode) mentionPopup.parentNode.removeChild(mentionPopup);
            mentionPopup = null; mentionIndex = 0;
        }

        // ── Turn Into (block type conversion) ──
        let turnIntoMenu = null;
        function showTurnIntoMenu() {
            closeTurnIntoMenu();
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return;
            const range = sel.getRangeAt(0);
            let block = range.startContainer;
            while (block && block.nodeType === 3) block = block.parentNode;
            if (!block) return;
            // Walk up to find direct child of editor
            const editor = document.getElementById('noteContentEditable');
            while (block && block.parentNode !== editor) block = block.parentNode;
            if (!block || block === editor) return;

            const rect = block.getBoundingClientRect();
            turnIntoMenu = document.createElement('div');
            turnIntoMenu.className = 'turn-into-menu';
            turnIntoMenu.style.top = rect.top + 'px';
            turnIntoMenu.style.left = (rect.left - 190) + 'px';
            if (rect.left < 200) turnIntoMenu.style.left = (rect.right + 8) + 'px';
            const types = [
                { icon: 'P', label: 'Text', tag: 'p' },
                { icon: 'H1', label: 'Heading 1', tag: 'h1' },
                { icon: 'H2', label: 'Heading 2', tag: 'h2' },
                { icon: 'H3', label: 'Heading 3', tag: 'h3' },
                { icon: '•', label: 'Bullet List', action: () => { closeTurnIntoMenu(); noteExec('insertUnorderedList'); } },
                { icon: '1.', label: 'Numbered List', action: () => { closeTurnIntoMenu(); noteExec('insertOrderedList'); } },
                { icon: '❝', label: 'Quote', action: () => { closeTurnIntoMenu(); noteInsertQuote(); } },
                { icon: '</>', label: 'Code Block', action: () => { closeTurnIntoMenu(); noteInsertCodeBlock(); } },
            ];
            types.forEach(t => {
                const item = document.createElement('div');
                item.className = 'turn-into-item';
                item.innerHTML = `<span style="width:24px;text-align:center;font-weight:600;font-size:12px;">${t.icon}</span><span>${t.label}</span>`;
                item.onclick = () => {
                    if (t.action) { t.action(); return; }
                    // Convert block tag
                    const newEl = document.createElement(t.tag);
                    newEl.innerHTML = block.innerHTML;
                    block.parentNode.replaceChild(newEl, block);
                    closeTurnIntoMenu();
                    // Place cursor in new element
                    const r = document.createRange();
                    r.selectNodeContents(newEl);
                    r.collapse(false);
                    sel.removeAllRanges();
                    sel.addRange(r);
                };
                turnIntoMenu.appendChild(item);
            });
            document.body.appendChild(turnIntoMenu);
            setTimeout(() => document.addEventListener('click', _turnIntoOutsideClick), 10);
        }
        function _turnIntoOutsideClick(e) {
            if (turnIntoMenu && !turnIntoMenu.contains(e.target)) closeTurnIntoMenu();
        }
        function closeTurnIntoMenu() {
            if (turnIntoMenu) turnIntoMenu.remove();
            turnIntoMenu = null;
            document.removeEventListener('click', _turnIntoOutsideClick);
        }

        // ── Math formula (KaTeX) ──
        function noteInsertMath() {
            const formula = prompt('LaTeX formula:', 'E = mc^2');
            if (!formula) return;
            let rendered = formula;
            try {
                if (typeof katex !== 'undefined') rendered = katex.renderToString(formula, { throwOnError: false, displayMode: true });
            } catch(e) { /* fallback to raw */ }
            const html = `<div class="math-block" contenteditable="false" data-formula="${escapeHtml(formula)}" ondblclick="editMathBlock(this)">${rendered}</div><p><br></p>`;
            document.execCommand('insertHTML', false, html);
        }
        function editMathBlock(el) {
            const oldFormula = el.getAttribute('data-formula') || '';
            const newFormula = prompt('Edit LaTeX formula:', oldFormula);
            if (newFormula === null) return;
            if (newFormula === '') { el.remove(); return; }
            el.setAttribute('data-formula', newFormula);
            try {
                if (typeof katex !== 'undefined') el.innerHTML = katex.renderToString(newFormula, { throwOnError: false, displayMode: true });
                else el.textContent = newFormula;
            } catch(e) { el.textContent = newFormula; }
            // Trigger content save
            if (typeof debouncedUpdateNoteContent === 'function') debouncedUpdateNoteContent(currentNoteId);
        }

            // Table Tab navigation
            if (event.key === 'Tab') {
                const cell = event.target.closest ? event.target.closest('td, th') : null;
                if (!cell) {
                    const sel = window.getSelection();
                    if (sel && sel.rangeCount > 0) {
                        const node = sel.getRangeAt(0).startContainer;
                        const parentCell = node.parentElement ? node.parentElement.closest('td, th') : null;
                        if (parentCell) {
                            event.preventDefault();
                            const cells = Array.from(parentCell.closest('table').querySelectorAll('td, th'));
                            const idx = cells.indexOf(parentCell);
                            const next = event.shiftKey ? cells[idx - 1] : cells[idx + 1];
                            if (next) next.focus();
                            return;
                        }
                    }
                } else {
                    event.preventDefault();
                    const cells = Array.from(cell.closest('table').querySelectorAll('td, th'));
                    const idx = cells.indexOf(cell);
                    const next = event.shiftKey ? cells[idx - 1] : cells[idx + 1];
                    if (next) next.focus();
                    return;
                }
            }
            if (slashMenuActive) {
                const count = slashMenuFilteredCommands.length;
                if (event.key === 'ArrowDown') {
                    event.preventDefault();
                    if (count > 0) slashMenuIndex = (slashMenuIndex + 1) % count;
                    updateSlashMenuHighlight();
                } else if (event.key === 'ArrowUp') {
                    event.preventDefault();
                    if (count > 0) slashMenuIndex = (slashMenuIndex - 1 + count) % count;
                    updateSlashMenuHighlight();
                } else if (event.key === 'Enter') {
                    event.preventDefault();
                    if (count > 0) executeSlashCommand(slashMenuFilteredCommands[slashMenuIndex].originalIndex);
                } else if (event.key === 'Escape') {
                    event.preventDefault();
                    closeSlashMenu();
                } else if (event.key === 'Backspace') {
                    // Let the default backspace happen, then re-filter
                    setTimeout(() => filterSlashMenu(), 0);
                } else if (event.key.length === 1 && !event.ctrlKey && !event.metaKey) {
                    // Printable character -- filter after it's inserted
                    setTimeout(() => filterSlashMenu(), 0);
                }
                return;
            }
            // Detect "/" typed at beginning of a block
            if (event.key === '/' ) {
                const sel = window.getSelection();
                if (sel && sel.rangeCount > 0) {
                    const range = sel.getRangeAt(0);
                    const node = range.startContainer;
                    const text = node.textContent || '';
                    const offset = range.startOffset;
                    // Show slash menu if at start of empty line or at start of node
                    if (offset === 0 || text.substring(0, offset).trim() === '') {
                        setTimeout(() => showSlashMenu(), 10);
                    }
                }
            }
            // Ctrl+K / Cmd+K: insert link
            if ((event.metaKey || event.ctrlKey) && event.key === 'k') {
                event.preventDefault();
                noteInsertLink();
            }
            // Ctrl+Z / Cmd+Z: undo, Ctrl+Shift+Z / Cmd+Shift+Z: redo
            // (browser native, but we ensure it works)

            // @ mention popup
            if (event.key === '@' && !event.ctrlKey && !event.metaKey) {
                setTimeout(() => showMentionPopup(), 10);
            }
            // Handle mention popup navigation
            if (mentionPopup) {
                if (event.key === 'ArrowDown') { event.preventDefault(); mentionIndex = (mentionIndex + 1) % Math.max(mentionFiltered.length,1); updateMentionHighlight(); return; }
                if (event.key === 'ArrowUp') { event.preventDefault(); mentionIndex = (mentionIndex - 1 + mentionFiltered.length) % Math.max(mentionFiltered.length,1); updateMentionHighlight(); return; }
                if (event.key === 'Enter' && mentionFiltered.length > 0) { event.preventDefault(); insertMention(mentionFiltered[mentionIndex]); return; }
                if (event.key === 'Escape') { event.preventDefault(); closeMentionPopup(); return; }
                if (event.key === 'Backspace' || (event.key.length === 1 && !event.ctrlKey && !event.metaKey)) {
                    setTimeout(() => {
                        const sel = window.getSelection();
                        if (!sel || sel.rangeCount === 0) { closeMentionPopup(); return; }
                        const range = sel.getRangeAt(0);
                        const node = range.startContainer;
                        const text = node.textContent || '';
                        const atPos = text.lastIndexOf('@');
                        if (atPos < 0) { closeMentionPopup(); return; }
                        const query = text.substring(atPos + 1, range.startOffset);
                        renderMentionItems(query);
                    }, 0);
                }
            }
        }

        function showSlashMenu() {
            closeSlashMenu();
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) return;
            const range = sel.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            const editorRect = document.getElementById('noteContentEditable').getBoundingClientRect();

            slashMenuEl = document.createElement('div');
            slashMenuEl.className = 'slash-menu';
            slashMenuEl.style.top = (rect.bottom - editorRect.top + document.getElementById('noteContentEditable').scrollTop + 4) + 'px';
            slashMenuEl.style.left = (rect.left - editorRect.left) + 'px';

            slashMenuFilteredCommands = slashCommands.map((cmd, i) => ({ ...cmd, originalIndex: i }));
            renderSlashMenuItems();

            document.getElementById('noteContentEditable').style.position = 'relative';
            document.getElementById('noteContentEditable').appendChild(slashMenuEl);
            slashMenuActive = true;
            slashMenuIndex = 0;
        }

        function renderSlashMenuItems() {
            if (!slashMenuEl) return;
            slashMenuEl.innerHTML = '';
            slashMenuFilteredCommands.forEach((cmd, i) => {
                const item = document.createElement('div');
                item.className = 'slash-menu-item' + (i === slashMenuIndex ? ' active' : '');
                item.innerHTML = `<span class="slash-icon">${cmd.icon}</span><div><div class="slash-label">${cmd.label}</div><div class="slash-desc">${cmd.desc}</div></div>`;
                item.onclick = () => executeSlashCommand(cmd.originalIndex);
                item.onmouseenter = () => { slashMenuIndex = i; updateSlashMenuHighlight(); };
                slashMenuEl.appendChild(item);
            });
            if (slashMenuFilteredCommands.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'slash-menu-item';
                empty.style.color = '#91918E';
                empty.textContent = 'No matching commands';
                slashMenuEl.appendChild(empty);
            }
        }

        function filterSlashMenu() {
            if (!slashMenuActive) return;
            // Extract the text typed after "/" in the current node
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0) { closeSlashMenu(); return; }
            const range = sel.getRangeAt(0);
            const node = range.startContainer;
            const text = node.textContent || '';
            const slashPos = text.lastIndexOf('/');
            if (slashPos < 0) { closeSlashMenu(); return; }
            const query = text.substring(slashPos + 1, range.startOffset).toLowerCase();
            slashMenuFilteredCommands = slashCommands
                .map((cmd, i) => ({ ...cmd, originalIndex: i }))
                .filter(cmd => cmd.label.toLowerCase().includes(query) || cmd.desc.toLowerCase().includes(query));
            slashMenuIndex = 0;
            renderSlashMenuItems();
        }

        function updateSlashMenuHighlight() {
            if (!slashMenuEl) return;
            const items = slashMenuEl.querySelectorAll('.slash-menu-item');
            items.forEach((el, i) => el.classList.toggle('active', i === slashMenuIndex));
        }

        function executeSlashCommand(idx) {
            // Remove the "/" character and any filter text that follows it
            const sel = window.getSelection();
            if (sel && sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                const node = range.startContainer;
                if (node.nodeType === 3 && node.textContent.includes('/')) {
                    const pos = node.textContent.lastIndexOf('/');
                    const cursorPos = range.startOffset;
                    // Remove from "/" through current cursor position (the filter text)
                    node.textContent = node.textContent.substring(0, pos) + node.textContent.substring(cursorPos);
                    // Reset cursor
                    const newRange = document.createRange();
                    newRange.setStart(node, Math.min(pos, node.textContent.length));
                    newRange.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(newRange);
                }
            }
            closeSlashMenu();
            slashCommands[idx].action();
        }

        function closeSlashMenu() {
            if (slashMenuEl && slashMenuEl.parentNode) {
                slashMenuEl.parentNode.removeChild(slashMenuEl);
            }
            slashMenuEl = null;
            slashMenuActive = false;
            slashMenuIndex = 0;
        }

        let slashCommandInitialized = false;
        function initSlashCommand() {
            if (slashCommandInitialized) return;
            slashCommandInitialized = true;
            // Close slash menu on click outside
            document.addEventListener('click', (e) => {
                if (slashMenuActive && slashMenuEl && !slashMenuEl.contains(e.target)) {
                    closeSlashMenu();
                }
            });
        }

        // Keyboard shortcuts for notes
        let _notesKeyboardInitialized = false;
        function initNotesKeyboard() {
            if (_notesKeyboardInitialized) return;
            _notesKeyboardInitialized = true;
            document.addEventListener('keydown', (e) => {
                // Only handle when notes view is active
                const notesView = document.getElementById('notesView');
                if (!notesView || notesView.style.display === 'none') return;

                // Ctrl+N: new note
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    addNote();
                }
                // Ctrl+Delete: delete current note
                if ((e.ctrlKey || e.metaKey) && e.key === 'Delete') {
                    e.preventDefault();
                    if (currentNoteId) deleteNote(currentNoteId);
                }
                // Ctrl+/: open slash menu
                if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                    e.preventDefault();
                    const el = document.getElementById('noteContentEditable');
                    if (el) {
                        el.focus();
                        showSlashMenu();
                    }
                }
            });
        }
        initNotesKeyboard();

        // ── Notes resizer (drag to resize sidebar) ──
        function initNotesResizer() {
            const resizer = document.getElementById('notesResizer');
            if (!resizer) return;
            const sidebar = resizer.previousElementSibling;
            let startX, startW;
            function onMouseDown(e) {
                e.preventDefault();
                startX = e.clientX || e.touches[0].clientX;
                startW = sidebar.offsetWidth;
                resizer.classList.add('active');
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                document.addEventListener('touchmove', onMouseMove, {passive:false});
                document.addEventListener('touchend', onMouseUp);
            }
            function onMouseMove(e) {
                e.preventDefault();
                const x = e.clientX || (e.touches && e.touches[0].clientX) || startX;
                const newW = Math.max(180, Math.min(window.innerWidth * 0.5, startW + (x - startX)));
                sidebar.style.width = newW + 'px';
            }
            function onMouseUp() {
                resizer.classList.remove('active');
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                document.removeEventListener('touchmove', onMouseMove);
                document.removeEventListener('touchend', onMouseUp);
                localStorage.setItem('flowdesk_notes_sidebar_w', sidebar.offsetWidth);
            }
            resizer.addEventListener('mousedown', onMouseDown);
            resizer.addEventListener('touchstart', onMouseDown, {passive:false});
            const saved = localStorage.getItem('flowdesk_notes_sidebar_w');
            if (saved) sidebar.style.width = saved + 'px';
        }

        // ── Syntax highlighting ──
        function highlightAllCode() {
            if (typeof hljs === 'undefined') return;
            document.querySelectorAll('.note-code-block code').forEach(block => {
                hljs.highlightElement(block);
            });
        }

        // ── Table insertion ──
        function noteInsertTable() {
            const rows = parseInt(prompt('Rows:', '3')) || 3;
            const cols = parseInt(prompt('Columns:', '3')) || 3;
            let html = '<table class="note-table" contenteditable="true">';
            for (let r = 0; r < rows; r++) {
                html += '<tr>';
                for (let c = 0; c < cols; c++) {
                    html += r === 0 ? '<th>Header</th>' : '<td>Cell</td>';
                }
                html += '</tr>';
            }
            html += '</table><p><br></p>';
            const el = document.getElementById('noteContentEditable');
            if (el) el.focus();
            document.execCommand('insertHTML', false, html);
        }

        // ── Export functions ──
        function downloadFile(filename, content, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function htmlToMarkdown(html) {
            let md = html;
            md = md.replace(/<h1[^>]*>(.*?)<\/h1>/gi, '# $1\n\n');
            md = md.replace(/<h2[^>]*>(.*?)<\/h2>/gi, '## $1\n\n');
            md = md.replace(/<h3[^>]*>(.*?)<\/h3>/gi, '### $1\n\n');
            md = md.replace(/<strong>(.*?)<\/strong>/gi, '**$1**');
            md = md.replace(/<b>(.*?)<\/b>/gi, '**$1**');
            md = md.replace(/<em>(.*?)<\/em>/gi, '*$1*');
            md = md.replace(/<i>(.*?)<\/i>/gi, '*$1*');
            md = md.replace(/<del>(.*?)<\/del>/gi, '~~$1~~');
            md = md.replace(/<code>(.*?)<\/code>/gi, '`$1`');
            md = md.replace(/<blockquote[^>]*>(.*?)<\/blockquote>/gi, '> $1\n\n');
            md = md.replace(/<li>(.*?)<\/li>/gi, '- $1\n');
            md = md.replace(/<hr\s*\/?>/gi, '\n---\n\n');
            md = md.replace(/<br\s*\/?>/gi, '\n');
            md = md.replace(/<p>(.*?)<\/p>/gi, '$1\n\n');
            md = md.replace(/<[^>]+>/g, '');
            md = md.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
            return md.trim();
        }

        function exportNoteAsMarkdown() {
            const note = notesData.notes.find(n => n.id === currentNoteId);
            if (!note) return;
            let md = '# ' + note.title + '\n\n';
            md += htmlToMarkdown(note.content);
            downloadFile(note.title + '.md', md, 'text/markdown');
        }

        function exportNoteAsHTML() {
            const note = notesData.notes.find(n => n.id === currentNoteId);
            if (!note) return;
            const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${escapeHtml(note.title)}</title>
<style>body{font-family:-apple-system,sans-serif;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.7;color:#37352F;}
h1{font-size:40px;font-weight:700;}blockquote{border-left:3px solid #E3E2E0;padding-left:16px;color:#666;}
pre{background:#F7F6F3;padding:16px;border-radius:6px;overflow-x:auto;}
table{border-collapse:collapse;width:100%;}th,td{border:1px solid #E3E2E0;padding:8px 12px;}th{background:#F7F6F3;}</style>
</head><body><h1>${escapeHtml(note.title)}</h1>${note.content}</body></html>`;
            downloadFile(note.title + '.html', html, 'text/html');
        }

        function exportNoteAsPDF() {
            const note = notesData.notes.find(n => n.id === currentNoteId);
            if (!note) return;
            const win = window.open('', '_blank');
            win.document.write(`<!DOCTYPE html><html><head><title>${escapeHtml(note.title)}</title>
<style>body{font-family:-apple-system,sans-serif;max-width:720px;margin:40px auto;line-height:1.7;color:#37352F;}
h1{font-size:32px;}blockquote{border-left:3px solid #ccc;padding-left:14px;color:#666;}
pre{background:#f5f5f5;padding:12px;border-radius:4px;}
table{border-collapse:collapse;width:100%;}th,td{border:1px solid #ddd;padding:6px 10px;}th{background:#f5f5f5;}</style>
</head><body><h1>${escapeHtml(note.title)}</h1>${note.content}</body></html>`);
            win.document.close();
            setTimeout(() => { win.print(); }, 500);
        }

        // Close export dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.note-export-menu')) {
                document.querySelectorAll('.note-export-dropdown.show').forEach(d => d.classList.remove('show'));
            }
        });

        function closeAllPopups() {
            document.querySelectorAll('.popup').forEach(p => p.classList.add('hidden'));
            document.getElementById('popupOverlay').classList.add('hidden');
        }
    </script>
</body>
</html>
