        };

        function setTheme(themeKey) {
            const t = THEMES[themeKey] || THEMES.light;
            const root = document.documentElement;
            root.style.setProperty('--bg', t.body);
            root.style.setProperty('--sidebar-bg', t.sidebar);
            root.style.setProperty('--text', t.text);
            root.style.setProperty('--text-dim', t.textDim);
            root.style.setProperty('--border', t.border);
            root.style.setProperty('--accent', t.accent);
            root.style.setProperty('--editor-bg', t.editor);
            root.style.setProperty('--card-bg', t.card);
            root.style.setProperty('--card-hover', t.cardHover);
            root.style.setProperty('--toolbar-bg', t.toolbar);
            root.style.setProperty('--code-bg', t.codeBlock);

            // Toggle dark class for elements that need it
            document.body.classList.toggle('dark-mode', t.isDark);
            document.body.classList.toggle('dark', t.isDark);
            darkMode = t.isDark;

            // Save preference
            localStorage.setItem('flowdesk_theme', themeKey);
            localStorage.setItem('flowdesk_dark', t.isDark);
            currentTheme = themeKey;

            // Update selector if it exists
            const sel = document.getElementById('themeSelector');
            if (sel) sel.value = themeKey;
        }

        function initApp() {
            setTheme(currentTheme);

            const saved = localStorage.getItem('flowdesk_data');
            if (saved) try { appData = JSON.parse(saved); } catch (e) {}

            setupEventListeners();
            renderApp();
            syncData();
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTheme(currentTheme);
            // Try auto-login with saved key
            if (tryAutoLogin()) {
                initApp();
            }
            // Otherwise show login screen (default)
        });

        function setupEventListeners() {
            document.getElementById('newTaskBtn').addEventListener('click', addNewTask);
            document.getElementById('syncBtn').addEventListener('click', syncData);
            document.getElementById('expandAllBtn').addEventListener('click', expandAll);
            document.getElementById('collapseAllBtn').addEventListener('click', collapseAll);
            document.getElementById('exportBtn').addEventListener('click', exportJSON);
            document.getElementById('importBtn').addEventListener('click', importJSON);
            document.getElementById('resetBtn').addEventListener('click', resetData);
            document.getElementById('dashboardViewBtn').addEventListener('click', () => switchView('dashboard'));
            document.getElementById('tableViewBtn').addEventListener('click', () => switchView('table'));
            document.getElementById('kanbanViewBtn').addEventListener('click', () => switchView('kanban'));
            document.getElementById('calendarViewBtn').addEventListener('click', () => switchView('calendar'));
            document.getElementById('notesViewBtn').addEventListener('click', () => switchView('notes'));
            document.getElementById('searchBox').addEventListener('input', filterTasks);
            document.addEventListener('click', (e) => { if (e.target.id === 'popupOverlay') closeAllPopups(); });
        }

        function toggleDarkMode() {
            setTheme(darkMode ? 'light' : 'dark');
        }

        async function syncData() {
            updateSyncIndicator('syncing');
            try {
                // Push local data first, then pull
                const localTaskCount = appData.groups.flatMap(g => g.tasks).length;
                if (localTaskCount > 0 || calendarData.events.length > 0 || notesData.notes.length > 0) {
                    await pushSync();
                }

                const response = await fetch(getAuthUrl('getTasks'));
                const data = await response.json();
                if (data.error && data.code === 401) { doLogout(); return; }

                if (data.groups) {
                    // Normalize tasks — ensure progress defaults to 0
                    data.groups.forEach(g => {
                        (g.tasks || []).forEach(t => {
                            if (t.progress === undefined || t.progress === null || isNaN(t.progress)) t.progress = 0;
                            if (!t.subtasks) t.subtasks = [];
                        });
                    });
                    appData.groups = data.groups;
                    appData.members = data.members || [];
                    saveLocalData();
                    renderApp();
                }
                // Sync events — normalize field names from cloud
                function parseTimeField(t) {
                    if (!t) return '';
                    t = String(t);
                    // Handle ISO format like "1899-12-30T03:00:00.000Z" from Google Sheets
                    if (t.includes('T')) {
                        const match = t.match(/T(\d{2}):(\d{2})/);
                        if (match) return match[1] + ':' + match[2];
                    }
                    // Already "HH:MM" format
                    if (/^\d{2}:\d{2}$/.test(t)) return t;
                    return t;
                }
                if (data.events) {
                    calendarData.events = data.events.map(ev => ({
                        id: ev.id || Date.now(),
                        title: ev.title || '',
                        event_date: ev.event_date || ev.date || '',
                        start_time: parseTimeField(ev.start_time || ev.startTime) || '09:00',
                        end_time: parseTimeField(ev.end_time || ev.endTime) || '10:00',
                        color: ev.color || '#0073ea',
                        all_day: ev.all_day || ev.allDay || false,
                        description: ev.description || ''
                    }));
                    saveCalendarData();
                    const view = document.querySelector('.view-tab.active');
                    if (view && view.dataset.view === 'calendar') renderCalendar();
                }
                // Sync notes
                if (data.notes) {
                    notesData.notes = data.notes.map(n => ({
                        id: n.id || ('note_' + Date.now() + '_' + Math.random().toString(36).substr(2,5)),
                        title: n.title || 'Untitled',
                        content: n.content || '',
                        pinned: n.pinned || false,
                        folder: n.folder || '',
                        tags: Array.isArray(n.tags) ? n.tags : [],
                        font: n.font || 'sans',
                        sort_order: n.sort_order || n.sortOrder || 0,
                        created_at: n.createdAt || n.created_at || new Date().toISOString(),
                        updated_at: n.updatedAt || n.updated_at || new Date().toISOString()
                    }));
                    saveNotesData();
                    const view = document.querySelector('.view-tab.active');
                    if (view && view.dataset.view === 'notes') renderNotes();
                }
                updateSyncIndicator('synced');
            } catch (e) {
                console.error('Sync failed:', e);
                updateSyncIndicator('error');
                setTimeout(() => updateSyncIndicator('synced'), 3000);
            }
        }

        function updateSyncIndicator(state) {
            document.getElementById('syncIndicator').className = 'sync-indicator ' + state;
        }

        function debouncedSync() {
            saveLocalData();
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => { pushSync(); }, 2000);
        }

        async function pushSync() {
            try {
                const pushData = {
                    action: 'syncAll',
                    key: FLOWDESK_API_KEY || localStorage.getItem('flowdesk_api_key') || '',
                    groups: appData.groups,
                    members: appData.members,
                    events: calendarData.events.map(ev => ({
                        id: ev.id, title: ev.title, date: ev.event_date || ev.date || '',
                        startTime: ev.start_time || '', endTime: ev.end_time || '',
                        color: ev.color || '#0073ea', allDay: ev.all_day || false
                    })),
                    notes: notesData.notes.map(n => ({
                        id: n.id, title: n.title, content: n.content || '',
                        pinned: n.pinned || false,
                        folder: n.folder || '', tags: n.tags || [], font: n.font || 'sans',
                        sortOrder: n.sort_order || 0,
                        createdAt: n.created_at || '', updatedAt: n.updated_at || ''
                    }))
                };
                // Use POST — content stored in Google Drive (no size limit)
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(pushData),
                    redirect: 'follow'
                });
                const result = await resp.json();
                if (result.error) console.error('Push sync error:', result.error);
            } catch (e) { console.error('Push sync failed:', e); }
        }

        function saveLocalData() { localStorage.setItem('flowdesk_data', JSON.stringify(appData)); }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr + 'T00:00:00');
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return months[date.getMonth()] + ' ' + date.getDate();
        }

        function isOverdue(dueDate, status) {
            if (!dueDate || status === 'Done') return false;
            const due = new Date(dueDate + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return due < today;
        }

        function getDaysUntilDue(dueDate) {
            if (!dueDate) return null;
            const due = new Date(dueDate + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return Math.ceil((due - today) / (1000 * 60 * 60 * 24));
        }

        function addNewTask() {
            if (appData.groups.length === 0) {
                alert('Please create a group first');
                return;
            }
            const group = appData.groups[0];
            group.tasks.push({
                id: 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                name: 'New Task',
                status: 'Not Started',
                priority: 'Medium',
                dueDate: '',
                timelineStart: '',
                timelineEnd: '',
                notes: '',
                progress: 0,
                subtasks: [],
                labels: [],
                comments: []
            });
            debouncedSync();
            renderApp();
        }

        function expandAll() { appData.groups.forEach(g => g.collapsed = false); renderApp(); }
        function collapseAll() { appData.groups.forEach(g => g.collapsed = true); renderApp(); }

        function exportJSON() {
            const json = JSON.stringify(appData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'flowdesk_' + new Date().getTime() + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        appData = JSON.parse(ev.target.result);
                        saveLocalData();
                        renderApp();
                    } catch (err) { alert('Failed to import JSON'); }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        function resetData() {
            if (!confirm('Are you sure? This will delete all data.')) return;
            appData = { groups: [], members: [] };
            localStorage.removeItem('flowdesk_data');
            debouncedSync();
            renderApp();
        }

        function filterTasks() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('.group-table tbody tr').forEach(row => {
                const taskName = row.querySelector('.task-name')?.textContent || '';
                row.style.display = taskName.toLowerCase().includes(query) ? '' : 'none';
            });
        }

        function switchView(view) {
            document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.view-tab[data-view="${view}"]`).classList.add('active');
            ['dashboardView', 'tableView', 'kanbanView', 'calendarView', 'notesView'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== view + 'View');
            });
            // Fade-in animation for the active view
            const container = document.getElementById(view + 'View');
            if (container) {
                container.style.animation = 'none';
                container.offsetHeight; // trigger reflow
                container.style.animation = 'viewFadeIn 0.2s ease';
            }
            if (view === 'dashboard') renderDashboard();
            else if (view === 'calendar') renderCalendar();
            else if (view === 'notes') renderNotes();
            else renderApp();
        }

        function renderApp() {
            updateSummary();
            const view = document.querySelector('.view-tab.active').dataset.view;
            if (view === 'dashboard') renderDashboard();
            else if (view === 'kanban') renderKanban();
            else renderTable();
        }

        function renderTable() {
            const container = document.getElementById('tableView');
            container.innerHTML = '';

            appData.groups.forEach(group => {
                const groupCard = document.createElement('div');
                groupCard.className = 'group-card';

                const header = document.createElement('div');
                header.className = 'group-header';

                const colorBar = document.createElement('div');
                colorBar.className = 'group-color-bar';
                colorBar.style.backgroundColor = group.color || '#0073ea';

                const collapseArrow = document.createElement('div');
                collapseArrow.className = 'collapse-arrow' + (group.collapsed ? ' collapsed' : '');
                collapseArrow.textContent = '▼';
                collapseArrow.addEventListener('click', () => { group.collapsed = !group.collapsed; renderTable(); });

                const title = document.createElement('div');
                title.className = 'group-title';
                title.textContent = group.title;
                title.addEventListener('dblclick', () => {
                    const input = document.createElement('input');
                    input.className = 'group-title-input';
                    input.type = 'text';
                    input.value = group.title;
                    title.replaceWith(input);
                    input.focus();
                    input.select();
                    input.addEventListener('blur', () => { group.title = input.value; debouncedSync(); renderTable(); });
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') input.blur();
                        if (e.key === 'Escape') renderTable();
                    });
                });

                const count = document.createElement('div');
                count.className = 'group-count';
                count.textContent = group.tasks.length;

                const actions = document.createElement('div');
                actions.className = 'group-actions';

                const colorBtn = document.createElement('button');
                colorBtn.className = 'color-picker-btn';
                colorBtn.style.backgroundColor = group.color || '#0073ea';
                colorBtn.addEventListener('click', () => openColorPickerPopup(group));

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '×';
                deleteBtn.addEventListener('click', () => {
                    if (confirm('Delete this group?')) {
                        appData.groups = appData.groups.filter(g => g.id !== group.id);
                        debouncedSync();
                        renderTable();
                    }
                });

                actions.appendChild(colorBtn);
                actions.appendChild(deleteBtn);
                header.appendChild(colorBar);
                header.appendChild(collapseArrow);
                header.appendChild(title);
                header.appendChild(count);
                header.appendChild(actions);
                groupCard.appendChild(header);

                if (!group.collapsed) {
                    const table = document.createElement('table');
                    table.className = 'group-table';

                    const thead = document.createElement('thead');
                    const tr = document.createElement('tr');
                    ['', 'Task Name', 'Status', 'Priority', 'Due Date', 'Notes', 'Progress', 'Labels', '💬', ''].forEach(h => {
                        const th = document.createElement('th');
                        th.textContent = h;
                        tr.appendChild(th);
                    });
                    thead.appendChild(tr);
                    table.appendChild(thead);

                    const tbody = document.createElement('tbody');
                    group.tasks.forEach(task => {
                        tbody.appendChild(createTableTaskRow(task, group));

                        if (task.subtasks && task.subtasks.length > 0 && task.expanded) {
                            const subtasksRow = document.createElement('tr');
                            subtasksRow.className = 'subtasks-row';
                            const subtasksCell = document.createElement('td');
                            subtasksCell.colSpan = 11;

                            const subtasksContainer = document.createElement('div');
                            subtasksContainer.className = 'subtasks-container';

                            task.subtasks.forEach(subtask => {
                                const subtaskDiv = document.createElement('div');
                                subtaskDiv.className = 'subtask';
                                const checkbox = document.createElement('input');
                                checkbox.type = 'checkbox';
                                checkbox.checked = subtask.done;
                                checkbox.addEventListener('change', () => {
                                    subtask.done = checkbox.checked;
                                    updateTaskProgress(task);
                                    debouncedSync();
                                    renderTable();
                                });
                                const text = document.createElement('div');
                                text.className = 'subtask-text' + (subtask.done ? ' done' : '');
                                text.textContent = subtask.text;
                                subtaskDiv.appendChild(checkbox);
                                subtaskDiv.appendChild(text);
                                subtasksContainer.appendChild(subtaskDiv);
                            });

                            const addDiv = document.createElement('div');
                            addDiv.className = 'subtask-add';
                            const input = document.createElement('input');
                            input.type = 'text';
                            input.placeholder = 'Add subtask...';
                            const btn = document.createElement('button');
                            btn.textContent = 'Add';
                            btn.addEventListener('click', () => {
                                if (input.value.trim()) {
                                    task.subtasks.push({ id: 'subtask_' + Date.now(), text: input.value, done: false });
                                    updateTaskProgress(task);
                                    debouncedSync();
                                    renderTable();
                                }
                            });
                            addDiv.appendChild(input);
                            addDiv.appendChild(btn);
                            subtasksContainer.appendChild(addDiv);
                            subtasksCell.appendChild(subtasksContainer);
                            subtasksRow.appendChild(subtasksCell);
                            tbody.appendChild(subtasksRow);
                        }
                    });
                    table.appendChild(tbody);
                    groupCard.appendChild(table);

                    const addTaskBtn = document.createElement('button');
                    addTaskBtn.className = 'add-task-btn';
                    addTaskBtn.textContent = '+ Add task';
                    addTaskBtn.addEventListener('click', () => {
                        group.tasks.push({
                            id: 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                            name: 'New Task',
                            status: 'Not Started',
                            priority: 'Medium',
                            dueDate: '',
                            timelineStart: '',
                            timelineEnd: '',
                            notes: '',
                            progress: 0,
                            subtasks: [],
                            labels: [],
                            comments: []
                        });
                        debouncedSync();
                        renderTable();
                    });
                    groupCard.appendChild(addTaskBtn);
                }

                container.appendChild(groupCard);
            });

            if (appData.groups.length === 0) {
                const emptyState = document.createElement('div');
                emptyState.style.padding = '40px 24px';
                emptyState.style.textAlign = 'center';
                emptyState.style.color = '#999';
                emptyState.innerHTML = '<p>No groups yet. <button class="btn btn-primary" onclick="createNewGroup()">Create Group</button></p>';
                container.appendChild(emptyState);
            } else {
                const addGroupBtn = document.createElement('button');
                addGroupBtn.className = 'btn btn-primary';
                addGroupBtn.textContent = '+ Add Group';
                addGroupBtn.style.marginTop = '24px';
                addGroupBtn.addEventListener('click', createNewGroup);
                container.appendChild(addGroupBtn);
            }
        }

        function createNewGroup() {
            appData.groups.push({
                id: 'group_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                title: 'New Group',
                color: GROUP_COLORS[appData.groups.length % GROUP_COLORS.length],
                collapsed: false,
                tasks: []
            });
            debouncedSync();
            renderTable();
        }

        function createTableTaskRow(task, group) {
            const tr = document.createElement('tr');
            if (isOverdue(task.dueDate, task.status)) tr.classList.add('overdue');
            tr.draggable = true;
            tr.addEventListener('dragstart', (e) => {
                currentDraggingTask = task;
                currentDraggingFromGroup = group;
                tr.classList.add('dragging');
            });
            tr.addEventListener('dragend', () => tr.classList.remove('dragging'));
            tr.addEventListener('dragover', (e) => e.preventDefault());
            tr.addEventListener('drop', (e) => {
                e.preventDefault();
                if (currentDraggingTask && currentDraggingTask.id !== task.id) {
                    const idx = currentDraggingFromGroup.tasks.indexOf(currentDraggingTask);
                    if (idx >= 0) {
                        currentDraggingFromGroup.tasks.splice(idx, 1);
                        group.tasks.push(currentDraggingTask);
                        debouncedSync();
                        renderTable();
                    }
                }
            });

            const checkboxCell = document.createElement('td');
            checkboxCell.className = 'checkbox-cell';
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = task.status === 'Done';
            checkbox.addEventListener('change', () => {
                task.status = checkbox.checked ? 'Done' : 'Not Started';
                debouncedSync();
                renderApp();
            });
            checkboxCell.appendChild(checkbox);
            tr.appendChild(checkboxCell);

            const nameCell = document.createElement('td');
            const nameContainer = document.createElement('div');
            nameContainer.className = 'task-name-cell';
            nameContainer.draggable = false;

            const expandArrow = document.createElement('div');
            expandArrow.className = 'expand-arrow' + (task.expanded ? ' expanded' : '');
            if (task.subtasks && task.subtasks.length > 0) {
                expandArrow.textContent = '▶';
                expandArrow.addEventListener('click', (e) => {
                    e.stopPropagation();
                    task.expanded = !task.expanded;
                    renderTable();
                });
            }

            const name = document.createElement('div');
            name.className = 'task-name';
            name.textContent = task.name;
            name.addEventListener('dblclick', () => {
                const input = document.createElement('input');
                input.className = 'task-name-input';
                input.type = 'text';
                input.value = task.name;
                name.replaceWith(input);
                input.focus();
                input.select();
                input.addEventListener('blur', () => { task.name = input.value; debouncedSync(); renderTable(); });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') input.blur();
                    if (e.key === 'Escape') renderTable();
                });
            });

            const progressVisual = document.createElement('div');
            progressVisual.className = 'progress-visual';
            progressVisual.style.display = (task.progress || 0) > 0 ? 'block' : 'none';
            const progressFill = document.createElement('div');
            progressFill.className = 'progress-visual-fill';
            progressFill.style.width = (task.progress || 0) + '%';
            progressVisual.appendChild(progressFill);

            nameContainer.appendChild(expandArrow);
            nameContainer.appendChild(name);
            nameContainer.appendChild(progressVisual);
            nameCell.appendChild(nameContainer);
            tr.appendChild(nameCell);

            const statusCell = document.createElement('td');
            const statusBadge = document.createElement('div');
            statusBadge.className = 'status-badge status-' + task.status.toLowerCase().replace(/\s+/g, '-');
            statusBadge.textContent = task.status;
            statusBadge.addEventListener('click', () => openStatusPickerPopup(task));
            statusCell.appendChild(statusBadge);
            tr.appendChild(statusCell);

            const priorityCell = document.createElement('td');
            const priorityBadge = document.createElement('div');
            priorityBadge.className = 'priority-badge priority-' + task.priority.toLowerCase();
            priorityBadge.textContent = task.priority;
            priorityBadge.addEventListener('click', () => openPriorityPickerPopup(task));
            priorityCell.appendChild(priorityBadge);
            tr.appendChild(priorityCell);

            const dateCell = document.createElement('td');
            const dateContainer = document.createElement('div');
            dateContainer.style.display = 'flex';
            dateContainer.style.alignItems = 'center';
            const dateText = document.createElement('div');
            dateText.style.cursor = 'pointer';
            dateText.textContent = task.dueDate ? formatDate(task.dueDate) : '—';
            if (isOverdue(task.dueDate, task.status)) {
                dateText.style.color = '#e2445c';
                dateText.style.fontWeight = '600';
            }
            dateText.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'date';
                input.value = task.dueDate;
                input.addEventListener('change', () => { task.dueDate = input.value; debouncedSync(); renderApp(); });
                input.addEventListener('blur', () => renderTable());
                dateText.replaceWith(input);
                input.focus();
            });
            dateContainer.appendChild(dateText);

            const days = getDaysUntilDue(task.dueDate);
            if (days !== null) {
                const countdown = document.createElement('span');
                countdown.className = 'due-countdown';
                if (days < 0) {
                    countdown.classList.add('overdue');
                    countdown.textContent = Math.abs(days) + 'd overdue';
                } else if (days <= 3) {
                    countdown.classList.add('upcoming');
                    countdown.textContent = days + 'd left';
                } else {
                    countdown.classList.add('far');
                    countdown.textContent = days + 'd left';
                }
                dateContainer.appendChild(countdown);
            }
            dateCell.appendChild(dateContainer);
            tr.appendChild(dateCell);

            const notesCell = document.createElement('td');
            notesCell.className = 'notes-cell';
            notesCell.textContent = task.notes;
            notesCell.title = task.notes;
            notesCell.addEventListener('click', () => {
                const textarea = document.createElement('textarea');
                textarea.className = 'notes-input';
                textarea.value = task.notes;
                notesCell.replaceWith(textarea);
                textarea.focus();
                textarea.addEventListener('blur', () => { task.notes = textarea.value; debouncedSync(); renderTable(); });
                textarea.addEventListener('keydown', (e) => { if (e.key === 'Escape') renderTable(); });
            });
            tr.appendChild(notesCell);

            const progressCell = document.createElement('td');
            const progressContainer = document.createElement('div');
            progressContainer.className = 'progress-cell';
            const slider = document.createElement('input');
            slider.type = 'range';
            slider.className = 'progress-slider';
            slider.min = 0;
            slider.max = 100;
            slider.value = task.progress || 0;
            slider.addEventListener('mousedown', (e) => { tr.draggable = false; e.stopPropagation(); });
            slider.addEventListener('mouseup', () => { tr.draggable = true; });
            slider.addEventListener('change', () => { task.progress = parseInt(slider.value); debouncedSync(); renderApp(); });
            slider.addEventListener('input', () => { progressText.textContent = slider.value + '%'; });
            const progressText = document.createElement('div');
            progressText.className = 'progress-text';
            progressText.textContent = (task.progress || 0) + '%';
            progressContainer.appendChild(slider);
            progressContainer.appendChild(progressText);
            progressCell.appendChild(progressContainer);
            tr.appendChild(progressCell);

            const labelsCell = document.createElement('td');
            const labelsContainer = document.createElement('div');
            labelsContainer.className = 'task-labels';
            if (!task.labels) task.labels = [];
            task.labels.forEach((label, idx) => {
                const labelEl = document.createElement('div');
                labelEl.className = 'task-label';
                labelEl.textContent = label.text;
                labelEl.style.backgroundColor = label.color;
                labelEl.title = label.text;
                labelEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    task.labels.splice(idx, 1);
                    debouncedSync();
                    renderTable();
                });
                labelsContainer.appendChild(labelEl);
            });
            const labelAddBtn = document.createElement('button');
            labelAddBtn.className = 'label-add-btn';
            labelAddBtn.textContent = '+';
            labelAddBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openLabelPickerPopup(task);
            });
            labelsContainer.appendChild(labelAddBtn);
            labelsCell.appendChild(labelsContainer);
            tr.appendChild(labelsCell);

            const commentsCell = document.createElement('td');
            const commentCount = document.createElement('div');
            commentCount.className = 'comment-count';
            commentCount.innerHTML = '💬 ' + ((task.comments && task.comments.length) || 0);
            commentCount.addEventListener('click', () => openCommentPopup(task));
            commentsCell.appendChild(commentCount);
            tr.appendChild(commentsCell);

            const deleteCell = document.createElement('td');
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = '×';
            deleteBtn.addEventListener('click', () => {
                if (confirm('Delete this task?')) {
                    group.tasks = group.tasks.filter(t => t.id !== task.id);
                    debouncedSync();
                    renderTable();
                }
            });
            deleteCell.appendChild(deleteBtn);
            tr.appendChild(deleteCell);

            return tr;
        }

        function renderKanban() {
            const container = document.getElementById('kanbanView');
            container.innerHTML = '';

            const statuses = ['Not Started', 'Working on it', 'Waiting for review', 'On Hold', 'Stuck', 'Done'];
            const allTasks = appData.groups.flatMap(g => g.tasks.map(t => ({ ...t, groupId: g.id })));

            statuses.forEach(status => {
                const column = document.createElement('div');
                column.className = 'kanban-column';

                const title = document.createElement('div');
                title.className = 'kanban-column-title';
                title.textContent = status;
                column.appendChild(title);

                const tasks = allTasks.filter(t => t.status === status);
                tasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'kanban-card';
                    card.draggable = true;

                    const cardTitle = document.createElement('div');
                    cardTitle.className = 'kanban-card-title';
                    cardTitle.textContent = task.name;
                    card.appendChild(cardTitle);

                    if (task.dueDate) {
                        const cardDate = document.createElement('div');
                        cardDate.className = 'kanban-card-date';
                        cardDate.textContent = formatDate(task.dueDate);
                        card.appendChild(cardDate);
                    }

                    if ((task.progress || 0) > 0) {
                        const progress = document.createElement('div');
                        progress.className = 'kanban-card-progress';
                        const fill = document.createElement('div');
                        fill.className = 'kanban-card-progress-fill';
                        fill.style.width = (task.progress || 0) + '%';
                        progress.appendChild(fill);
                        card.appendChild(progress);
                    }

                    const meta = document.createElement('div');
                    meta.className = 'kanban-card-meta';
                    const priorityDot = document.createElement('div');
                    priorityDot.className = 'kanban-card-priority';
                    priorityDot.style.backgroundColor = PRIORITY_COLORS[task.priority];
                    meta.appendChild(priorityDot);
                    card.appendChild(meta);

                    card.addEventListener('dragstart', (e) => {
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('taskId', task.id);
                        e.dataTransfer.setData('fromStatus', status);
                    });

                    column.appendChild(card);
                });

                column.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });

                column.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const taskId = e.dataTransfer.getData('taskId');
                    const fromStatus = e.dataTransfer.getData('fromStatus');
                    const task = allTasks.find(t => t.id === taskId);
                    if (task && fromStatus !== status) {
                        task.status = status;
                        debouncedSync();
                        renderKanban();
                    }
                });

                container.appendChild(column);
            });
        }

        function updateSummary() {
            const allTasks = appData.groups.flatMap(g => g.tasks);
            const done = allTasks.filter(t => t.status === 'Done').length;
            const working = allTasks.filter(t => t.status === 'Working on it').length;
            const stuck = allTasks.filter(t => t.status === 'Stuck').length;
            const overdue = allTasks.filter(t => isOverdue(t.dueDate, t.status)).length;
            const totalProgress = allTasks.length > 0 ? Math.round(allTasks.reduce((sum, t) => sum + (t.progress || 0), 0) / allTasks.length) : 0;

            document.getElementById('summaryTotal').textContent = allTasks.length;
            document.getElementById('summaryDone').textContent = done;
            document.getElementById('summaryWorking').textContent = working;
            document.getElementById('summaryStuck').textContent = stuck;
            document.getElementById('summaryOverdue').textContent = overdue;
            document.getElementById('summaryProgress').textContent = totalProgress + '%';
            document.getElementById('summaryProgressFill').style.width = totalProgress + '%';
        }

        // ========== CALENDAR FUNCTIONS ==========

        function renderCalendar() {
            const container = document.getElementById('calendarView');
            if (calendarMode === 'day') { renderCalendarDay(container); return; }
            if (calendarMode === 'week') { renderCalendarWeek(container); return; }

            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            const today = new Date();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

            // Gather task due dates
            const tasksByDate = {};
            (appData.groups || []).forEach(g => {
                (g.tasks || []).forEach(t => {
                    if (t.dueDate) {
                        const d = t.dueDate.substring(0, 10);
                        if (!tasksByDate[d]) tasksByDate[d] = [];
                        tasksByDate[d].push({ name: t.name, status: t.status });
                    }
                });
            });

            // Gather events
            const eventsByDate = {};
            calendarData.events.forEach(ev => {
                const d = ev.event_date;
                if (!eventsByDate[d]) eventsByDate[d] = [];
                eventsByDate[d].push(ev);
            });

            let html = `<div class="calendar-nav">
                <button onclick="calendarDate.setMonth(calendarDate.getMonth()-1); renderCalendar();">&larr;</button>
                <button onclick="calendarDate = new Date(); renderCalendar();">Today</button>
                <button onclick="calendarDate.setMonth(calendarDate.getMonth()+1); renderCalendar();">&rarr;</button>
                <span class="cal-title">${monthNames[month]} ${year}</span>
                <button class="mode-btn ${calendarMode==='month'?'active':''}" onclick="calendarMode='month'; renderCalendar();">Month</button>
                <button class="mode-btn ${calendarMode==='week'?'active':''}" onclick="calendarMode='week'; renderCalendar();">Week</button>
                <button class="mode-btn ${calendarMode==='day'?'active':''}" onclick="calendarMode='day'; renderCalendar();">Day</button>
                <button style="background:#0073ea;color:white;border-color:#0073ea;" onclick="addEvent(formatDateStr(calendarDate))">+ Event</button>
            </div>`;

            html += '<div class="cal-grid">';
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            dayNames.forEach(d => { html += `<div class="cal-header">${d}</div>`; });

            // Empty cells before first day
            for (let i = 0; i < firstDay; i++) {
                html += '<div class="cal-cell" style="opacity:0.3;"></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                html += `<div class="cal-cell" onclick="calendarDate = new Date(${year}, ${month}, ${day}); calendarMode='day'; renderCalendar();">`;
                html += `<div class="day-num${isToday ? ' today' : ''}">${day}</div>`;

                // Show events
                if (eventsByDate[dateStr]) {
                    eventsByDate[dateStr].forEach(ev => {
                        html += `<div class="event-pill" style="background:${ev.color || '#0073ea'}" onclick="event.stopPropagation(); editEvent(${ev.id})">${ev.all_day ? '' : ev.start_time + ' '}${ev.title}</div>`;
                    });
                }

                // Show tasks
                if (tasksByDate[dateStr]) {
                    tasksByDate[dateStr].slice(0, 3).forEach(t => {
                        const color = t.status === 'Done' ? '#6bcf7f' : t.status === 'Working' ? '#0073ea' : '#e8830c';
                        html += `<div class="task-pill" style="color:${color}">&#9679; ${t.name}</div>`;
                    });
                    if (tasksByDate[dateStr].length > 3) {
                        html += `<div class="task-pill">+${tasksByDate[dateStr].length - 3} more</div>`;
                    }
                }

                html += '</div>';
            }

            html += '</div>';
            container.innerHTML = html;
        }

                }

                html += '</div>';
            }

            html += '</div>';

        function renderCalendarDay(container) {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            const date = calendarDate.getDate();
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const dateStr = formatDateStr(calendarDate);

            const dayEvents = calendarData.events.filter(ev => ev.event_date === dateStr);
            const dayTasks = [];
            (appData.groups || []).forEach(g => {
                (g.tasks || []).forEach(t => {
                    if (t.dueDate && t.dueDate.substring(0, 10) === dateStr) {
                        dayTasks.push({ name: t.name, status: t.status });
                    }
                });
            });

            let html = `<div class="calendar-nav">
                <button onclick="calendarDate.setDate(calendarDate.getDate()-1); renderCalendar();">&larr;</button>

                <button class="mode-btn ${calendarMode==='day'?'active':''}" onclick="calendarMode='day'; renderCalendar();">Day</button>

        function formatDateStr(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function addEvent(dateStr) {
            openEventModal(null, dateStr);
        }

        function editEvent(eventId) {
            const ev = calendarData.events.find(e => e.id === eventId);
            if (!ev) return;
            openEventModal(ev);
        }

        function openEventModal(existingEvent, dateStr) {
            const isEdit = !!existingEvent;
            const ev = existingEvent || {
                title: '',
                event_date: dateStr || formatDateStr(calendarDate),
                start_time: '09:00',
                end_time: '10:00',
                color: '#0073ea',
                all_day: false,
                description: ''
            };
            const colors = [
                {c:'#0073ea',n:'Blue'},{c:'#00c875',n:'Green'},{c:'#e2445c',n:'Red'},
                {c:'#fdab3d',n:'Orange'},{c:'#a25ddc',n:'Purple'},{c:'#579bfc',n:'Sky'},
                {c:'#7f5347',n:'Brown'},{c:'#c4c4c4',n:'Grey'}
            ];
            const colorOpts = colors.map(({c,n}) =>
                `<label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer;margin-right:8px;">
                    <input type="radio" name="evColor" value="${c}" ${ev.color===c?'checked':''} style="display:none;">
                    <span style="width:22px;height:22px;border-radius:50%;background:${c};display:inline-block;border:${ev.color===c?'2.5px solid #fff':'2.5px solid transparent'};box-shadow:${ev.color===c?'0 0 0 2px '+c:'none'};cursor:pointer;" onclick="this.parentElement.querySelector('input').checked=true;document.querySelectorAll('#eventModal .ev-color-dot').forEach(d=>{d.style.border='2.5px solid transparent';d.style.boxShadow='none';});this.style.border='2.5px solid #fff';this.style.boxShadow='0 0 0 2px ${c}';" class="ev-color-dot"></span>
                </label>`
            ).join('');

            const overlay = document.createElement('div');
            overlay.id = 'eventModalOverlay';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:10000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s ease;';
            const thm = THEMES[currentTheme] || THEMES['Light'];
            const isDark = thm.bg.toLowerCase() < '#888';
            const modalBg = thm.cardBg || thm.bg;
            const modalText = thm.text;
            const modalBorder = thm.border;
            const inputBg = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.04)';

            overlay.innerHTML = `
            <div id="eventModal" style="background:${modalBg};color:${modalText};border-radius:14px;padding:28px 32px;min-width:380px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);font-family:Inter,sans-serif;">
                <h3 style="margin:0 0 20px;font-size:18px;font-weight:600;">${isEdit ? 'Edit Event' : 'New Event'}</h3>
                <div style="display:flex;flex-direction:column;gap:14px;">
                    <div>
                        <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:4px;display:block;">Title</label>
                        <input id="evTitle" type="text" value="${(ev.title||'').replace(/"/g,'&quot;')}" placeholder="Event title..."
                            style="width:100%;padding:9px 12px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};box-sizing:border-box;outline:none;">
                    </div>
                    <div>
                        <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:4px;display:block;">Date</label>
                        <input id="evDate" type="date" value="${ev.event_date||''}"
                            style="width:100%;padding:9px 12px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};box-sizing:border-box;outline:none;">
                    </div>
                    <div>
                        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                            <input id="evAllDay" type="checkbox" ${ev.all_day?'checked':''} style="width:16px;height:16px;cursor:pointer;">
                            All day
                        </label>
                    </div>
                    <div id="evTimeRow" style="display:${ev.all_day?'none':'flex'};gap:12px;">
                        <div style="flex:1;">
                            <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:4px;display:block;">Start</label>
                            <input id="evStart" type="time" value="${ev.start_time||'09:00'}"
                                style="width:100%;padding:9px 12px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};box-sizing:border-box;outline:none;">

                        <div style="flex:1;">
                            <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:4px;display:block;">End</label>
                            <input id="evEnd" type="time" value="${ev.end_time||'10:00'}"
                                style="width:100%;padding:9px 12px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};box-sizing:border-box;outline:none;">
                        </div>
                    </div>
                    <div>
                        <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:4px;display:block;">Description</label>
                        <textarea id="evDesc" rows="2" placeholder="Optional..."
                            style="width:100%;padding:9px 12px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};box-sizing:border-box;outline:none;resize:vertical;font-family:inherit;">${ev.description||''}</textarea>
                    </div>
                    <div>
                        <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:6px;display:block;">Color</label>

                <div style="display:flex;gap:10px;margin-top:22px;justify-content:flex-end;${isEdit?'':''}">

                    <button id="evCancelBtn" style="padding:9px 18px;border-radius:8px;border:1px solid ${modalBorder};background:transparent;color:${modalText};font-size:14px;cursor:pointer;">Cancel</button>

                </div>
            </div>`;
            document.body.appendChild(overlay);

            const titleInput = document.getElementById('evTitle');
            titleInput.focus();
            titleInput.select();

            // Toggle time row on all-day change
            document.getElementById('evAllDay').addEventListener('change', (e) => {

            const escHandler = (e) => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); }};
            document.addEventListener('keydown', escHandler);

            // Save
            document.getElementById('evSaveBtn').addEventListener('click', () => {
                const title = document.getElementById('evTitle').value.trim();
                if (!title) { document.getElementById('evTitle').style.borderColor='#e2445c'; return; }

                    event_date: document.getElementById('evDate').value,

                    description: document.getElementById('evDesc').value.trim()
                };

                    Object.assign(existingEvent, data);
                } else {
                    data.id = Date.now();
                    calendarData.events.push(data);
                }
                saveCalendarData();
                renderCalendar();
                overlay.remove();
                document.removeEventListener('keydown', escHandler);
            });

            // Enter to save
            titleInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('evSaveBtn').click(); });

            // Cancel
            document.getElementById('evCancelBtn').addEventListener('click', () => {
                overlay.remove();
                document.removeEventListener('keydown', escHandler);
            });

            // Delete (edit mode only)
            if (isEdit) {
                document.getElementById('evDeleteBtn').addEventListener('click', () => {
                    calendarData.events = calendarData.events.filter(e => e.id !== existingEvent.id);

                    renderCalendar();

                    document.removeEventListener('keydown', escHandler);

        function saveCalendarData() {
            localStorage.setItem('flowdesk_events', JSON.stringify(calendarData.events));
        }

        // ========== NOTES FUNCTIONS ==========

        function getNoteFolders() {
            const folders = new Set();
            notesData.notes.forEach(n => { if (n.folder) folders.add(n.folder); });
            return [...folders].sort();
        }

        function getFilteredNotes() {
            return notesData.notes.filter(n => {
                if (currentNoteFolder !== null && (n.folder || '') !== currentNoteFolder) return false;
                if (currentNoteTag !== null && !(n.tags || []).includes(currentNoteTag)) return false;
                return true;
            });
        }

        // ── Dashboard ──
        function renderDashboard() {
            const container = document.getElementById('dashboardView');
            const allTasks = appData.groups.flatMap(g => g.tasks.map(t => ({...t, groupName: g.title, groupColor: g.color})));
            const total = allTasks.length;
            const byStatus = {};
            Object.keys(STATUS_COLORS).forEach(s => byStatus[s] = 0);
            allTasks.forEach(t => { if (byStatus[t.status] !== undefined) byStatus[t.status]++; });
            const byPriority = { Critical: 0, High: 0, Medium: 0, Low: 0 };
            allTasks.forEach(t => { if (byPriority[t.priority] !== undefined) byPriority[t.priority]++; });
            const done = byStatus['Done'] || 0;
            const pct = total > 0 ? Math.round(done / total * 100) : 0;
            const today = new Date().toISOString().slice(0, 10);
            const overdue = allTasks.filter(t => t.dueDate && t.dueDate < today && t.status !== 'Done').length;
            const working = byStatus['Working on it'] || 0;
            const stuck = byStatus['Stuck'] || 0;

            // KPIs
            const kpis = [
                { icon: '📋', value: total, label: 'Total Tasks', color: '#0073ea' },
                { icon: '✅', value: done, label: 'Done', color: '#00c875' },
                { icon: '🔄', value: working, label: 'In Progress', color: '#0073ea' },
                { icon: '⚠', value: stuck, label: 'Stuck', color: '#e2445c' },
                { icon: '⏰', value: overdue, label: 'Overdue', color: overdue > 0 ? '#e2445c' : '#797e93' },
                { icon: '📊', value: pct + '%', label: 'Completion', color: pct >= 50 ? '#00c875' : '#fdab3d' },
            ];

            let html = '<div class="dashboard-kpis">';
            kpis.forEach(k => {
                html += `<div class="kpi-card" style="--kpi-color:${k.color}">
                    <div class="kpi-icon">${k.icon}</div>
                    <div class="kpi-value">${k.value}</div>
                    <div class="kpi-label">${k.label}</div>
                </div>`;
            });
            html += '</div>';

            // Charts row
            html += '<div class="dashboard-charts">';

            // Donut chart (SVG)
            html += '<div class="dash-card"><h3>Task Status Distribution</h3><div class="donut-wrap">';
            const size = 160, cx = 80, cy = 80, r = 65, ir = 38;
            let svg = `<svg class="donut-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
            if (total > 0) {
                let angle = -90;
                Object.entries(byStatus).forEach(([status, count]) => {
                    if (count === 0) return;
                    const slice = count / total * 360;
                    const startRad = angle * Math.PI / 180;
                    const endRad = (angle + slice) * Math.PI / 180;
                    const largeArc = slice > 180 ? 1 : 0;
                    const x1 = cx + r * Math.cos(startRad), y1 = cy + r * Math.sin(startRad);
                    const x2 = cx + r * Math.cos(endRad), y2 = cy + r * Math.sin(endRad);
                    const ix1 = cx + ir * Math.cos(endRad), iy1 = cy + ir * Math.sin(endRad);
                    const ix2 = cx + ir * Math.cos(startRad), iy2 = cy + ir * Math.sin(startRad);
                    svg += `<path d="M${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} L${ix1},${iy1} A${ir},${ir} 0 ${largeArc},0 ${ix2},${iy2} Z" fill="${STATUS_COLORS[status] || '#999'}"/>`;
                    angle += slice;
                });
                svg += `<text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="20" font-weight="800" fill="currentColor">${pct}%</text>`;
                svg += `<text x="${cx}" y="${cy + 14}" text-anchor="middle" font-size="10" fill="#999">done</text>`;
            } else {
                svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e8e0c8" stroke-width="${r - ir}"/>`;
                svg += `<text x="${cx}" y="${cy + 5}" text-anchor="middle" font-size="13" fill="#999">No tasks</text>`;
            }
            svg += '</svg>';
            html += svg;
            html += '<div class="donut-legend">';
            Object.entries(byStatus).forEach(([status, count]) => {
                if (count === 0) return;
                html += `<div class="donut-legend-item"><div class="donut-legend-dot" style="background:${STATUS_COLORS[status] || '#999'}"></div>${status}: ${count}</div>`;
            });
            html += '</div></div></div>';

            // Priority bars
            html += '<div class="dash-card"><h3>Priority Breakdown</h3>';
            ['Critical', 'High', 'Medium', 'Low'].forEach(p => {
                const count = byPriority[p] || 0;
                const barPct = total > 0 ? (count / total * 100) : 0;
                const color = PRIORITY_COLORS[p] || '#999';
                html += `<div class="prio-bar-row">
                    <div class="prio-bar-label">${p}</div>
                    <div class="prio-bar-bg"><div class="prio-bar-fill" style="width:${barPct}%; background:${color}"></div></div>
                    <div class="prio-bar-count" style="color:${color}">${count}</div>
                </div>`;
            });
            html += '</div></div>';

            // Second row: Group Progress + Upcoming
            html += '<div class="dashboard-charts">';

            // Group progress
            html += '<div class="dash-card"><h3>Group Progress</h3>';
            appData.groups.forEach(g => {
                const gTotal = g.tasks.length;
                const gDone = g.tasks.filter(t => t.status === 'Done').length;
                const gPct = gTotal > 0 ? Math.round(gDone / gTotal * 100) : 0;
                html += `<div class="group-prog-row">
                    <div class="group-prog-dot" style="color:${g.color}">●</div>
                    <div class="group-prog-name">${g.title}</div>
                    <div class="group-prog-bar"><div class="group-prog-fill" style="width:${gPct}%; background:${g.color}"></div></div>
                    <div class="group-prog-stat">${gDone}/${gTotal}</div>
                </div>`;
            });
            if (appData.groups.length === 0) html += '<div style="color:#999;font-size:12px;">No groups yet</div>';
            html += '</div>';

            // Upcoming deadlines
            html += '<div class="dash-card"><h3>Upcoming Deadlines</h3>';
            const upcoming = allTasks.filter(t => t.dueDate && t.status !== 'Done').sort((a, b) => a.dueDate.localeCompare(b.dueDate)).slice(0, 10);
            if (upcoming.length === 0) {
                html += '<div style="color:#999;font-size:12px;">No upcoming deadlines 🎉</div>';
            } else {
                upcoming.forEach(t => {
                    const due = new Date(t.dueDate + 'T00:00:00');
                    const now = new Date(); now.setHours(0,0,0,0);
                    const diff = Math.round((due - now) / 86400000);
                    let urg, daysText, daysColor;
                    if (diff < 0) { urg = '🔴'; daysText = Math.abs(diff) + 'd overdue'; daysColor = '#e2445c'; }
                    else if (diff === 0) { urg = '🟡'; daysText = 'Today'; daysColor = '#fdab3d'; }
                    else if (diff <= 3) { urg = '🟡'; daysText = diff + 'd left'; daysColor = '#fdab3d'; }
                    else { urg = '🟢'; daysText = diff + 'd left'; daysColor = '#00c875'; }
                    html += `<div class="upcoming-row">
                        <div class="upcoming-urg">${urg}</div>
                        <div class="upcoming-name">${t.name}</div>
                        <div class="upcoming-group" style="background:${t.groupColor}">${t.groupName}</div>
                        <div class="upcoming-days" style="color:${daysColor}">${daysText}</div>
                    </div>`;
                });
            }
            html += '</div></div>';

            container.innerHTML = html;
        }

        // ── Notion-style Notes helpers ──
        function noteRelativeDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            const now = new Date();
            const diffMs = now - d;
            const diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 1) return 'Just now';
            if (diffMin < 60) return diffMin + ' min ago';
            const diffHr = Math.floor(diffMin / 60);
            if (diffHr < 24) return diffHr + 'h ago';
            const diffDay = Math.floor(diffHr / 24);
            if (diffDay === 1) return 'Yesterday';
            if (diffDay < 7) return diffDay + 'd ago';
            if (diffDay < 30) return Math.floor(diffDay / 7) + 'w ago';
            return d.toLocaleDateString();
        }

        function noteStripHtml(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html || '';
            return (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
        }

        function noteWordCount(html) {
            const text = noteStripHtml(html);
            if (!text) return { words: 0, chars: 0, readTime: '0 min' };
            const words = text.split(/\s+/).filter(Boolean).length;
            const chars = text.length;
            const readTime = Math.max(1, Math.ceil(words / 200));
            return { words, chars, readTime: readTime + ' min read' };
        }

        function noteFolderCounts() {
            const counts = {};
            notesData.notes.forEach(n => {
                const f = n.folder || '';
                counts[f] = (counts[f] || 0) + 1;
            });
            return counts;
        }

        // ── Tag colors ──
        const TAG_COLORS = [
            {bg:'#E8F0FE',fg:'#1967D2'}, {bg:'#FCE8E6',fg:'#C5221F'}, {bg:'#E6F4EA',fg:'#137333'},
            {bg:'#FEF7E0',fg:'#B06000'}, {bg:'#F3E8FD',fg:'#7627BB'}, {bg:'#E0F7FA',fg:'#00838F'},
            {bg:'#FFF3E0',fg:'#E65100'}, {bg:'#F1F8E9',fg:'#558B2F'}
        ];
        function getTagColor(tag) {
            let hash = 0; for(let i=0;i<tag.length;i++) hash = ((hash<<5)-hash)+tag.charCodeAt(i);
            return TAG_COLORS[Math.abs(hash) % TAG_COLORS.length];
        }

        function getAllTags() {
            const tags = new Set();
            notesData.notes.forEach(n => (n.tags || []).forEach(t => tags.add(t)));
            return [...tags].sort();
        }

        function addNoteTag(tag) {
            tag = tag.trim().toLowerCase();
            if (!tag) return;
            const note = notesData.notes.find(n => n.id === currentNoteId);
            if (!note) return;
            if (!note.tags) note.tags = [];
            if (note.tags.includes(tag)) return;
            note.tags.push(tag);
            note.updated_at = new Date().toISOString();
            saveNotesData(); renderNotes();
        }

        function removeNoteTag(tag) {
            const note = notesData.notes.find(n => n.id === currentNoteId);
            if (!note || !note.tags) return;
            note.tags = note.tags.filter(t => t !== tag);
            note.updated_at = new Date().toISOString();
            saveNotesData(); renderNotes();
        }

        function filterByTag(tag) {
            if (currentNoteTag === tag) { currentNoteTag = null; } else { currentNoteTag = tag; }
            renderNotes();
        }

        function renderTagsBar(note) {
            if (!note) return '';
            const tags = note.tags || [];
            let html = '<div class="note-tags-bar"><span class="note-tags-list">';
            tags.forEach(t => {
                const c = getTagColor(t);
                html += `<span class="note-tag" style="background:${c.bg};color:${c.fg}" onclick="filterByTag('${t.replace(/'/g,"\\'")}')">${escapeHtml(t)} <span class="tag-remove" onclick="event.stopPropagation();removeNoteTag('${t.replace(/'/g,"\\'")}')">&times;</span></span>`;
            });
            html += '</span><input class="note-tag-input" placeholder="Add tag..." onkeydown="if(event.key===\'Enter\'){addNoteTag(this.value);this.value=\'\';event.preventDefault();}">';
            html += '</div>';
            return html;
        }

        function renderSidebarTags() {
            const allTags = getAllTags();
            if (allTags.length === 0) return '';
            let html = '<div class="sidebar-tags"><div class="sidebar-tags-label">Tags</div>';
            allTags.forEach(t => {
                const active = currentNoteTag === t ? ' active' : '';
                html += `<span class="sidebar-tag-chip${active}" onclick="filterByTag('${t.replace(/'/g,"\\'")}')">${escapeHtml(t)}</span>`;
            });
            html += '</div>';
            return html;
        }

        function setNoteFont(fontKey) {
            const note = notesData.notes.find(n => n.id === currentNoteId);
            if (!note) return;
            note.font = fontKey;
            note.updated_at = new Date().toISOString();
            saveNotesData();
            const el = document.getElementById('noteContentEditable');
            if (el) { el.className = 'note-content font-' + fontKey; }
        }

        function renderNotes() {
            const container = document.getElementById('notesView');
            const filtered = getFilteredNotes();
            const currentNote = notesData.notes.find(n => n.id === currentNoteId);
            const folders = getNoteFolders();
            const fCounts = noteFolderCounts();

            // Folder bar
            const allCount = notesData.notes.length;
            let folderBarHtml = `<div class="notes-folder-bar" role="tablist" aria-label="Note folders">
                <span class="folder-chip${currentNoteFolder === null ? ' active' : ''}" onclick="selectNoteFolder(null)" role="tab" aria-selected="${currentNoteFolder === null}" tabindex="0" aria-label="All notes" onkeydown="if(event.key==='Enter')selectNoteFolder(null)">All <span class="folder-count">${allCount}</span></span>`;
            folders.forEach(f => {
                const active = currentNoteFolder === f ? ' active' : '';
                const isSelected = currentNoteFolder === f;
                const count = fCounts[f] || 0;
                folderBarHtml += `<span class="folder-chip${active}" onclick="selectNoteFolder('${f.replace(/'/g, "\\'")}')" oncontextmenu="folderContextMenu(event,'${f.replace(/'/g, "\\'")}')" role="tab" aria-selected="${isSelected}" tabindex="0" aria-label="Folder ${f}" onkeydown="if(event.key==='Enter')selectNoteFolder('${f.replace(/'/g, "\\'")}')">📁 ${f} <span class="folder-count">(${count})</span></span>`;
            });
            folderBarHtml += '</div>';

            let sidebarHtml = `<div class="notes-sidebar" role="navigation" aria-label="Notes sidebar" id="notesSidebar">
                <div class="notes-sidebar-header">
                    <h3>Notes</h3>
                    <div style="display:flex;gap:4px;">
                        <button class="btn btn-secondary" style="padding:3px 8px;font-size:11px;border-radius:6px;" onclick="newNoteFolder()" title="New Folder" aria-label="Create new folder" tabindex="0">📁+</button>
                        <button class="btn btn-primary" style="padding:4px 12px;font-size:12px;border-radius:6px;" onclick="addNote()" aria-label="Create new note" tabindex="0">+ New</button>
                    </div>
                </div>
                ${folderBarHtml}
                ${renderSidebarTags()}
                <input type="text" class="notes-search" placeholder="Search notes..." oninput="debouncedFilterNotes(this.value)" id="notesSearchInput" aria-label="Search notes" tabindex="0">
                <div class="notes-search-count" id="notesSearchCount" style="display:none;"></div>
                <div class="notes-list" id="notesList" role="listbox" aria-label="Notes list">`;

            // Separate pinned and unpinned
            const pinned = filtered.filter(n => n.pinned);

            container.innerHTML = `<div class="notes-container">${sidebarHtml}<div class="notes-resizer" id="notesResizer"></div>${editorHtml}</div>`;
            initNotesResizer();
            initSlashCommand();

            // Set folder select value after render
            if (currentNote) {
