        // ========== CALENDAR FUNCTIONS ==========

        function renderCalendar() {
            const container = document.getElementById('calendarView');
            if (calendarMode === 'day') { renderCalendarDay(container); return; }
            if (calendarMode === 'week') { renderCalendarWeek(container); return; }

            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            const today = new Date();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

            // Gather task due dates
            const tasksByDate = {};
            (appData.groups || []).forEach(g => {
                (g.tasks || []).forEach(t => {
                    if (t.dueDate) {
                        const d = t.dueDate.substring(0, 10);
                        if (!tasksByDate[d]) tasksByDate[d] = [];
                        tasksByDate[d].push({ name: t.name, status: t.status });
                    }
                });
            });

            // Gather events
            const eventsByDate = {};
            calendarData.events.forEach(ev => {
                const d = ev.event_date;
                if (!eventsByDate[d]) eventsByDate[d] = [];
                eventsByDate[d].push(ev);
            });

            // Prism editorial masthead + KPI strip (Iter 7)
            let html = '';
            const isPrism = document.body.classList.contains('prism-theme');
            if (isPrism) {
                const todayStr = today.toISOString().slice(0, 10);
                const eventsThisMonth = (calendarData.events || []).filter(ev => {
                    const d = (ev.event_date || '').slice(0, 7);
                    return d === `${year}-${String(month+1).padStart(2,'0')}`;
                }).length;
                const eventsToday = (eventsByDate[todayStr] || []).length;
                const tasksToday = (tasksByDate[todayStr] || []).length;
                const upcoming = Object.keys(eventsByDate).filter(d => d >= todayStr).length;
                html += renderPrismViewMasthead({
                    title: 'Calendar',
                    tagline: `${monthNames[month]} ${year} · ${calendarMode} view`,
                    kpis: [
                        { label: 'Today',      value: eventsToday, icon: '●', color: 'var(--pr-accent)', hint: `${tasksToday} task${tasksToday===1?'':'s'} due` },
                        { label: 'This month', value: eventsThisMonth, icon: '◆', color: 'var(--pr-ink)' },
                        { label: 'Upcoming',   value: upcoming, icon: '→', color: 'var(--pr-green)' },
                        { label: 'Days',       value: daysInMonth, icon: '∎', color: 'var(--pr-amber)' }
                    ]
                });
            }

            html += `<div class="calendar-nav">
                <button onclick="calendarDate.setMonth(calendarDate.getMonth()-1); renderCalendar();">&larr;</button>
                <button onclick="calendarDate = new Date(); renderCalendar();">Today</button>
                <button onclick="calendarDate.setMonth(calendarDate.getMonth()+1); renderCalendar();">&rarr;</button>
                <span class="cal-title">${monthNames[month]} ${year}</span>
                <button class="mode-btn ${calendarMode==='month'?'active':''}" onclick="calendarMode='month'; renderCalendar();">Month</button>
                <button class="mode-btn ${calendarMode==='week'?'active':''}" onclick="calendarMode='week'; renderCalendar();">Week</button>
                <button class="mode-btn ${calendarMode==='day'?'active':''}" onclick="calendarMode='day'; renderCalendar();">Day</button>
                <button style="background:#0073ea;color:white;border-color:#0073ea;" onclick="addEvent(formatDateStr(calendarDate))">+ Event</button>
            </div>`;

            html += '<div class="cal-grid">';
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            dayNames.forEach(d => { html += `<div class="cal-header">${d}</div>`; });

            // Empty cells before first day
            for (let i = 0; i < firstDay; i++) {
                html += '<div class="cal-cell" style="opacity:0.3;"></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                html += `<div class="cal-cell" onclick="calendarDate = new Date(${year}, ${month}, ${day}); calendarMode='day'; renderCalendar();">`;
                html += `<div class="day-num${isToday ? ' today' : ''}">${day}</div>`;

                // Show events
                if (eventsByDate[dateStr]) {
                    eventsByDate[dateStr].forEach(ev => {
                        html += `<div class="event-pill" style="background:${ev.color || '#0073ea'}" onclick="event.stopPropagation(); editEvent('${ev.id}')">${ev.all_day ? '' : ev.start_time + ' '}${escapeHtml(ev.title||'')}</div>`;
                    });
                }

                // Show tasks
                if (tasksByDate[dateStr]) {
                    tasksByDate[dateStr].slice(0, 3).forEach(t => {
                        const color = t.status === 'Done' ? '#6bcf7f' : t.status === 'Working' ? '#0073ea' : '#e8830c';
                        html += `<div class="task-pill" style="color:${color}">&#9679; ${t.name}</div>`;
                    });
                    if (tasksByDate[dateStr].length > 3) {
                        html += `<div class="task-pill">+${tasksByDate[dateStr].length - 3} more</div>`;
                    }
                }

                html += '</div>';
            }

            html += '</div>';
            container.innerHTML = html;
        }

        function renderCalendarWeek(container) {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            const date = calendarDate.getDate();
            const dayOfWeek = calendarDate.getDay();
            const weekStart = new Date(year, month, date - dayOfWeek);
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const today = new Date();

            const tasksByDate = {};
            (appData.groups || []).forEach(g => {
                (g.tasks || []).forEach(t => {
                    if (t.dueDate) {
                        const d = t.dueDate.substring(0, 10);
                        if (!tasksByDate[d]) tasksByDate[d] = [];
                        tasksByDate[d].push({ name: t.name, status: t.status });
                    }
                });
            });
            const eventsByDate = {};
            calendarData.events.forEach(ev => {
                const d = ev.event_date;
                if (!eventsByDate[d]) eventsByDate[d] = [];
                eventsByDate[d].push(ev);
            });

            // Prism editorial masthead (Iter 7) — week view
            let html = '';
            const isPrismWeek = document.body.classList.contains('prism-theme');
            if (isPrismWeek) {
                const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
                const inWeek = (dateStr) => {
                    const d = new Date(dateStr);
                    return d >= weekStart && d <= weekEnd;
                };
                let weekEvents = 0, weekTasks = 0, weekTodayEvents = 0;
                const todayStr = today.toISOString().slice(0, 10);
                Object.keys(eventsByDate).forEach(d => { if (inWeek(d)) weekEvents += eventsByDate[d].length; });
                Object.keys(tasksByDate).forEach(d => { if (inWeek(d)) weekTasks += tasksByDate[d].length; });
                weekTodayEvents = (eventsByDate[todayStr] || []).length;
                html += renderPrismViewMasthead({
                    title: 'Calendar',
                    tagline: `Week of ${monthNames[weekStart.getMonth()]} ${weekStart.getDate()} · week view`,
                    kpis: [
                        { label: 'Today',   value: weekTodayEvents, icon: '●', color: 'var(--pr-accent)' },
                        { label: 'Events',  value: weekEvents,      icon: '◆', color: 'var(--pr-ink)' },
                        { label: 'Tasks',   value: weekTasks,       icon: '∑', color: 'var(--pr-amber)' },
                        { label: 'Span',    value: '7 days',        icon: '∎', color: 'var(--pr-green)' }
                    ]
                });
            }

            html += `<div class="calendar-nav">
                <button onclick="calendarDate.setDate(calendarDate.getDate()-7); renderCalendar();">&larr;</button>
                <button onclick="calendarDate = new Date(); renderCalendar();">Today</button>
                <button onclick="calendarDate.setDate(calendarDate.getDate()+7); renderCalendar();">&rarr;</button>
                <span class="cal-title">Week of ${monthNames[weekStart.getMonth()]} ${weekStart.getDate()}, ${weekStart.getFullYear()}</span>
                <button class="mode-btn ${calendarMode==='month'?'active':''}" onclick="calendarMode='month'; renderCalendar();">Month</button>
                <button class="mode-btn ${calendarMode==='week'?'active':''}" onclick="calendarMode='week'; renderCalendar();">Week</button>
                <button class="mode-btn ${calendarMode==='day'?'active':''}" onclick="calendarMode='day'; renderCalendar();">Day</button>
                <button style="background:#0073ea;color:white;border-color:#0073ea;" onclick="addEvent(formatDateStr(calendarDate))">+ Event</button>
            </div>`;

            html += '<div class="cal-grid">';
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            dayNames.forEach(d => { html += `<div class="cal-header">${d}</div>`; });

            for (let i = 0; i < 7; i++) {
                const cellDate = new Date(weekStart);
                cellDate.setDate(weekStart.getDate() + i);
                const cy = cellDate.getFullYear(), cm = cellDate.getMonth(), cd = cellDate.getDate();
                const dateStr = `${cy}-${String(cm+1).padStart(2,'0')}-${String(cd).padStart(2,'0')}`;
                const isToday = today.getFullYear() === cy && today.getMonth() === cm && today.getDate() === cd;

                html += `<div class="cal-cell" style="min-height:140px;" onclick="calendarDate = new Date(${cy}, ${cm}, ${cd}); calendarMode='day'; renderCalendar();">`;
                html += `<div class="day-num${isToday ? ' today' : ''}">${cd}</div>`;

                if (eventsByDate[dateStr]) {
                    eventsByDate[dateStr].forEach(ev => {
                        html += `<div class="event-pill" style="background:${ev.color || '#0073ea'}" onclick="event.stopPropagation(); editEvent('${ev.id}')">${ev.all_day ? '' : ev.start_time + ' '}${escapeHtml(ev.title||'')}</div>`;
                    });
                }
                if (tasksByDate[dateStr]) {
                    tasksByDate[dateStr].forEach(t => {
                        const color = t.status === 'Done' ? '#6bcf7f' : t.status === 'Working' ? '#0073ea' : '#e8830c';
                        html += `<div class="task-pill" style="color:${color}">&#9679; ${t.name}</div>`;
                    });
                }

                html += '</div>';
            }

            html += '</div>';
            container.innerHTML = html;
        }

        function renderCalendarDay(container) {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            const date = calendarDate.getDate();
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const dateStr = formatDateStr(calendarDate);

            const dayEvents = calendarData.events.filter(ev => ev.event_date === dateStr);
            const dayTasks = [];
            (appData.groups || []).forEach(g => {
                (g.tasks || []).forEach(t => {
                    if (t.dueDate && t.dueDate.substring(0, 10) === dateStr) {
                        dayTasks.push({ name: t.name, status: t.status });
                    }
                });
            });

            let html = '';
            const isPrismDay = document.body.classList.contains('prism-theme');
            if (isPrismDay) {
                const weekdayLabel = new Date(year, month, date).toLocaleDateString('en-US', { weekday: 'long' });
                html += renderPrismViewMasthead({
                    title: 'Calendar',
                    tagline: `${weekdayLabel}, ${monthNames[month]} ${date} · day view`,
                    kpis: [
                        { label: 'Events',    value: dayEvents.length, icon: '◆', color: 'var(--pr-accent)' },
                        { label: 'Tasks due', value: dayTasks.length,  icon: '∑', color: 'var(--pr-amber)' },
                        { label: 'All day',   value: dayEvents.filter(ev => ev.all_day).length, icon: '●', color: 'var(--pr-green)' }
                    ]
                });
            }

            html += `<div class="calendar-nav">
                <button onclick="calendarDate.setDate(calendarDate.getDate()-1); renderCalendar();">&larr;</button>
                <button onclick="calendarDate = new Date(); renderCalendar();">Today</button>
                <button onclick="calendarDate.setDate(calendarDate.getDate()+1); renderCalendar();">&rarr;</button>

                <button class="mode-btn ${calendarMode==='month'?'active':''}" onclick="calendarMode='month'; renderCalendar();">Month</button>
                <button class="mode-btn ${calendarMode==='week'?'active':''}" onclick="calendarMode='week'; renderCalendar();">Week</button>
                <button class="mode-btn ${calendarMode==='day'?'active':''}" onclick="calendarMode='day'; renderCalendar();">Day</button>
                <button style="background:#0073ea;color:white;border-color:#0073ea;" onclick="addEvent('${dateStr}')">+ Event</button>
            </div>`;

            html += '<div class="day-events">';

            if (dayEvents.length === 0 && dayTasks.length === 0) {
                html += '<div style="color:#999;padding:20px;">No events or tasks for this day.</div>';
            }

            dayEvents.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
            dayEvents.forEach(ev => {
                html += `<div class="day-event-card" onclick="editEvent('${ev.id}')" style="border-left-color:${ev.color || '#0073ea'}">
                    <div class="day-event-time">${ev.all_day ? 'All Day' : ev.start_time + ' - ' + ev.end_time}</div>
                    <div class="day-event-title">${escapeHtml(ev.title||'')}</div>
                </div>`;
            });

            dayTasks.forEach(t => {
                const color = t.status === 'Done' ? '#6bcf7f' : t.status === 'Working' ? '#0073ea' : '#e8830c';
                html += `<div class="day-event-card" style="border-left-color:${color}">
                    <div class="day-event-time">Task Due</div>
                    <div class="day-event-title">${t.name} <span style="font-size:10px;color:${color};">(${t.status || 'Not Started'})</span></div>
                </div>`;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function formatDateStr(d) {
            if (!d || !(d instanceof Date) || isNaN(d)) return '';
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function addEvent(dateStr) {
            openEventModal(null, dateStr);
        }

        function editEvent(eventId) {
            const ev = calendarData.events.find(e => String(e.id) === String(eventId));
            if (!ev) return;
            openEventModal(ev);
        }

        function openEventModal(existingEvent, dateStr) {
            const isEdit = !!existingEvent;
            const ev = existingEvent || {
                title: '',
                event_date: dateStr || formatDateStr(calendarDate),
                start_time: '09:00',
                end_time: '10:00',
                color: '#0073ea',
                all_day: false,
                description: ''
            };
            const colors = [
                {c:'#0073ea',n:'Blue'},{c:'#00c875',n:'Green'},{c:'#e2445c',n:'Red'},
                {c:'#fdab3d',n:'Orange'},{c:'#a25ddc',n:'Purple'},{c:'#579bfc',n:'Sky'},
                {c:'#7f5347',n:'Brown'},{c:'#c4c4c4',n:'Grey'}
            ];
            const colorOpts = colors.map(({c,n}) =>
                `<label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer;margin-right:8px;">
                    <input type="radio" name="evColor" value="${c}" ${ev.color===c?'checked':''} style="display:none;">
                    <span style="width:22px;height:22px;border-radius:50%;background:${c};display:inline-block;border:${ev.color===c?'2.5px solid #fff':'2.5px solid transparent'};box-shadow:${ev.color===c?'0 0 0 2px '+c:'none'};cursor:pointer;" onclick="this.parentElement.querySelector('input').checked=true;document.querySelectorAll('#eventModal .ev-color-dot').forEach(d=>{d.style.border='2.5px solid transparent';d.style.boxShadow='none';});this.style.border='2.5px solid #fff';this.style.boxShadow='0 0 0 2px ${c}';" class="ev-color-dot"></span>
                </label>`
            ).join('');

            const overlay = document.createElement('div');
            overlay.id = 'eventModalOverlay';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:10000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.15s ease;';
            const thm = THEMES[currentTheme] || THEMES['light'];
            const isDark = !!thm.isDark;
            const modalBg = thm.card || thm.body;
            const modalText = thm.text;
            const modalBorder = thm.border;
            const inputBg = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.04)';

            overlay.innerHTML = `
            <div id="eventModal" style="background:${modalBg};color:${modalText};border-radius:14px;padding:28px 32px;min-width:380px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);font-family:Inter,sans-serif;">
                <h3 style="margin:0 0 20px;font-size:18px;font-weight:600;">${isEdit ? 'Edit Event' : 'New Event'}</h3>
                <div style="display:flex;flex-direction:column;gap:14px;">
                    <div>
                        <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:4px;display:block;">Title</label>
                        <input id="evTitle" type="text" value="${(ev.title||'').replace(/"/g,'&quot;')}" placeholder="Event title..."
                            style="width:100%;padding:9px 12px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};box-sizing:border-box;outline:none;">
                    </div>
                    <div>
                        <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:4px;display:block;">Date</label>
                        <input id="evDate" type="date" value="${ev.event_date||''}"
                            style="width:100%;padding:9px 12px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};box-sizing:border-box;outline:none;">
                    </div>
                    <div>
                        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                            <input id="evAllDay" type="checkbox" ${ev.all_day?'checked':''} style="width:16px;height:16px;cursor:pointer;">
                            All day
                        </label>
                    </div>
                    <div id="evTimeRow" style="display:${ev.all_day?'none':'flex'};gap:12px;">
                        <div style="flex:1;">
                            <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:4px;display:block;">Start</label>
                            <div style="display:flex;gap:4px;align-items:center;">
                                <select id="evStartH" style="flex:1;padding:9px 8px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};outline:none;cursor:pointer;">
                                    ${Array.from({length:24},(_,i)=>`<option value="${String(i).padStart(2,'0')}" ${String(i).padStart(2,'0')===(ev.start_time||'09:00').split(':')[0]?'selected':''}>${String(i).padStart(2,'0')}</option>`).join('')}
                                </select>
                                <span style="color:${modalText};font-weight:600;">:</span>
                                <select id="evStartM" style="flex:1;padding:9px 8px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};outline:none;cursor:pointer;">
                                    ${Array.from({length:12},(_,i)=>`<option value="${String(i*5).padStart(2,'0')}" ${String(i*5).padStart(2,'0')===(ev.start_time||'09:00').split(':')[1]?'selected':''}>${String(i*5).padStart(2,'0')}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div style="flex:1;">
                            <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:4px;display:block;">End</label>
                            <div style="display:flex;gap:4px;align-items:center;">
                                <select id="evEndH" style="flex:1;padding:9px 8px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};outline:none;cursor:pointer;">
                                    ${Array.from({length:24},(_,i)=>`<option value="${String(i).padStart(2,'0')}" ${String(i).padStart(2,'0')===(ev.end_time||'10:00').split(':')[0]?'selected':''}>${String(i).padStart(2,'0')}</option>`).join('')}
                                </select>
                                <span style="color:${modalText};font-weight:600;">:</span>
                                <select id="evEndM" style="flex:1;padding:9px 8px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};outline:none;cursor:pointer;">
                                    ${Array.from({length:12},(_,i)=>`<option value="${String(i*5).padStart(2,'0')}" ${String(i*5).padStart(2,'0')===(ev.end_time||'10:00').split(':')[1]?'selected':''}>${String(i*5).padStart(2,'0')}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:4px;display:block;">Description</label>
                        <textarea id="evDesc" rows="2" placeholder="Optional..."
                            style="width:100%;padding:9px 12px;border:1px solid ${modalBorder};border-radius:8px;font-size:14px;background:${inputBg};color:${modalText};box-sizing:border-box;outline:none;resize:vertical;font-family:inherit;">${ev.description||''}</textarea>
                    </div>
                    <div>
                        <label style="font-size:12px;font-weight:500;color:${modalText};opacity:0.7;margin-bottom:6px;display:block;">Color</label>
                        <div>${colorOpts}</div>
                    </div>
                </div>
                <div style="display:flex;gap:10px;margin-top:22px;justify-content:flex-end;${isEdit?'':''}">
                    ${isEdit ? `<button id="evDeleteBtn" style="margin-right:auto;padding:9px 18px;border-radius:8px;border:1px solid #e2445c;background:transparent;color:#e2445c;font-size:14px;cursor:pointer;font-weight:500;">Delete</button>` : ''}
                    <button id="evCancelBtn" style="padding:9px 18px;border-radius:8px;border:1px solid ${modalBorder};background:transparent;color:${modalText};font-size:14px;cursor:pointer;">Cancel</button>
                    <button id="evSaveBtn" style="padding:9px 24px;border-radius:8px;border:none;background:#0073ea;color:white;font-size:14px;cursor:pointer;font-weight:500;">Save</button>
                </div>
            </div>`;
            // Remove any existing modal first
            const existingOverlay = document.getElementById('eventModalOverlay');
            if (existingOverlay) existingOverlay.remove();
            document.body.appendChild(overlay);

            const titleInput = document.getElementById('evTitle');
            titleInput.focus();
            titleInput.select();

            // Toggle time row on all-day change
            document.getElementById('evAllDay').addEventListener('change', (e) => {
                document.getElementById('evTimeRow').style.display = e.target.checked ? 'none' : 'flex';
            });

            // Auto-set end time = start time + 1 hour when start changes
            const autoSetEndTime = () => {
                let h = parseInt(document.getElementById('evStartH').value, 10);
                const m = document.getElementById('evStartM').value;
                h = (h + 1) % 24;
                document.getElementById('evEndH').value = String(h).padStart(2, '0');
                document.getElementById('evEndM').value = m;
            };
            document.getElementById('evStartH').addEventListener('change', autoSetEndTime);
            document.getElementById('evStartM').addEventListener('change', autoSetEndTime);

            // Shared cleanup
            const closeModal = () => { overlay.remove(); document.removeEventListener('keydown', escHandler); };

            // Close on overlay click
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

            // Close on Escape
            const escHandler = (e) => { if (e.key === 'Escape') closeModal(); };
            document.addEventListener('keydown', escHandler);

            // Save
            document.getElementById('evSaveBtn').addEventListener('click', () => {
                const title = document.getElementById('evTitle').value.trim();
                if (!title) { document.getElementById('evTitle').style.borderColor='#e2445c'; return; }
                const evDateVal = document.getElementById('evDate').value;
                if (!evDateVal) { document.getElementById('evDate').style.borderColor='#e2445c'; return; }
                const selectedColor = document.querySelector('#eventModal input[name="evColor"]:checked');
                const data = {
                    title,
                    event_date: evDateVal,
                    start_time: document.getElementById('evStartH').value + ':' + document.getElementById('evStartM').value,
                    end_time: document.getElementById('evEndH').value + ':' + document.getElementById('evEndM').value,
                    color: selectedColor ? selectedColor.value : '#0073ea',
                    all_day: document.getElementById('evAllDay').checked,
                    description: document.getElementById('evDesc').value.trim()
                };
                if (isEdit) {
                    Object.assign(existingEvent, data);
                } else {
                    data.id = Date.now();
                    calendarData.events.push(data);
                }
                saveCalendarData();
                renderCalendar();
                closeModal();
            });

            // Enter to save
            titleInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('evSaveBtn').click(); });

            // Cancel
            document.getElementById('evCancelBtn').addEventListener('click', () => closeModal());

            // Delete (edit mode only)
            if (isEdit) {
                document.getElementById('evDeleteBtn').addEventListener('click', () => {
                    trackDeletedEvent(existingEvent.id);
                    calendarData.events = calendarData.events.filter(e => String(e.id) !== String(existingEvent.id));
                    saveCalendarData();
                    renderCalendar();
                    closeModal();
                });
            }
        }

        // Track deleted event IDs so sync can tell the server
        let deletedEventIds = JSON.parse(localStorage.getItem('flowdesk_deleted_events') || '[]');

        function trackDeletedEvent(eventId) {
            deletedEventIds.push(String(eventId));
            localStorage.setItem('flowdesk_deleted_events', JSON.stringify(deletedEventIds));
        }

        function clearDeletedEventIds() {
            deletedEventIds = [];
            localStorage.removeItem('flowdesk_deleted_events');
        }

        function saveCalendarData() {
            localStorage.setItem('flowdesk_events', JSON.stringify(calendarData.events));
        }

        // ========== NOTES FUNCTIONS ==========

        function getNoteFolders() {
            const folders = new Set();
            notesData.notes.forEach(n => { if (n.folder) folders.add(n.folder); });
            return [...folders].sort();
        }

        function getFilteredNotes() {
            return notesData.notes.filter(n => {
                if (currentNoteFolder !== null && (n.folder || '') !== currentNoteFolder) return false;
                if (currentNoteTag !== null && !(n.tags || []).includes(currentNoteTag)) return false;
                return true;
            });
        }

        // ── Dashboard ──
        function renderDashboard() {
            const container = document.getElementById('dashboardView');
            const isPrism = document.body.classList.contains('prism-theme');
            if (isPrism) { renderPrismDashboard(container); return; }
            // (Legacy dashboard rendering below — kept for non-Prism themes)
            renderLegacyDashboard(container);
        }

        // ── Prism Bento dashboard ──
        function renderPrismDashboard(container) {
            const allGroups = (appData && appData.groups) ? appData.groups : [];
            const activeGroup = selectedFlowId ? allGroups.find(g => g.id === selectedFlowId) : null;
            // Stale selectedFlowId → quietly clear
            if (selectedFlowId && !activeGroup) selectedFlowId = null;
            const groups = activeGroup ? [activeGroup] : allGroups;
            const allTasks = groups.flatMap(g => (g.tasks || []).map(t => ({...t, groupName: g.title, groupColor: g.color, groupId: g.id})));
            const total = allTasks.length;
            const todayStr = new Date().toISOString().slice(0, 10);
            const done = allTasks.filter(t => t.status === 'Done').length;
            const working = allTasks.filter(t => t.status === 'Working on it').length;
            const stuck = allTasks.filter(t => t.status === 'Stuck').length;
            const overdue = allTasks.filter(t => t.dueDate && t.dueDate < todayStr && t.status !== 'Done').length;
            const pct = total > 0 ? Math.round(done / total * 100) : 0;

            // Greeting
            const hour = new Date().getHours();
            const greet = hour < 5 ? 'Working late' : hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
            const todayLabel = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            const todayEvents = (calendarData.events || []).filter(ev => {
                const d = (ev.date || ev.start || '').slice(0, 10);
                return d === todayStr;
            });
            const todayTasks = allTasks.filter(t => t.dueDate === todayStr && t.status !== 'Done');

            const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

            // Atlas masthead — editorial nameplate (shows in all skins, looks best in Atlas)
            const mastheadDate = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const issueNum = dayOfYear(new Date());
            const mastheadTagline = atlasTaglines[issueNum % atlasTaglines.length];
            let html = '';
            html += `<div class="prism-masthead">
                <div class="prism-masthead-issue">Vol. II · Issue No. ${String(issueNum).padStart(3,'0')}</div>
                <div class="prism-masthead-title">The Flowdesk Daily</div>
                <div class="prism-masthead-date">${mastheadDate} · ${esc(mastheadTagline)}</div>
            </div>`;

            const filterChip = activeGroup
                ? `<div class="prism-hero-filter">
                     <span class="pr-bc-dot" style="background:${activeGroup.color || '#999'}"></span>
                     <span class="pr-bc-label">Focused on <strong>${esc(activeGroup.title || '')}</strong></span>
                     <span class="pr-bc-x" onclick="selectedFlowId=null; renderApp(); renderPrismSidebar();" title="Show all flows">✕</span>
                   </div>`
                : '';
            html += `
                <div class="prism-hero">
                    <div>
                        <h1>${activeGroup ? esc(activeGroup.title) : greet + ', Kevin'}</h1>
                        <div class="prism-hero-sub">${todayLabel} · ${todayEvents.length} event${todayEvents.length===1?'':'s'} · ${todayTasks.length} task${todayTasks.length===1?'':'s'} due today${activeGroup ? ' · in this flow' : ''}</div>
                        ${filterChip}
                    </div>
                    <div class="prism-hero-actions">
                        <button class="prism-btn prism-btn-ghost" onclick="document.getElementById('prismFullSyncBtn')?.click()">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
                            Refresh
                        </button>
                        <button class="prism-btn prism-btn-ghost" onclick="enterFocusMode()" title="Enter Focus mode (⌘⇧F)">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>
                            Focus
                        </button>
                        <button class="prism-btn prism-btn-primary" onclick="document.getElementById('prismNewTaskBtn')?.click()">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                            New task
                        </button>
                    </div>
                </div>
            `;

            // 6-KPI row (Mission-style operator dashboard)
            const notStarted = allTasks.filter(t => t.status === 'Not Started' || !t.status).length;
            const flowScopeCount = groups.length;
            const progressHint = activeGroup ? 'in this flow' : 'across all flows';
            const totalHint    = activeGroup
                ? `in ${esc(activeGroup.title || 'flow')}`
                : `${flowScopeCount} flow${flowScopeCount===1?'':'s'}`;
            const kpis = [
                { label: 'Total',    value: total,        hint: totalHint,                 color: 'var(--pr-ink)',       icon: '∑' },
                { label: 'Working',  value: working,      hint: 'in flight',               color: 'var(--pr-accent)',    icon: '⚡' },
                { label: 'Stuck',    value: stuck,        hint: 'blocked',                 color: 'var(--pr-red)',       icon: '⚠' },
                { label: 'Overdue',  value: overdue,      hint: 'past due',                color: 'var(--pr-amber)',     icon: '⏱' },
                { label: 'Done',     value: done,         hint: `of ${total} total`,       color: 'var(--pr-green)',     icon: '✓' },
                { label: 'Progress', value: pct + '%',    hint: progressHint,              color: 'var(--pr-accent-2, var(--pr-accent))', icon: '◐' },
            ];
            html += '<div class="prism-bento-kpis">';
            kpis.forEach(k => {
                html += `<div class="prism-tile prism-kpi">
                    <div class="prism-kpi-head">
                        <div class="prism-kpi-icon" style="background: color-mix(in oklab, ${k.color} 18%, transparent); color: ${k.color};">${k.icon}</div>
                        <span class="prism-kpi-label">${k.label}</span>
                    </div>
                    <div class="prism-kpi-value">${k.value}</div>
                    <div class="prism-kpi-hint">${k.hint}</div>
                </div>`;
            });
            html += '</div>';

            // Bento body
            html += '<div class="prism-bento">';

            // On deck today (span 2)
            const onDeck = allTasks
                .filter(t => t.status !== 'Done')
                .sort((a, b) => {
                    const ad = a.dueDate || '9999-12-31';
                    const bd = b.dueDate || '9999-12-31';
                    return ad.localeCompare(bd);
                })
                .slice(0, 5);
            html += `<div class="prism-tile span-2">
                <div class="prism-tile-head">
                    <div class="prism-tile-title">On deck today</div>
                    <button class="prism-tile-link" onclick="switchView('table'); syncPrismNavActive('table');">See all →</button>
                </div>
                <div>`;
            if (onDeck.length === 0) {
                html += `<div class="prism-empty">All caught up. Add a task to get going.</div>`;
            } else {
                onDeck.forEach(t => {
                    const isDone = t.status === 'Done';
                    const due = t.dueDate ? prismRelativeDay(t.dueDate) : '—';
                    const prioHtml = prismPrioHtml(t.priority);
                    html += `<div class="prism-task-row" onclick="switchView('table'); syncPrismNavActive('table');">
                        <div class="prism-task-bar" style="background:${t.groupColor || '#999'}"></div>
                        <div class="prism-task-check ${isDone ? 'done' : ''}"></div>
                        <div class="prism-task-body">
                            <div class="prism-task-title ${isDone ? 'done' : ''}">${esc(t.name)}</div>
                            <div class="prism-task-meta">
                                <span>${esc(t.groupName || '')}</span>
                                <span>·</span>
                                <span>${due}</span>
                            </div>
                        </div>
                        ${prioHtml}
                    </div>`;
                });
            }
            html += `</div></div>`;

            // Today's calendar (span 2)
            html += `<div class="prism-tile span-2">
                <div class="prism-tile-head">
                    <div class="prism-tile-title">Today's calendar</div>
                    <div class="prism-tile-meta">${todayEvents.length} event${todayEvents.length===1?'':'s'}</div>
                </div>
                <div class="prism-schedule">`;
            if (todayEvents.length === 0) {
                html += `<div class="prism-schedule-empty">No events scheduled</div>`;
            } else {
                // Hour labels 9-17 (5 marks)
                const hours = [9, 11, 13, 15, 17];
                hours.forEach((h, i) => {
                    const top = 12 + i * 56;
                    html += `<div class="prism-schedule-hour" style="top:${top}px;">${h}:00</div>`;
                    html += `<div class="prism-schedule-line" style="top:${top + 6}px;"></div>`;
                });
                todayEvents.forEach(ev => {
                    // Parse start/end (events have .startTime "HH:MM" + .date "YYYY-MM-DD" OR .start ISO)
                    let startH, endH;
                    if (ev.startTime) {
                        const [sh, sm] = ev.startTime.split(':').map(Number);
                        startH = sh + (sm || 0) / 60;
                    } else if (ev.start) {
                        const sd = new Date(ev.start);
                        startH = sd.getHours() + sd.getMinutes() / 60;
                    } else {
                        startH = 9;
                    }
                    if (ev.endTime) {
                        const [eh, em] = ev.endTime.split(':').map(Number);
                        endH = eh + (em || 0) / 60;
                    } else if (ev.end) {
                        const ed = new Date(ev.end);
                        endH = ed.getHours() + ed.getMinutes() / 60;
                    } else {
                        endH = startH + 1;
                    }
                    const top = (startH - 9) * 28 + 12;
                    const h = Math.max(22, (endH - startH) * 28);
                    const color = ev.color || '#4A5CC9';
                    const startTimeStr = ev.startTime || (ev.start ? new Date(ev.start).toTimeString().slice(0,5) : '');
                    const endTimeStr = ev.endTime || (ev.end ? new Date(ev.end).toTimeString().slice(0,5) : '');
                    const kind = eventKindGlyph(ev);
                    html += `<div class="prism-schedule-event" style="top:${top}px;height:${h}px;background:color-mix(in oklab, ${color} 22%, var(--pr-surface));border-left:3px solid ${color};">
                        <div class="prism-schedule-event-title"><span class="pr-glyph ${kind.kind}" style="color:${color};">${kind.glyph}</span>${esc(ev.title || ev.name || 'Untitled')}</div>
                        <div class="prism-schedule-event-time">${startTimeStr}${endTimeStr ? '–' + endTimeStr : ''}</div>
                    </div>`;
                });
            }
            html += `</div></div>`;

            // Flows progress (span 2)
            html += `<div class="prism-tile span-2">
                <div class="prism-tile-head">
                    <div class="prism-tile-title">Flows</div>
                    <button class="prism-tile-link" onclick="switchView('table'); syncPrismNavActive('table');">Open →</button>
                </div>
                <div>`;
            if (groups.length === 0) {
                html += `<div class="prism-empty">No flows yet</div>`;
            } else {
                groups.slice(0, 6).forEach(g => {
                    const ts = g.tasks || [];
                    const gDone = ts.filter(t => t.status === 'Done').length;
                    const gPct = ts.length > 0 ? Math.round(gDone / ts.length * 100) : 0;
                    const gStuck = ts.filter(t => t.status === 'Stuck' || (t.dueDate && t.dueDate < todayStr && t.status !== 'Done')).length;
                    html += `<div class="prism-flow-prog">
                        <div class="prism-flow-prog-head">
                            <span class="prism-flow-prog-dot" style="background:${g.color || '#999'}"></span>
                            <span class="prism-flow-prog-name">${esc(g.title)}</span>
                            <span class="prism-flow-prog-stat">${gDone}/${ts.length}</span>
                            ${gStuck > 0 ? `<span class="prism-flow-prog-warn">⚠ ${gStuck}</span>` : ''}
                        </div>
                        <div class="prism-flow-prog-bar"><div class="prism-flow-prog-fill" style="width:${gPct}%;background:${g.color || '#999'};"></div></div>
                    </div>`;
                });
            }
            html += `</div></div>`;

            // Recent notes (span 2)
            const recentNotes = (notesData.notes || [])
                .slice()
                .sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''))
                .slice(0, 4);
            html += `<div class="prism-tile span-2">
                <div class="prism-tile-head">
                    <div class="prism-tile-title">Recent notes</div>
                    <button class="prism-tile-link" onclick="switchView('notes'); syncPrismNavActive('notes');">Open library →</button>
                </div>
                <div class="prism-notes-grid">`;
            if (recentNotes.length === 0) {
                html += `<div class="prism-empty" style="grid-column:span 2;">No notes yet</div>`;
            } else {
                recentNotes.forEach(n => {
                    const folder = n.folder || 'Unfiled';
                    const previewText = (typeof noteStripHtml === 'function' ? noteStripHtml(n.content || '') : (n.content || '')).slice(0, 90);
                    const time = (typeof noteRelativeDate === 'function' ? noteRelativeDate(n.updatedAt) : '') || '';
                    const color = n.color || '#4A5CC9';
                    html += `<div class="prism-note-card" onclick="switchView('notes'); syncPrismNavActive('notes'); if(typeof selectNote==='function'){setTimeout(()=>selectNote(${JSON.stringify(n.id)}), 30);}">
                        <div class="prism-note-card-tag">
                            <span class="prism-note-card-tag-dot" style="background:${color};"></span>
                            <span class="prism-note-card-tag-name">${esc(folder)}</span>
                        </div>
                        <div class="prism-note-card-title">${esc(n.title || 'Untitled')}</div>
                        <div class="prism-note-card-preview">${esc(previewText)}${previewText.length >= 90 ? '…' : ''}</div>
                        <div class="prism-note-card-time">${time}</div>
                    </div>`;
                });
            }
            html += `</div></div>`;

            // Atlas quote of the day (span 2) — Atlas editorial variant
            const quote = atlasQuoteOfDay();
            html += `<div class="prism-tile prism-quote span-2">
                <div class="prism-quote-mark">"</div>
                <div class="prism-quote-text">${esc(quote.text)}</div>
                <div class="prism-quote-author">${esc(quote.author)}</div>
            </div>`;

            // Today's agenda (span 2) — Atlas editorial numbered list
            //   Today-due + Working-on-it, capped at 8, numbered
            const agendaItems = allTasks
                .filter(t => t.status !== 'Done' && (t.dueDate === todayStr || t.status === 'Working on it'))
                .sort((a, b) => {
                    // Working-on-it items first, then by priority, then by name
                    const wa = a.status === 'Working on it' ? 0 : 1;
                    const wb = b.status === 'Working on it' ? 0 : 1;
                    if (wa !== wb) return wa - wb;
                    const prioRank = { Critical: 0, High: 1, Medium: 2, Low: 3 };
                    const pa = prioRank[a.priority] ?? 4;
                    const pb = prioRank[b.priority] ?? 4;
                    if (pa !== pb) return pa - pb;
                    return (a.name || '').localeCompare(b.name || '');
                })
                .slice(0, 8);
            html += `<div class="prism-tile span-2">
                <div class="prism-tile-head">
                    <div class="prism-tile-title">Today's agenda</div>
                    <div class="prism-tile-meta">${agendaItems.length} item${agendaItems.length===1?'':'s'} · in order</div>
                </div>
                <div>`;
            if (agendaItems.length === 0) {
                html += `<div class="prism-empty">Nothing on deck for today — enjoy the quiet.</div>`;
            } else {
                agendaItems.forEach((t, i) => {
                    const isDone = t.status === 'Done';
                    const num = String(i + 1).padStart(2, '0') + '.';
                    const prioHtml = prismPrioHtml(t.priority);
                    const metaBits = [];
                    if (t.status && t.status !== 'Not Started') metaBits.push(esc(t.status));
                    if (t.groupName) metaBits.push(esc(t.groupName));
                    html += `<div class="prism-agenda-row">
                        <span class="prism-agenda-num">${num}</span>
                        <span class="prism-agenda-title ${isDone ? 'done' : ''}">${esc(t.name)}</span>
                        <span class="prism-agenda-meta">${prioHtml}${metaBits.length ? '<span style="margin-left:8px;">' + metaBits.join(' · ') + '</span>' : ''}</span>
                    </div>`;
                });
            }
            html += `</div></div>`;

            // Activity log tile (span 2) — Mission variant
            html += `<div class="prism-tile span-2">
                <div class="prism-tile-head">
                    <div class="prism-tile-title">Activity log</div>
                    <div class="prism-tile-meta">last ${Math.min(ACTIVITY_MAX, activityLog.length)} · newest first</div>
                </div>
                <div id="prismActivityLogBody" class="prism-activity">${renderActivityLogHtml()}</div>
            </div>`;

            // Hotkey legend tile (span 2) — Mission variant
            html += `<div class="prism-tile span-2">
                <div class="prism-tile-head">
                    <div class="prism-tile-title">Shortcuts</div>
                    <div class="prism-tile-meta">press <span style="font-family:var(--pr-mono);background:var(--pr-surface-2);padding:1px 5px;border-radius:4px;">g</span> then a letter</div>
                </div>
                <div class="prism-hotkeys">
                    <div class="prism-hotkey-group-title">Global</div>
                    ${hotkeyRow('Search', ['⌘','K'])}
                    ${hotkeyRow('New task', ['⌘','N'])}
                    ${hotkeyRow('Quick sync', ['⌘','/'])}
                    ${hotkeyRow('Change skin', ['⌘','⇧','T'])}
                    ${hotkeyRow('Focus mode', ['⌘','⇧','F'])}
                    <div class="prism-hotkey-group-title">Navigate (g then…)</div>
                    ${hotkeyRow('Home', ['g','h'])}
                    ${hotkeyRow('Flows', ['g','f'])}
                    ${hotkeyRow('Board', ['g','b'])}
                    ${hotkeyRow('Timeline', ['g','t'])}
                    ${hotkeyRow('Calendar', ['g','c'])}
                    ${hotkeyRow('Notes', ['g','n'])}
                </div>
            </div>`;

            // Quick capture gradient tile (span 2)
            html += `<div class="prism-tile prism-capture span-2" onclick="document.getElementById('prismNewTaskBtn')?.click()">
                <div class="prism-capture-inner">
                    <div class="prism-capture-text">
                        <div class="prism-capture-eyebrow">Quick capture</div>
                        <div class="prism-capture-title">Drop a thought.<br>Sort it later.</div>
                        <div class="prism-capture-hint">Click anywhere on this tile to add a task.</div>
                    </div>
                    <div class="prism-capture-icon">✦</div>
                </div>
            </div>`;

            // Week ahead heatmap (span 4)
            html += `<div class="prism-tile span-4">
                <div class="prism-tile-head">
                    <div class="prism-tile-title">Week ahead</div>
                    <div class="prism-tile-meta">7-day load (events + tasks due)</div>
                </div>
                <div class="prism-week">`;
            const todayD = new Date();
            const weekStart = new Date(todayD);
            const dayOfWeek = todayD.getDay();
            weekStart.setDate(todayD.getDate() - ((dayOfWeek + 6) % 7));  // Monday
            const dayShort = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
            for (let i = 0; i < 7; i++) {
                const d = new Date(weekStart);
                d.setDate(weekStart.getDate() + i);
                const dStr = d.toISOString().slice(0, 10);
                const evs = (calendarData.events || []).filter(ev => (ev.date || (ev.start || '').slice(0, 10)) === dStr);
                const tdue = allTasks.filter(t => t.dueDate === dStr).length;
                const load = evs.length + tdue;
                const heat = Math.min(1, load / 4);
                const isToday = dStr === todayStr;
                const isWeekend = (i === 5 || i === 6);     // Sat, Sun
                const isPast = dStr < todayStr;
                const cls = ['prism-week-day'];
                if (isToday) cls.push('today');
                if (isWeekend) cls.push('weekend');
                if (isPast) cls.push('past');
                html += `<div class="${cls.join(' ')}">
                    <div class="prism-week-day-label">${dayShort[i]}</div>
                    <div class="prism-week-day-num">${d.getDate()}</div>
                    <div class="prism-week-day-bar"><div class="prism-week-day-fill" style="width:${heat * 100}%;"></div></div>
                    <div class="prism-week-day-count">${evs.length} ev · ${tdue} due</div>
                </div>`;
            }
            html += `</div></div>`;

            html += '</div>';  // end bento body

            container.innerHTML = html;
        }

        // ── Atlas editorial helpers (Iter 5) ──
        function dayOfYear(d) {
            const start = new Date(d.getFullYear(), 0, 0);
            const diff = d - start;
            return Math.floor(diff / 86400000);
        }

        // Shared editorial masthead + KPI strip used by each Prism view
        // (Tasks, Kanban, Calendar, Notes). Dashboard has its own bespoke
        // masthead. Returns HTML string; caller prepends to view container.
        // opts: { title, tagline?, kpis?: [{label, value, color?, icon?, hint?}] }
        function renderPrismViewMasthead(opts) {
            opts = opts || {};
            const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            const issueNum = dayOfYear(new Date());
            const dateStr = new Date().toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
            let html = `<div class="prism-masthead">
                <div class="prism-masthead-issue">Vol. II · Issue No. ${String(issueNum).padStart(3,'0')}</div>
                <div class="prism-masthead-title">${esc(opts.title || '')}</div>
                <div class="prism-masthead-date">${esc(dateStr)}${opts.tagline ? ' · ' + esc(opts.tagline) : ''}</div>
            </div>`;
            if (Array.isArray(opts.kpis) && opts.kpis.length) {
                html += '<div class="prism-view-kpis">';
                opts.kpis.forEach(k => {
                    const color = k.color || 'var(--pr-accent)';
                    html += `<div class="prism-view-kpi">
                        <div class="prism-view-kpi-icon" style="background: color-mix(in oklab, ${color} 18%, transparent); color: ${color};">${esc(k.icon || '◉')}</div>
                        <div class="prism-view-kpi-body">
                            <span class="prism-view-kpi-label">${esc(k.label || '')}</span>
                            <span class="prism-view-kpi-value">${esc(String(k.value == null ? '' : k.value))}</span>
                            ${k.hint ? `<span class="prism-view-kpi-hint">${esc(k.hint)}</span>` : ''}
                        </div>
                    </div>`;
                });
                html += '</div>';
            }
            return html;
        }
        const atlasTaglines = [
            'Of ledgers, letters, and light.',
            'All the work that\'s fit to ship.',
            'Process, published daily.',
            'The unhurried edition.',
            'Bound by craft, carried by calendar.',
            'A folio of open loops.',
            'Type, time, and tasks in good order.',
        ];
        const atlasQuotes = [
            { text: 'Small, steady strokes.', author: 'Folk wisdom' },
            { text: 'The best way out is always through.', author: 'Robert Frost' },
            { text: 'Discipline equals freedom.', author: 'Jocko Willink' },
            { text: 'Do what you can, with what you have, where you are.', author: 'Theodore Roosevelt' },
            { text: 'Make it work, make it right, make it fast.', author: 'Kent Beck' },
            { text: 'Simplicity is the ultimate sophistication.', author: 'Leonardo da Vinci' },
            { text: 'Well done is better than well said.', author: 'Benjamin Franklin' },
            { text: 'The obstacle is the way.', author: 'Marcus Aurelius' },
            { text: 'Done is better than perfect.', author: 'Sheryl Sandberg' },
            { text: 'Beware the barrenness of a busy life.', author: 'Socrates' },
            { text: 'Slow is smooth, smooth is fast.', author: 'Military adage' },
        ];
        function atlasQuoteOfDay() {
            const idx = dayOfYear(new Date()) % atlasQuotes.length;
            return atlasQuotes[idx];
        }
        // P0/P1/P2 priority token — Mission operator style
        // Critical/Urgent → P0, High → P1, Medium → P2, Low → P3
        function prismPrioToken(priority) {
            const p = (priority || '').toLowerCase().trim();
            if (!p || p === 'none' || p === '—') return null;
            if (p === 'critical' || p === 'urgent' || p === 'p0') return { level: 'p0', label: 'P0' };
            if (p === 'high'     || p === 'p1')                   return { level: 'p1', label: 'P1' };
            if (p === 'medium'   || p === 'med' || p === 'p2')    return { level: 'p2', label: 'P2' };
            if (p === 'low'      || p === 'p3')                   return { level: 'p3', label: 'P3' };
            return { level: 'p2', label: 'P2' };
        }
        function prismPrioHtml(priority) {
            const t = prismPrioToken(priority);
            if (!t) return '';
            return `<span class="prism-prio ${t.level}" title="${priority || ''} priority">${t.label}</span>`;
        }

        function eventKindGlyph(ev) {
            const title = ((ev && (ev.title || ev.name)) || '').toLowerCase();
            if (/\b(focus|deep\s*work|writing|heads[-\s]?down)\b/.test(title)) return { glyph: '●', kind: 'focus' };
            if (/\b(call|zoom|meet|hangout|sync|1:1|1-on-1|standup|stand-up)\b/.test(title)) return { glyph: '○', kind: 'call' };
            return { glyph: '◆', kind: 'meeting' };
        }

        // ── Activity log helpers (Iter 4) ──
        function prismRelativeTime(ts) {
            if (!ts) return '';
            const diff = Math.max(0, Date.now() - ts);
            if (diff < 60000) return Math.max(1, Math.floor(diff / 1000)) + 's';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
            const d = new Date(ts);
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return hh + ':' + mm;
        }
        function activityGlyphClass(type) {
            const t = (type || '').toLowerCase();
            if (t === 'add')   return 'add';
            if (t === 'done')  return 'done';
            if (t === 'stuck') return 'stuck';
            if (t === 'moved') return 'move';
            if (t === 'flow')  return 'flow';
            if (t === 'sync')  return 'sync';
            return '';
        }
        function renderActivityLogHtml() {
            if (!activityLog || activityLog.length === 0) {
                return '<div class="prism-activity-empty">No activity yet — changes will appear here.</div>';
            }
            const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            // Format "Name → Target" detail into styled spans if the arrow is present
            return activityLog.slice(0, 18).map(e => {
                let bodyHtml;
                const arrowIdx = (e.detail || '').indexOf('→');
                if (arrowIdx > 0) {
                    const before = e.detail.slice(0, arrowIdx).trim();
                    const after  = e.detail.slice(arrowIdx + 1).trim();
                    bodyHtml = `<span class="ac-target">${esc(before)}</span><span class="ac-arrow">→</span><span class="ac-to">${esc(after)}</span>`;
                } else {
                    bodyHtml = `<span class="ac-target">${esc(e.detail || '')}</span>`;
                }
                return `<div class="prism-activity-row">
                    <span class="prism-activity-time">${prismRelativeTime(e.t)}</span>
                    <span class="prism-activity-glyph ${activityGlyphClass(e.type)}">${esc((e.type || '').slice(0,5))}</span>
                    <span class="prism-activity-body">${bodyHtml}</span>
                </div>`;
            }).join('');
        }
        function renderActivityLogTile() {
            const body = document.getElementById('prismActivityLogBody');
            if (body) body.innerHTML = renderActivityLogHtml();
        }
        function hotkeyRow(label, keys) {
            const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            const keyHtml = keys.map((k, i) => {
                const sep = i > 0 ? '<span class="plus">+</span>' : '';
                return sep + `<kbd>${esc(k)}</kbd>`;
            }).join('');
            return `<div class="prism-hotkey-row"><span class="prism-hotkey-label">${esc(label)}</span><span class="prism-hotkey-keys">${keyHtml}</span></div>`;
        }

        function prismRelativeDay(dateStr) {
            if (!dateStr) return '—';
            const due = new Date(dateStr + 'T00:00:00');
            const now = new Date(); now.setHours(0,0,0,0);
            const diff = Math.round((due - now) / 86400000);
            if (diff < 0) return Math.abs(diff) + 'd overdue';
            if (diff === 0) return 'Today';
            if (diff === 1) return 'Tomorrow';
            if (diff < 7) return 'in ' + diff + 'd';
            return due.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // ── Legacy dashboard (kept for non-Prism themes) ──
        function renderLegacyDashboard(container) {
            const allTasks = appData.groups.flatMap(g => g.tasks.map(t => ({...t, groupName: g.title, groupColor: g.color})));
            const total = allTasks.length;
            const byStatus = {};
            Object.keys(STATUS_COLORS).forEach(s => byStatus[s] = 0);
            allTasks.forEach(t => { if (byStatus[t.status] !== undefined) byStatus[t.status]++; });
            const byPriority = { Critical: 0, High: 0, Medium: 0, Low: 0 };
            allTasks.forEach(t => { if (byPriority[t.priority] !== undefined) byPriority[t.priority]++; });
            const done = byStatus['Done'] || 0;
            const pct = total > 0 ? Math.round(done / total * 100) : 0;
            const today = new Date().toISOString().slice(0, 10);
            const overdue = allTasks.filter(t => t.dueDate && t.dueDate < today && t.status !== 'Done').length;
            const working = byStatus['Working on it'] || 0;
            const stuck = byStatus['Stuck'] || 0;

            // KPIs
            const kpis = [
                { icon: '📋', value: total, label: 'Total Tasks', color: '#0073ea' },
                { icon: '✅', value: done, label: 'Done', color: '#00c875' },
                { icon: '🔄', value: working, label: 'In Progress', color: '#0073ea' },
                { icon: '⚠', value: stuck, label: 'Stuck', color: '#e2445c' },
                { icon: '⏰', value: overdue, label: 'Overdue', color: overdue > 0 ? '#e2445c' : '#797e93' },
                { icon: '📊', value: pct + '%', label: 'Completion', color: pct >= 50 ? '#00c875' : '#fdab3d' },
            ];

            let html = '<div class="dashboard-kpis">';
            kpis.forEach(k => {
                html += `<div class="kpi-card" style="--kpi-color:${k.color}">
                    <div class="kpi-icon">${k.icon}</div>
                    <div class="kpi-value">${k.value}</div>
                    <div class="kpi-label">${k.label}</div>
                </div>`;
            });
            html += '</div>';

            // Charts row
            html += '<div class="dashboard-charts">';

            // Donut chart (SVG)
            html += '<div class="dash-card"><h3>Task Status Distribution</h3><div class="donut-wrap">';
            const size = 160, cx = 80, cy = 80, r = 65, ir = 38;
            let svg = `<svg class="donut-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
            if (total > 0) {
                let angle = -90;
                Object.entries(byStatus).forEach(([status, count]) => {
                    if (count === 0) return;
                    const slice = count / total * 360;
                    const startRad = angle * Math.PI / 180;
                    const endRad = (angle + slice) * Math.PI / 180;
                    const largeArc = slice > 180 ? 1 : 0;
                    const x1 = cx + r * Math.cos(startRad), y1 = cy + r * Math.sin(startRad);
                    const x2 = cx + r * Math.cos(endRad), y2 = cy + r * Math.sin(endRad);
                    const ix1 = cx + ir * Math.cos(endRad), iy1 = cy + ir * Math.sin(endRad);
                    const ix2 = cx + ir * Math.cos(startRad), iy2 = cy + ir * Math.sin(startRad);
                    svg += `<path d="M${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} L${ix1},${iy1} A${ir},${ir} 0 ${largeArc},0 ${ix2},${iy2} Z" fill="${STATUS_COLORS[status] || '#999'}"/>`;
                    angle += slice;
                });
                svg += `<text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="20" font-weight="800" fill="currentColor">${pct}%</text>`;
                svg += `<text x="${cx}" y="${cy + 14}" text-anchor="middle" font-size="10" fill="#999">done</text>`;
            } else {
                svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e8e0c8" stroke-width="${r - ir}"/>`;
                svg += `<text x="${cx}" y="${cy + 5}" text-anchor="middle" font-size="13" fill="#999">No tasks</text>`;
            }
            svg += '</svg>';
            html += svg;
            html += '<div class="donut-legend">';
            Object.entries(byStatus).forEach(([status, count]) => {
                if (count === 0) return;
                html += `<div class="donut-legend-item"><div class="donut-legend-dot" style="background:${STATUS_COLORS[status] || '#999'}"></div>${status}: ${count}</div>`;
            });
            html += '</div></div></div>';

            // Priority bars
            html += '<div class="dash-card"><h3>Priority Breakdown</h3>';
            ['Critical', 'High', 'Medium', 'Low'].forEach(p => {
                const count = byPriority[p] || 0;
                const barPct = total > 0 ? (count / total * 100) : 0;
                const color = PRIORITY_COLORS[p] || '#999';
                html += `<div class="prio-bar-row">
                    <div class="prio-bar-label">${p}</div>
                    <div class="prio-bar-bg"><div class="prio-bar-fill" style="width:${barPct}%; background:${color}"></div></div>
                    <div class="prio-bar-count" style="color:${color}">${count}</div>
                </div>`;
            });
            html += '</div></div>';

            // Second row: Group Progress + Upcoming
            html += '<div class="dashboard-charts">';

            // Group progress
            html += '<div class="dash-card"><h3>Group Progress</h3>';
            appData.groups.forEach(g => {
                const gTotal = g.tasks.length;
                const gDone = g.tasks.filter(t => t.status === 'Done').length;
                const gPct = gTotal > 0 ? Math.round(gDone / gTotal * 100) : 0;
                html += `<div class="group-prog-row">
                    <div class="group-prog-dot" style="color:${g.color}">●</div>
                    <div class="group-prog-name">${g.title}</div>
                    <div class="group-prog-bar"><div class="group-prog-fill" style="width:${gPct}%; background:${g.color}"></div></div>
                    <div class="group-prog-stat">${gDone}/${gTotal}</div>
                </div>`;
            });
            if (appData.groups.length === 0) html += '<div style="color:#999;font-size:12px;">No groups yet</div>';
            html += '</div>';

            // Upcoming deadlines
            html += '<div class="dash-card"><h3>Upcoming Deadlines</h3>';
            const upcoming = allTasks.filter(t => t.dueDate && t.status !== 'Done').sort((a, b) => a.dueDate.localeCompare(b.dueDate)).slice(0, 10);
            if (upcoming.length === 0) {
                html += '<div style="color:#999;font-size:12px;">No upcoming deadlines 🎉</div>';
            } else {
                upcoming.forEach(t => {
                    const due = new Date(t.dueDate + 'T00:00:00');
                    const now = new Date(); now.setHours(0,0,0,0);
                    const diff = Math.round((due - now) / 86400000);
                    let urg, daysText, daysColor;
                    if (diff < 0) { urg = '🔴'; daysText = Math.abs(diff) + 'd overdue'; daysColor = '#e2445c'; }
                    else if (diff === 0) { urg = '🟡'; daysText = 'Today'; daysColor = '#fdab3d'; }
                    else if (diff <= 3) { urg = '🟡'; daysText = diff + 'd left'; daysColor = '#fdab3d'; }
                    else { urg = '🟢'; daysText = diff + 'd left'; daysColor = '#00c875'; }
                    html += `<div class="upcoming-row">
                        <div class="upcoming-urg">${urg}</div>
                        <div class="upcoming-name">${t.name}</div>
                        <div class="upcoming-group" style="background:${t.groupColor}">${t.groupName}</div>
                        <div class="upcoming-days" style="color:${daysColor}">${daysText}</div>
                    </div>`;
                });
            }
            html += '</div></div>';

            container.innerHTML = html;
        }

        // ── Notion-style Notes helpers ──
        function noteRelativeDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            const now = new Date();
            const diffMs = now - d;
            const diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 1) return 'Just now';
            if (diffMin < 60) return diffMin + ' min ago';
            const diffHr = Math.floor(diffMin / 60);
            if (diffHr < 24) return diffHr + 'h ago';
            const diffDay = Math.floor(diffHr / 24);
            if (diffDay === 1) return 'Yesterday';
            if (diffDay < 7) return diffDay + 'd ago';
            if (diffDay < 30) return Math.floor(diffDay / 7) + 'w ago';
            return d.toLocaleDateString();
        }

        function noteStripHtml(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html || '';
            return (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
        }

        function noteWordCount(html) {
            const text = noteStripHtml(html);
            if (!text) return { words: 0, chars: 0, readTime: '0 min' };
            const words = text.split(/\s+/).filter(Boolean).length;
            const chars = text.length;
            const readTime = Math.max(1, Math.ceil(words / 200));
            return { words, chars, readTime: readTime + ' min read' };
        }

        function noteFolderCounts() {
            const counts = {};
            notesData.notes.forEach(n => {
                const f = n.folder || '';
                counts[f] = (counts[f] || 0) + 1;
            });
            return counts;
        }

        // ── Tag colors ──
        const TAG_COLORS = [
            {bg:'#E8F0FE',fg:'#1967D2'}, {bg:'#FCE8E6',fg:'#C5221F'}, {bg:'#E6F4EA',fg:'#137333'},
            {bg:'#FEF7E0',fg:'#B06000'}, {bg:'#F3E8FD',fg:'#7627BB'}, {bg:'#E0F7FA',fg:'#00838F'},
            {bg:'#FFF3E0',fg:'#E65100'}, {bg:'#F1F8E9',fg:'#558B2F'}
        ];
        function getTagColor(tag) {
            let hash = 0; for(let i=0;i<tag.length;i++) hash = ((hash<<5)-hash)+tag.charCodeAt(i);
            return TAG_COLORS[Math.abs(hash) % TAG_COLORS.length];
        }

        function getAllTags() {
            const tags = new Set();
            notesData.notes.forEach(n => (n.tags || []).forEach(t => tags.add(t)));
            return [...tags].sort();
        }

        function addNoteTag(tag) {
            tag = tag.trim().toLowerCase();
            if (!tag) return;
            const note = notesData.notes.find(n => n.id === currentNoteId);
            if (!note) return;
            if (!note.tags) note.tags = [];
            if (note.tags.includes(tag)) return;
            note.tags.push(tag);
            note.updated_at = new Date().toISOString();
            saveNotesData(); renderNotes();
        }

        function removeNoteTag(tag) {
            const note = notesData.notes.find(n => n.id === currentNoteId);
            if (!note || !note.tags) return;
            note.tags = note.tags.filter(t => t !== tag);
            note.updated_at = new Date().toISOString();
            saveNotesData(); renderNotes();
        }

        function filterByTag(tag) {
            if (currentNoteTag === tag) { currentNoteTag = null; } else { currentNoteTag = tag; }
            renderNotes();
        }

        function renderTagsBar(note) {
            if (!note) return '';
            const tags = note.tags || [];
            let html = '<div class="note-tags-bar"><span class="note-tags-list">';
            tags.forEach(t => {
                const c = getTagColor(t);
                html += `<span class="note-tag" style="background:${c.bg};color:${c.fg}" onclick="filterByTag('${t.replace(/'/g,"\\'")}')">${escapeHtml(t)} <span class="tag-remove" onclick="event.stopPropagation();removeNoteTag('${t.replace(/'/g,"\\'")}')">&times;</span></span>`;
            });
            html += '</span><input class="note-tag-input" placeholder="Add tag..." onkeydown="if(event.key===\'Enter\'){addNoteTag(this.value);this.value=\'\';event.preventDefault();}">';
            html += '</div>';
            return html;
        }

        function renderSidebarTags() {
            const allTags = getAllTags();
            if (allTags.length === 0) return '';
            let html = '<div class="sidebar-tags"><div class="sidebar-tags-label">Tags</div>';
            allTags.forEach(t => {
                const active = currentNoteTag === t ? ' active' : '';
                html += `<span class="sidebar-tag-chip${active}" onclick="filterByTag('${t.replace(/'/g,"\\'")}')">${escapeHtml(t)}</span>`;
            });
            html += '</div>';
            return html;
        }

        function setNoteFont(fontKey) {
            const note = notesData.notes.find(n => n.id === currentNoteId);
            if (!note) return;
            note.font = fontKey;
            note.updated_at = new Date().toISOString();
            saveNotesData();
            const el = document.getElementById('noteContentEditable');
            if (el) { el.className = 'note-content font-' + fontKey; }
        }

        function renderNotes() {
            const container = document.getElementById('notesView');
            const filtered = getFilteredNotes();
            const currentNote = notesData.notes.find(n => n.id === currentNoteId);
            const folders = getNoteFolders();
            const fCounts = noteFolderCounts();

            // Folder bar
            const allCount = notesData.notes.length;
            let folderBarHtml = `<div class="notes-folder-bar" role="tablist" aria-label="Note folders">
                <span class="folder-chip${currentNoteFolder === null ? ' active' : ''}" onclick="selectNoteFolder(null)" role="tab" aria-selected="${currentNoteFolder === null}" tabindex="0" aria-label="All notes" onkeydown="if(event.key==='Enter')selectNoteFolder(null)">All <span class="folder-count">${allCount}</span></span>`;
            folders.forEach(f => {
                const active = currentNoteFolder === f ? ' active' : '';
                const isSelected = currentNoteFolder === f;
                const count = fCounts[f] || 0;
                folderBarHtml += `<span class="folder-chip${active}" onclick="selectNoteFolder('${f.replace(/'/g, "\\'")}')" oncontextmenu="folderContextMenu(event,'${f.replace(/'/g, "\\'")}')" role="tab" aria-selected="${isSelected}" tabindex="0" aria-label="Folder ${f}" onkeydown="if(event.key==='Enter')selectNoteFolder('${f.replace(/'/g, "\\'")}')">📁 ${f} <span class="folder-count">(${count})</span></span>`;
            });
            folderBarHtml += '</div>';

            let sidebarHtml = `<div class="notes-sidebar" role="navigation" aria-label="Notes sidebar" id="notesSidebar">
                <div class="notes-sidebar-header">
                    <h3>Notes</h3>
                    <div style="display:flex;gap:4px;">
                        <button class="btn btn-secondary" style="padding:3px 8px;font-size:11px;border-radius:6px;" onclick="newNoteFolder()" title="New Folder" aria-label="Create new folder" tabindex="0">📁+</button>
                        <button class="btn btn-primary" style="padding:4px 12px;font-size:12px;border-radius:6px;" onclick="addNote()" aria-label="Create new note" tabindex="0">+ New</button>
                    </div>

                ${folderBarHtml}

                <input type="text" class="notes-search" placeholder="Search notes..." oninput="debouncedFilterNotes(this.value)" id="notesSearchInput" aria-label="Search notes" tabindex="0">
                <div class="notes-search-count" id="notesSearchCount" style="display:none;"></div>
                <div class="notes-list" id="notesList" role="listbox" aria-label="Notes list">`;

            // Separate pinned and unpinned
            const pinned = filtered.filter(n => n.pinned);
            const unpinned = filtered.filter(n => !n.pinned);

            if (pinned.length > 0) {
                sidebarHtml += '<div class="notes-list-label">Pinned</div>';
