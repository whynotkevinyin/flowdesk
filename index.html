                        if (!tasksByDate[d]) tasksByDate[d] = [];
                        tasksByDate[d].push({ name: t.name, status: t.status });
                    }
                });
            });
            const eventsByDate = {};
            calendarData.events.forEach(ev => {
                const d = ev.event_date;
                if (!eventsByDate[d]) eventsByDate[d] = [];
                eventsByDate[d].push(ev);
            });

            let html = `<div class="calendar-nav">
                <button onclick="calendarDate.setDate(calendarDate.getDate()-7); renderCalendar();">&larr;</button>
                <button onclick="calendarDate = new Date(); renderCalendar();">Today</button>
                <button onclick="calendarDate.setDate(calendarDate.getDate()+7); renderCalendar();">&rarr;</button>
                <span class="cal-title">Week of ${monthNames[weekStart.getMonth()]} ${weekStart.getDate()}, ${weekStart.getFullYear()}</span>
                <button class="mode-btn ${calendarMode==='month'?'active':''}" onclick="calendarMode='month'; renderCalendar();">Month</button>
                <button class="mode-btn ${calendarMode==='week'?'active':''}" onclick="calendarMode='week'; renderCalendar();">Week</button>
                <button class="mode-btn ${calendarMode==='day'?'active':''}" onclick="calendarMode='day'; renderCalendar();">Day</button>
                <button style="background:#0073ea;color:white;border-color:#0073ea;" onclick="addEvent(formatDateStr(calendarDate))">+ Event</button>
            </div>`;

            html += '<div class="cal-grid">';
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            dayNames.forEach(d => { html += `<div class="cal-header">${d}</div>`; });

            for (let i = 0; i < 7; i++) {
                const cellDate = new Date(weekStart);
                cellDate.setDate(weekStart.getDate() + i);
                const cy = cellDate.getFullYear(), cm = cellDate.getMonth(), cd = cellDate.getDate();
                const dateStr = `${cy}-${String(cm+1).padStart(2,'0')}-${String(cd).padStart(2,'0')}`;
                const isToday = today.getFullYear() === cy && today.getMonth() === cm && today.getDate() === cd;

                html += `<div class="cal-cell" style="min-height:140px;" onclick="calendarDate = new Date(${cy}, ${cm}, ${cd}); calendarMode='day'; renderCalendar();">`;
                html += `<div class="day-num${isToday ? ' today' : ''}">${cd}</div>`;

                if (eventsByDate[dateStr]) {
                    eventsByDate[dateStr].forEach(ev => {
                        html += `<div class="event-pill" style="background:${ev.color || '#0073ea'}" onclick="event.stopPropagation(); editEvent(${ev.id})">${ev.all_day ? '' : ev.start_time + ' '}${ev.title}</div>`;
                    });
                }
                if (tasksByDate[dateStr]) {
                    tasksByDate[dateStr].forEach(t => {
                        const color = t.status === 'Done' ? '#6bcf7f' : t.status === 'Working' ? '#0073ea' : '#e8830c';
                        html += `<div class="task-pill" style="color:${color}">&#9679; ${t.name}</div>`;
                    });
                }

                html += '</div>';
            }

            html += '</div>';
            container.innerHTML = html;
        }

        function renderCalendarDay(container) {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            const date = calendarDate.getDate();
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const dateStr = formatDateStr(calendarDate);

            const dayEvents = calendarData.events.filter(ev => ev.event_date === dateStr);
            const dayTasks = [];
            (appData.groups || []).forEach(g => {
                (g.tasks || []).forEach(t => {
                    if (t.dueDate && t.dueDate.substring(0, 10) === dateStr) {
                        dayTasks.push({ name: t.name, status: t.status });
                    }
                });
            });

            let html = `<div class="calendar-nav">
                <button onclick="calendarDate.setDate(calendarDate.getDate()-1); renderCalendar();">&larr;</button>
                <button onclick="calendarDate = new Date(); renderCalendar();">Today</button>
                <button onclick="calendarDate.setDate(calendarDate.getDate()+1); renderCalendar();">&rarr;</button>
                <span class="cal-title">${monthNames[month]} ${date}, ${year}</span>
                <button class="mode-btn ${calendarMode==='month'?'active':''}" onclick="calendarMode='month'; renderCalendar();">Month</button>
                <button class="mode-btn ${calendarMode==='week'?'active':''}" onclick="calendarMode='week'; renderCalendar();">Week</button>
                <button class="mode-btn ${calendarMode==='day'?'active':''}" onclick="calendarMode='day'; renderCalendar();">Day</button>
                <button style="background:#0073ea;color:white;border-color:#0073ea;" onclick="addEvent('${dateStr}')">+ Event</button>
            </div>`;

            html += '<div class="day-events">';

            if (dayEvents.length === 0 && dayTasks.length === 0) {
                html += '<div style="color:#999;padding:20px;">No events or tasks for this day.</div>';
            }

            dayEvents.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
            dayEvents.forEach(ev => {
                html += `<div class="day-event-card" onclick="editEvent(${ev.id})" style="border-left-color:${ev.color || '#0073ea'}">
                    <div class="day-event-time">${ev.all_day ? 'All Day' : ev.start_time + ' - ' + ev.end_time}</div>
                    <div class="day-event-title">${ev.title}</div>
                </div>`;
            });

            dayTasks.forEach(t => {
                const color = t.status === 'Done' ? '#6bcf7f' : t.status === 'Working' ? '#0073ea' : '#e8830c';
                html += `<div class="day-event-card" style="border-left-color:${color}">
                    <div class="day-event-time">Task Due</div>
                    <div class="day-event-title">${t.name} <span style="font-size:10px;color:${color};">(${t.status || 'Not Started'})</span></div>
                </div>`;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function formatDateStr(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function addEvent(dateStr) {
            const title = prompt('Event title:');
            if (!title) return;
            const event = {
                id: Date.now(),
                title,
                event_date: dateStr,
                start_time: '09:00',
                end_time: '10:00',
                color: '#0073ea',
                all_day: false,
                description: ''
            };
            calendarData.events.push(event);
            saveCalendarData();
            renderCalendar();
        }

        function editEvent(eventId) {
            const ev = calendarData.events.find(e => e.id === eventId);
            if (!ev) return;
            const title = prompt('Event title:', ev.title);
            if (title === null) return;
            if (title === '') {
                calendarData.events = calendarData.events.filter(e => e.id !== eventId);
            } else {
                ev.title = title;
            }
            saveCalendarData();
            renderCalendar();
        }

        function saveCalendarData() {
            localStorage.setItem('flowdesk_events', JSON.stringify(calendarData.events));
        }

        // ========== NOTES FUNCTIONS ==========

        function getNoteFolders() {
            const folders = new Set();
            notesData.notes.forEach(n => { if (n.folder) folders.add(n.folder); });
            return [...folders].sort();
        }

        function getFilteredNotes() {
            return notesData.notes.filter(n => {
                if (currentNoteFolder !== null && (n.folder || '') !== currentNoteFolder) return false;
                return true;
            });
        }

        function renderNotes() {
            const container = document.getElementById('notesView');
            const filtered = getFilteredNotes();
            const currentNote = notesData.notes.find(n => n.id === currentNoteId);
            const folders = getNoteFolders();

            // Folder bar
            let folderBarHtml = `<div class="notes-folder-bar">
                <span class="folder-chip${currentNoteFolder === null ? ' active' : ''}" onclick="selectNoteFolder(null)">All</span>`;
            folders.forEach(f => {
                const active = currentNoteFolder === f ? ' active' : '';
                folderBarHtml += `<span class="folder-chip${active}" onclick="selectNoteFolder('${f.replace(/'/g, "\\'")}')" oncontextmenu="folderContextMenu(event,'${f.replace(/'/g, "\\'")}')">📁 ${f}</span>`;
            });
            folderBarHtml += '</div>';

            let sidebarHtml = `<div class="notes-sidebar">
                <div class="notes-sidebar-header">
                    <h3>Notes</h3>
                    <button class="btn btn-secondary" style="padding:3px 8px;font-size:11px;" onclick="newNoteFolder()" title="New Folder">📁+</button>
                    <button class="btn btn-primary" style="padding:4px 12px;font-size:12px;" onclick="addNote()">+ New</button>
                </div>
                ${folderBarHtml}
                <input type="text" class="notes-search" placeholder="Search notes..." oninput="filterNotes(this.value)" id="notesSearchInput">
                <div class="notes-list" id="notesList">`;

            filtered.forEach((n, idx) => {
                const active = n.id === currentNoteId ? ' active' : '';
                const rawDate = n.updated_at || n.updatedAt || n.created_at || n.createdAt || '';
                const date = rawDate ? new Date(rawDate).toLocaleDateString() : '';
                const safeId = typeof n.id === 'string' ? `'${n.id}'` : n.id;
                const folderTag = n.folder && currentNoteFolder === null ? `<div class="note-item-folder">📁 ${n.folder}</div>` : '';
                sidebarHtml += `<div class="note-item${active}" onclick="selectNote(${safeId})"
                    draggable="true" data-note-idx="${idx}"
                    ondragstart="noteDragStart(event,${idx})" ondragover="noteDragOver(event)" ondragleave="noteDragLeave(event)" ondrop="noteDrop(event,${idx})">
                    <span class="note-item-handle">⠿</span>
                    <div class="note-item-title">${n.pinned ? '📌 ' : ''}${n.title || 'Untitled'}</div>
                    ${folderTag}
                    <div class="note-item-date">${date === 'Invalid Date' ? '' : date}</div>
                </div>`;
            });

            sidebarHtml += '</div></div>';

            // Folder options for editor dropdown
            let folderOptions = '<option value="">(No Folder)</option>';
            folders.forEach(f => {
                const sel = currentNote && currentNote.folder === f ? ' selected' : '';
                folderOptions += `<option value="${f}"${sel}>📁 ${f}</option>`;
            });
            folderOptions += '<option value="__new__">+ New Folder...</option>';

            let editorHtml = '';
            if (currentNote) {
                const safeId = typeof currentNote.id === 'string' ? `'${currentNote.id}'` : currentNote.id;
                const createdStr = currentNote.created_at || currentNote.createdAt || '';
                const updatedStr = currentNote.updated_at || currentNote.updatedAt || '';
                const createdDisplay = createdStr ? new Date(createdStr).toLocaleString() : '';
                const updatedDisplay = updatedStr ? new Date(updatedStr).toLocaleString() : '';
                editorHtml = `<div class="note-editor">
                    <div class="note-title-row">
                        <input class="note-title-input" value="${(currentNote.title || '').replace(/"/g, '&quot;')}"
                            oninput="updateNoteTitle(${safeId}, this.value)" placeholder="Note title...">
                        <select class="note-folder-select" onchange="moveNoteToFolder(${safeId}, this.value)">${folderOptions}</select>
                    </div>
                    <div class="note-toolbar">
                        <button onclick="document.execCommand('bold')" title="Bold"><b>B</b></button>
                        <button onclick="document.execCommand('italic')" title="Italic"><i>I</i></button>
                        <button onclick="document.execCommand('underline')" title="Underline"><u>U</u></button>
                        <button onclick="document.execCommand('formatBlock', false, 'h2')" title="Heading">H</button>
                        <button onclick="document.execCommand('insertUnorderedList')" title="Bullet List">&#8226; List</button>
                        <button onclick="document.execCommand('insertOrderedList')" title="Numbered List">1. List</button>
                        <button onclick="document.execCommand('strikeThrough')" title="Strikethrough"><s>S</s></button>
                        <span style="flex:1;"></span>
                        <button onclick="deleteNote(${safeId})" style="color:#e44258;" title="Delete note">Delete</button>
                    </div>
                    <div class="note-content" contenteditable="true" id="noteContentEditable"
                        oninput="updateNoteContent(${safeId})">${currentNote.content || ''}</div>
                    <div class="note-meta">${createdDisplay ? 'Created: ' + createdDisplay : ''} ${updatedDisplay ? '| Updated: ' + updatedDisplay : ''}</div>
                </div>`;
            } else {
                editorHtml = '<div class="note-empty">Select a note or create a new one</div>';
            }

            container.innerHTML = `<div class="notes-container">${sidebarHtml}<div class="notes-resizer" id="notesResizer"></div>${editorHtml}</div>`;
            initNotesResizer();

            // Set folder select value after render
            if (currentNote) {
                const sel = container.querySelector('.note-folder-select');
                if (sel) sel.value = currentNote.folder || '';
            }
        }

        function selectNoteFolder(folder) {
            currentNoteFolder = folder;
            renderNotes();
        }

        function newNoteFolder() {
            const name = prompt('Folder name:');
            if (name && name.trim()) {
                currentNoteFolder = name.trim();
                renderNotes();
            }
        }

        function folderContextMenu(e, folderName) {
            e.preventDefault();
            const action = prompt(`Folder "${folderName}":\nType "rename" to rename or "delete" to delete folder:`);
            if (!action) return;
            if (action.toLowerCase().startsWith('rename')) {
                const newName = prompt('New folder name:', folderName);
                if (newName && newName.trim() && newName.trim() !== folderName) {
                    notesData.notes.forEach(n => { if (n.folder === folderName) n.folder = newName.trim(); });
                    if (currentNoteFolder === folderName) currentNoteFolder = newName.trim();
                    saveNotesData(); renderNotes();
                }
            } else if (action.toLowerCase().startsWith('delete')) {
                if (confirm(`Move all notes in "${folderName}" to unfiled?`)) {
                    notesData.notes.forEach(n => { if (n.folder === folderName) n.folder = ''; });
                    if (currentNoteFolder === folderName) currentNoteFolder = null;
                    saveNotesData(); renderNotes();
                }
            }
        }

        function moveNoteToFolder(noteId, folder) {
            if (folder === '__new__') {
                const name = prompt('New folder name:');
                if (name && name.trim()) {
                    const note = notesData.notes.find(n => n.id === noteId);
                    if (note) { note.folder = name.trim(); note.updated_at = new Date().toISOString(); }
                } else {
                    renderNotes(); return;
                }
            } else {
                const note = notesData.notes.find(n => n.id === noteId);
                if (note) { note.folder = folder; note.updated_at = new Date().toISOString(); }
            }
            saveNotesData(); renderNotes();
        }

        // Drag & drop reorder
        function noteDragStart(e, idx) {
            noteDragSrcIndex = idx;
            e.dataTransfer.effectAllowed = 'move';
            e.target.style.opacity = '0.5';
        }
        function noteDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.currentTarget.classList.add('drag-over');
        }
        function noteDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }
        function noteDrop(e, targetIdx) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (noteDragSrcIndex === null || noteDragSrcIndex === targetIdx) return;
            const filtered = getFilteredNotes();
            const srcNote = filtered[noteDragSrcIndex];
            const targetNote = filtered[targetIdx];
            if (!srcNote || !targetNote) return;
            // Find in main array and reorder
            const srcMainIdx = notesData.notes.findIndex(n => n.id === srcNote.id);
            const targetMainIdx = notesData.notes.findIndex(n => n.id === targetNote.id);
            if (srcMainIdx < 0 || targetMainIdx < 0) return;
            notesData.notes.splice(srcMainIdx, 1);
            const newTargetIdx = notesData.notes.findIndex(n => n.id === targetNote.id);
            notesData.notes.splice(newTargetIdx >= 0 ? newTargetIdx : targetMainIdx, 0, srcNote);
            // Update sort_order
            notesData.notes.forEach((n, i) => n.sort_order = i);
            noteDragSrcIndex = null;
            saveNotesData(); renderNotes();
        }

        function addNote() {
            const note = {
                id: Date.now(),
                title: 'Untitled',
                content: '',
                pinned: false,
                folder: currentNoteFolder || '',
                sort_order: 0,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };
            notesData.notes.unshift(note);
            notesData.notes.forEach((n, i) => n.sort_order = i);
            currentNoteId = note.id;
            saveNotesData();
            renderNotes();
        }

        function saveNotesData() {
            localStorage.setItem('flowdesk_notes', JSON.stringify(notesData.notes));
        }

        function selectNote(noteId) {
            currentNoteId = noteId;
            renderNotes();
        }

        function deleteNote(noteId) {
            if (!confirm('Delete this note?')) return;
            notesData.notes = notesData.notes.filter(n => n.id !== noteId);
            if (currentNoteId === noteId) currentNoteId = null;
            saveNotesData();
            renderNotes();
        }

        function updateNoteTitle(noteId, title) {
            const note = notesData.notes.find(n => n.id === noteId);
            if (!note) return;
            note.title = title;
            note.updated_at = new Date().toISOString();
            saveNotesData();
            const items = document.querySelectorAll('.note-item');
            items.forEach(item => {
                if (item.classList.contains('active')) {
                    item.querySelector('.note-item-title').textContent = (note.pinned ? '📌 ' : '') + (title || 'Untitled');
                }
            });
        }

        function updateNoteContent(noteId) {
            const note = notesData.notes.find(n => n.id === noteId);
            if (!note) return;
            const el = document.getElementById('noteContentEditable');
            if (el) {
                note.content = el.innerHTML;
                note.updated_at = new Date().toISOString();
                saveNotesData();
            }
        }

        function filterNotes(query) {
            query = query.toLowerCase();
            const items = document.querySelectorAll('.note-item');
            items.forEach(item => {
                const title = item.querySelector('.note-item-title').textContent.toLowerCase();
                item.style.display = title.includes(query) ? '' : 'none';
            });
        }

        // ── Notes resizer (drag to resize sidebar) ──
        function initNotesResizer() {
            const resizer = document.getElementById('notesResizer');
            if (!resizer) return;
            const sidebar = resizer.previousElementSibling;
            let startX, startW;
            function onMouseDown(e) {
                e.preventDefault();
                startX = e.clientX || e.touches[0].clientX;
                startW = sidebar.offsetWidth;
                resizer.classList.add('active');
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                document.addEventListener('touchmove', onMouseMove, {passive:false});
                document.addEventListener('touchend', onMouseUp);
            }
            function onMouseMove(e) {
                e.preventDefault();
                const x = e.clientX || (e.touches && e.touches[0].clientX) || startX;
                const newW = Math.max(180, Math.min(window.innerWidth * 0.5, startW + (x - startX)));
                sidebar.style.width = newW + 'px';
            }
            function onMouseUp() {
                resizer.classList.remove('active');
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                document.removeEventListener('touchmove', onMouseMove);
                document.removeEventListener('touchend', onMouseUp);
                localStorage.setItem('flowdesk_notes_sidebar_w', sidebar.offsetWidth);
            }
            resizer.addEventListener('mousedown', onMouseDown);
            resizer.addEventListener('touchstart', onMouseDown, {passive:false});
            // Restore saved width
            const saved = localStorage.getItem('flowdesk_notes_sidebar_w');
            if (saved) sidebar.style.width = saved + 'px';
        }

        function closeAllPopups() {
            document.querySelectorAll('.popup').forEach(p => p.classList.add('hidden'));
            document.getElementById('popupOverlay').classList.add('hidden');
        }
    </script>
</body>
</html>
